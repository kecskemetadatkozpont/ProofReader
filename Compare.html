<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Version comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --accent-tint:#eef0ff; --accent:#4f46e5; --accent-d:#4338ca; --ink:#1a2030; --muted:#5b6473; --faint:#8a92a0; --line:#e6e8ee; --soft:#f5f6f9; --softer:#fafbfc; --danger:#dc2626; --warn:#b45309; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { background: var(--softer); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    code { background: var(--surface-2); padding: 1px 5px; border-radius: 5px; font-size: 12.5px; }
    .btn { border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 9px; padding: 7px 13px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.pri { background: var(--accent); border-color: var(--accent); color: #fff; }
    .field { border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; font-family: inherit; font-size: 13px; background: var(--surface); color: var(--ink); width: 100%; }
    .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
    .seg button { border: 0; background: var(--surface); color: var(--muted); padding: 6px 11px; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; border-right: 1px solid var(--line); }
    .seg button:last-child { border-right: 0; }
    .seg button.on { background: var(--accent); color: #fff; }
    /* layout */
    .cm-wrap { max-width: none; margin: 0; padding: 14px 18px 34px; }
    .cm-empty { max-width: 720px; margin: 0 auto; }
    .cm-empty { text-align: center; color: var(--muted); padding: 70px 20px; }
    .cm-empty h1 { color: var(--ink); }
    .cm-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .cm-head h1 { font-size: 19px; margin: 0; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw; }
    .cm-sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .cm-body { display: grid; grid-template-columns: 330px 8px minmax(0,1fr); gap: 0; align-items: start; }
    .cm-split { cursor: col-resize; align-self: stretch; min-height: 60px; flex: none; width: 8px; }
    .cm-split::after { content: ''; display: block; width: 3px; height: 100%; min-height: 60px; margin: 0 auto; background: var(--line); border-radius: 3px; transition: background .12s; }
    .cm-split:hover::after { background: var(--accent); }
    /* 4-pane workspace */
    .cm-ws { display: flex; align-items: stretch; height: calc(100vh - 98px); }
    .cm-ws-col { display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); overflow: hidden; min-width: 0; }
    .cm-ws-h { font-size: 12px; font-weight: 700; padding: 9px 12px; border-bottom: 1px solid var(--line); color: var(--muted); flex: none; }
    .cm-ws-scroll { overflow-y: auto; flex: 1; padding: 7px; min-height: 0; }
    .cm-ws-pdfs { flex: 1; display: grid; min-width: 0; }
    .cm-rp-item { padding: 8px 10px; border-radius: 9px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; }
    .cm-rp-item:hover { background: var(--soft); }
    .cm-rp-item.on { background: var(--accent-tint); border-color: color-mix(in srgb, var(--accent) 32%, transparent); }
    .cm-rp-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
    .cm-rp-id { font-size: 12px; font-weight: 700; color: var(--accent); }
    .cm-rp-rev { font-size: 11px; color: var(--faint); }
    .cm-rp-cnt { margin-left: auto; font-size: 11px; font-weight: 700; background: var(--accent); color: #fff; border-radius: 999px; padding: 0 7px; min-width: 18px; text-align: center; }
    .cm-rp-text { font-size: 12px; line-height: 1.45; color: var(--ink); }
    .cm-ws-detail { border-top: 1px solid var(--line); padding: 9px 12px; flex: none; max-height: 34%; overflow-y: auto; background: var(--surface-2); }
    .cm-ws-detail-sum { font-size: 12.5px; font-weight: 600; margin-bottom: 4px; }
    .cm-ws-detail-reason { font-size: 12px; line-height: 1.5; color: var(--muted); }
    .cmp-pdfhost { flex: 1; }
    .cm-side { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px; position: sticky; top: 12px; max-height: calc(100vh - 90px); display: flex; flex-direction: column; }
    .cm-filter label { font-size: 11px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
    .cm-rpcomment { font-size: 12px; color: var(--muted); font-style: italic; margin: 8px 2px; line-height: 1.45; }
    .cm-list { overflow-y: auto; margin-top: 8px; }
    .cm-li { padding: 8px 9px; border-radius: 9px; cursor: pointer; border: 1px solid transparent; margin-bottom: 3px; }
    .cm-li:hover { background: var(--soft); }
    .cm-li.on { background: var(--accent-tint); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
    .cm-op { font-size: 10.5px; font-weight: 700; text-transform: uppercase; }
    .cm-cat { font-size: 10px; font-weight: 700; color: #fff; padding: 1px 6px; border-radius: 999px; }
    .cm-sec { font-size: 11px; color: var(--faint); margin-left: auto; }
    .cm-li-sum { font-size: 12.5px; line-height: 1.4; color: var(--ink); }
    .cm-main { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; min-height: 300px; }
    .cm-ch-head { display: flex; align-items: center; gap: 8px; }
    .cm-conf { font-size: 10.5px; color: var(--faint); margin-left: auto; text-transform: uppercase; }
    .cm-diff { font-size: 14px; line-height: 1.7; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; white-space: pre-wrap; word-break: break-word; }
    .d-add { background: rgba(22,163,74,.16); color: #15803d; border-radius: 3px; }
    .d-del { background: rgba(220,38,38,.13); color: #b91c1c; text-decoration: line-through; border-radius: 3px; }
    .cm-why { margin-top: 14px; }
    .cm-why-h { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
    .cm-rp { background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 8px; padding: 8px 11px; margin-bottom: 7px; font-size: 13px; }
    .cm-rp-c { color: var(--muted); font-style: italic; margin-top: 3px; line-height: 1.45; }
    .cm-reason { font-size: 13px; color: var(--ink); margin-top: 6px; line-height: 1.5; }
    /* PDF.js render + on-page highlight */
    .cm-pdfwrap { display: grid; grid-template-columns: 1fr 8px 1fr; gap: 0; }
    .cm-pdfcol { display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--surface); min-width: 0; }
    .cm-pdf-h { font-size: 12.5px; font-weight: 700; padding: 8px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); z-index: 2; }
    .cm-pdf-hint { font-weight: 500; color: var(--accent); }
    .cm-pdf-empty { display: grid; place-items: center; color: var(--faint); font-size: 13px; padding: 30px; text-align: center; }
    .cmp-pdfdoc { overflow: auto; max-height: calc(100vh - 112px); padding: 10px; background: var(--surface-2); flex: 1; }
    .cmp-page { position: relative; margin: 0 auto 10px; box-shadow: 0 1px 6px rgba(20,24,40,.14); background: #fff; }
    .cmp-page canvas { display: block; }
    .cmp-tl { position: absolute; left: 0; top: 0; overflow: hidden; line-height: 1; }
    .cmp-tl > span { color: transparent; position: absolute; white-space: pre; transform-origin: 0 0; border-radius: 2px; }
    .cmp-tl > span.cmp-hl { background: rgba(255,184,0,.5); box-shadow: 0 0 0 1px rgba(190,95,0,.4); border-radius: 2px; }
    .cmp-tl > span.cmp-hl-first { box-shadow: -5px 0 0 0 var(--accent), 0 0 0 1px rgba(190,95,0,.45); }
    .cmp-pdfhost { display: flex; flex-direction: column; min-height: 0; }
    .cmp-notfound { font-size: 12px; color: var(--warn); background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 7px 10px; margin: 8px; }
    /* SwiftLaTeX live edit */
    .cm-edit { display: grid; grid-template-columns: 1fr 8px 1fr; gap: 0; align-items: start; }
    .cm-edit-l, .cm-edit-r { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--surface); }
    .cm-edit-r { background: var(--surface-2); min-height: calc(100vh - 150px); }
    .cm-edit-bar { display: flex; gap: 8px; align-items: center; padding: 8px 10px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
    .cm-tex { width: 100%; height: calc(100vh - 240px); border: 0; resize: none; font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.5; padding: 12px; color: var(--ink); background: var(--surface); box-sizing: border-box; }
    .cm-log { margin: 0; padding: 8px 12px; border-top: 1px solid var(--line); font-size: 11px; line-height: 1.45; color: var(--muted); white-space: pre-wrap; max-height: 140px; overflow: auto; background: var(--softer); }
    .btn:disabled { opacity: .5; cursor: default; }
    /* audiobook */
    .cm-audio { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 20px 22px; max-width: 760px; }
    .cm-arow { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
    .cm-arow label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .cm-arow .field { width: auto; min-width: 200px; }
    .cm-key { background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin: 12px 0; }
    /* reviewers' raw text */
    .cm-rev { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
    .cm-rev-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .cm-revtext { width: 100%; min-height: calc(100vh - 240px); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical; box-sizing: border-box; background: var(--surface); color: var(--ink); }
    /* floating reviewer-note overlay */
    .cm-note { position: fixed; top: 66px; right: 16px; width: 388px; height: min(70vh, 640px); z-index: 60; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 34px rgba(20,24,40,.24); display: flex; flex-direction: column; overflow: hidden; resize: both; min-width: 250px; min-height: 170px; }
    .cm-note-h { display: flex; align-items: center; gap: 6px; padding: 8px 8px 8px 12px; border-bottom: 1px solid var(--line); cursor: move; background: var(--surface-2); user-select: none; }
    .cm-note-title { font-size: 13px; font-weight: 700; flex: 1; }
    .cm-note-btn, .cm-note-x { border: 0; background: transparent; cursor: pointer; border-radius: 6px; padding: 1px 7px; color: var(--muted); }
    .cm-note-btn { font-size: 14px; } .cm-note-x { font-size: 20px; line-height: 1; }
    .cm-note-btn:hover, .cm-note-x:hover { background: var(--surface); color: var(--ink); }
    .cm-note-status { font-size: 11.5px; color: var(--muted); padding: 4px 12px 0; }
    .cm-note-t { flex: 1; border: 0; resize: none; padding: 10px 12px; font-family: inherit; font-size: 13px; line-height: 1.55; color: var(--ink); background: var(--surface); outline: none; }
    /* share modal + read-only badge */
    .cm-modal-scrim { position: fixed; inset: 0; background: rgba(15,20,40,.42); z-index: 80; display: grid; place-items: center; }
    .cm-modal { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 16px 50px rgba(20,24,40,.3); padding: 16px 18px; width: 480px; max-width: 92vw; }
    .cm-modal-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .cm-modal-h b { font-size: 15px; }
    .cm-share-toggle { display: flex; align-items: center; gap: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface-2); }
    .cm-share-toggle input { width: 17px; height: 17px; flex: none; }
    .cm-robadge { font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-tint); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 999px; padding: 3px 11px; }
    /* saved projects */
    .cm-saved { max-width: 560px; margin: 26px auto 0; text-align: left; }
    .cm-saved-h { font-size: 12px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .cm-saved-li { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); cursor: pointer; margin-bottom: 7px; }
    .cm-saved-li:hover { border-color: var(--accent); box-shadow: 0 1px 6px rgba(20,24,40,.08); }
    .cm-saved-t { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cm-saved-m { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .cm-saved-del { margin-left: auto; border: 0; background: transparent; cursor: pointer; font-size: 15px; opacity: .55; padding: 4px; border-radius: 6px; }
    .cm-saved-del:hover { opacity: 1; background: var(--surface-2); }
    @media (max-width: 900px) { .cm-body, .cm-pdfwrap, .cm-edit { grid-template-columns: 1fr; } .cm-side { position: static; max-height: none; } }
  </style>
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';</script>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="backend/config.js"></script>
  <script src="auth.js"></script>
  <script src="backend.js"></script>
  <script src="eleven.js"></script>
  <script src="vendor/swiftlatex/PdfTeXEngine.js"></script>
  <script src="tex-compile.js"></script>
  <script src="nav.js"></script>
  <script type="text/babel" src="compare.jsx"></script>
  <script src="build.js"></script>
  <script src="version-badge.js"></script>
</body>
</html>
