<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — My tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --surface-3:#fafbfc; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fdf6e3; --danger:#b42318; --danger-bg:#fdeef0;
      --accent: #4f46e5; --accent-d: #4338ca; --ink: #1a2030; --muted: #5b6473; --faint: #8a92a0;
      --line: #e6e8ee; --soft: #f5f6f9; --softer: #fafbfc; --paper: #fff; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { background: var(--softer); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; }
    .mk { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 4px 12px rgba(79,70,229,.34); flex: none; }
    .mk span { width: 12px; height: 12px; border-top: 2.4px solid #fff; border-left: 2.4px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); margin-top: 3px; }
    .center { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .center .box { text-align: center; max-width: 420px; } .center .mk { width: 52px; height: 52px; margin: 0 auto 16px; }
    .center h1 { font-size: 20px; margin: 0 0 6px; } .center p { font-size: 13.5px; color: var(--muted); margin: 0 0 20px; }
    .soon { background: var(--surface); border: 1px dashed var(--line); border-radius: 14px; padding: 36px; text-align: center; color: var(--muted); line-height: 1.55; max-width: 620px; }

    .kb-wrap { max-width: 1500px; margin: 0 auto; padding: 22px 26px 40px; }
    .kb-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
    .kb-top h1 { font-size: 22px; margin: 0; letter-spacing: -.3px; }
    .kb-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .kb-btn { border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 8px 14px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer; white-space: nowrap; }
    .kb-btn:hover { border-color: var(--accent); } .kb-btn:disabled { opacity: .55; cursor: default; }
    .kb-btn.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
    .kb-btn.danger { color: var(--danger); border-color: #f0c8c8; }

    /* filter bar (shared visual language with the research boards) */
    .gb-bar { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .gb-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; }
    .gb-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); border-radius: 999px; padding: 4px 10px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; max-width: 230px; }
    .gb-chip:hover { border-color: var(--accent); color: var(--ink); }
    .gb-chip.on { background: var(--accent-tint); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
    .gb-chip .gb-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .gb-chip .gb-nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gb-chip .gb-c { font-size: 10.5px; font-weight: 700; background: var(--soft); color: var(--muted); padding: 0 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
    .gb-tools { display: flex; align-items: center; gap: 8px; flex: none; }
    .gb-q { border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 9px; padding: 6px 10px; font: inherit; font-size: 12.5px; width: 150px; }
    .gb-q:focus { outline: none; border-color: var(--accent); }
    .gb-proj { display: flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; color: var(--muted); margin-bottom: 5px; overflow: hidden; }
    .gb-proj i { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .gb-proj span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* segmented control (filters + modal) */
    .kb-seg { display: inline-flex; background: var(--soft); border: 1px solid var(--line); border-radius: 9px; padding: 2px; flex-wrap: wrap; }
    .kb-seg button { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 7px; cursor: pointer; }
    .kb-seg button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,26,32,.08); }

    /* board */
    .bwrap { display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 12px; align-items: flex-start; }
    .bcol { flex: 0 0 250px; background: var(--surface-2); border: 1px solid var(--line); border-top: 3px solid var(--bcap, var(--line)); border-radius: 11px; display: flex; flex-direction: column; max-height: 74vh; }
    .bcol.cap-hu { --bcap: #7c3aed; } .bcol.cap-ai { --bcap: #0e8fa8; } .bcol.cap-bk { --bcap: var(--warn); }
    .bcol.over { outline: 2px dashed var(--accent); outline-offset: -3px; background: var(--accent-tint); }
    .bcol-h { display: flex; align-items: center; gap: 7px; padding: 9px 11px 7px; font-size: 11.5px; font-weight: 700; }
    .bcol-t { flex: 1; min-width: 0; }
    .bcol-n { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--soft); padding: 1px 7px; border-radius: 999px; }
    .bcol-b { padding: 7px; display: flex; flex-direction: column; gap: 7px; overflow-y: auto; flex: 1; min-height: 40px; }
    .bcol-empty { font-size: 11px; color: var(--faint); text-align: center; padding: 10px; }
    .bcard { position: relative; background: var(--surface); border: 1px solid var(--line); border-left: 3px solid var(--bst, var(--line)); border-radius: 9px; padding: 8px 9px; cursor: pointer; box-shadow: 0 1px 2px rgba(20,24,40,.04); transition: box-shadow .12s, border-color .12s; }
    .bcard.ai { --bst: #0e8fa8; } .bcard.hu { --bst: #7c3aed; }
    .bcard:hover { box-shadow: 0 6px 16px -8px rgba(20,24,40,.28); border-color: #cfd4e6; }
    .bcard[draggable="true"] { cursor: grab; } .bcard[draggable="true"]:active { cursor: grabbing; }
    .bcard-top { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .bcard-t { font-size: 12.5px; font-weight: 600; line-height: 1.3; color: var(--ink); }
    .bcard-m { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .bchip { font-size: 9.5px; font-weight: 700; padding: 1px 5px; border-radius: 5px; background: var(--soft); color: var(--muted); font-variant-numeric: tabular-nums; }
    .bchip.who.ai { background: #e0f3f7; color: #0a6f83; } .bchip.who.hu { background: #f1eafe; color: #6425c7; }
    .bchip.warn { background: var(--warn-bg); color: var(--warn); }
    .bchip.step { background: var(--accent-tint); color: var(--accent); }
    /* AI protocol steps unified into "My tasks" — muted, dashed, open a detail drawer */
    .bcard.rostep { text-decoration: none; color: inherit; cursor: pointer; border-style: dashed; opacity: .92; }
    .bcard.rostep:hover { opacity: 1; border-color: var(--accent); }
    .bcard.rostep:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* side drawer (task detail / edit) */
    .kb-scrim { position: fixed; inset: 0; background: rgba(8,10,16,.5); z-index: 100; display: flex; align-items: stretch; justify-content: flex-end; padding: 0; animation: kbScrimIn .2s ease; }
    @keyframes kbScrimIn { from { background: rgba(8,10,16,0); } to { background: rgba(8,10,16,.5); } }
    .kb-modal { width: min(480px, 100vw); height: 100vh; max-height: 100vh; overflow: hidden; background: var(--surface); border: 0; border-left: 1px solid var(--line); border-radius: 0; box-shadow: -28px 0 70px rgba(16,20,40,.32); display: flex; flex-direction: column; animation: kbDrawerIn .26s cubic-bezier(.32,.72,0,1); }
    @keyframes kbDrawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @media (prefers-reduced-motion: reduce) { .kb-scrim, .kb-modal { animation: none; } }
    .kb-mh { display: flex; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); flex: 0 0 auto; }
    .kb-mh b { font-size: 15px; } .kb-x { margin-left: auto; border: 0; background: var(--soft); color: var(--muted); width: 28px; height: 28px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .kb-mb { padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; overflow: auto; flex: 1 1 auto; }
    .kb-l { display: block; font-size: 11.5px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; margin: 10px 0 4px; }
    .kb-mb .kb-l:first-child { margin-top: 0; }
    .kb-in { width: 100%; border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 9px; padding: 9px 11px; font: inherit; font-size: 13.5px; }
    .kb-in:focus { outline: none; border-color: var(--accent); }
    textarea.kb-in { resize: vertical; }
    .kb-row { display: flex; gap: 14px; flex-wrap: wrap; } .kb-row > div { flex: 1; min-width: 150px; }
    .kb-note { font-size: 12px; line-height: 1.5; color: var(--muted); background: var(--accent-tint); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); border-radius: 9px; padding: 8px 11px; margin-bottom: 4px; }
    .kb-ro { border: 1px solid var(--line); background: var(--soft); color: var(--ink); border-radius: 9px; padding: 9px 11px; font-size: 13.5px; }
    .kb-pre { margin: 0; border: 1px solid var(--line); background: var(--soft); color: var(--muted); border-radius: 9px; padding: 9px 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow: auto; }
    .kb-meta { margin-top: 16px; padding-top: 12px; border-top: 1px dashed var(--line); display: flex; flex-direction: column; gap: 5px; }
    .kb-meta div { font-size: 11.5px; color: var(--faint); display: flex; gap: 8px; }
    .kb-meta div span:first-child { min-width: 78px; font-weight: 600; color: var(--muted); }
    .kb-mf { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-top: 1px solid var(--line); flex: 0 0 auto; background: var(--surface); }
    @media (max-width: 700px) { .gb-tools { width: 100%; } .gb-q { flex: 1; } }

    /* shared Task/Step editor vocabulary (task-editor.js) — mirrors Research.html so the editor looks identical */
    .btn { border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 9px 15px; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer; }
    .btn.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn:hover { filter: brightness(1.03); }
    .btn:disabled { opacity: .55; cursor: default; }
    .scrim { position: fixed; inset: 0; background: rgba(15,20,40,.5); z-index: 120; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { width: 560px; max-width: 100%; max-height: 88vh; overflow: auto; background: var(--surface); border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.3); }
    .modal-h { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); z-index: 1; }
    .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-family: inherit; font-size: 13.5px; }
    input.field, select.field, textarea.field { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-family: inherit; font-size: 13.5px; background: var(--surface); color: var(--ink); }
    .field input, .field select { height: 38px; } input.field, select.field { height: 38px; }
    textarea.field { height: auto; }
    .field input:focus, .field select:focus, .field textarea:focus, input.field:focus, select.field:focus, textarea.field:focus { outline: none; border-color: var(--accent); }
    .field-label { font-size: 11.5px; font-weight: 700; color: var(--muted); margin: 8px 0 4px; }
    .icon-x { border: 0; background: transparent; color: var(--faint); cursor: pointer; font-size: 14px; padding: 2px 4px; }
    .icon-x:hover { color: var(--danger); }
    .att-drop { border: 1.5px dashed var(--line); border-radius: 9px; padding: 12px; text-align: center; font-size: 12px; color: var(--faint); transition: border-color .12s, background .12s, color .12s; }
    .att-drop.over { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }
    .lchip { font-size: 11.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); cursor: pointer; font-family: inherit; }
    .lchip:hover { border-color: #cfd4e6; }
    .lchip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .fb-mini { width: 24px; height: 24px; border: 1px solid var(--line); background: var(--surface); border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--muted); padding: 0; line-height: 1; flex: none; }
    .fb-mini:hover { border-color: var(--accent); color: var(--accent); }
  </style>
