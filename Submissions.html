<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Érkeztető</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --surface-3:#fafbfc; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fdf6e3; --danger:#b42318; --danger-bg:#fdeef0;
      --accent: #4f46e5; --accent-d: #4338ca; --ink: #1a2030; --muted: #5b6473; --faint: #8a92a0;
      --line: #e6e8ee; --soft: #f5f6f9; --softer: #fafbfc; --paper: #fff;
      --ok: #15803d; --ok-bg: #e7f6ee; --warn: #b45309; --warn-bg: #fdf6e3; --danger: #b42318; --danger-bg: #fdeef0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { background: var(--softer); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); }
    .app { display: flex; min-height: 100vh; }
    .side { width: 248px; flex: none; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .side-brand { display: flex; align-items: center; gap: 11px; padding: 18px 18px 14px; }
    .mk { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 4px 12px rgba(79,70,229,.34); flex: none; }
    .mk span { width: 12px; height: 12px; border: 0; border-top: 2.4px solid #fff; border-left: 2.4px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); margin-top: 3px; }
    .side-brand b { font-size: 15px; letter-spacing: -.2px; }
    .side-brand i { display: block; font-style: normal; font-size: 11.5px; color: var(--faint); }
    .nav { padding: 6px 10px; flex: 1; }
    .nav button { width: 100%; display: flex; align-items: center; gap: 10px; padding: 9px 11px; margin-bottom: 2px; border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 13.5px; font-weight: 600; border-radius: 9px; cursor: pointer; text-align: left; }
    .nav button:hover { background: var(--soft); color: var(--ink); }
    .nav button.on { background: var(--accent-tint); color: var(--accent); }
    .nav button svg { width: 17px; height: 17px; flex: none; }
    .nav-badge { margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--accent); color: #fff; font-size: 10.5px; font-weight: 700; font-style: normal; display: inline-flex; align-items: center; justify-content: center; }
    .side-foot { border-top: 1px solid var(--line); padding: 12px; display: flex; align-items: center; gap: 9px; }
    .side-foot .who { flex: 1; min-width: 0; }
    .side-foot .who b { font-size: 12.5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .side-foot .who span { font-size: 11px; color: var(--faint); }
    .side-foot a.exit { font-size: 12px; color: var(--muted); text-decoration: none; font-weight: 600; }
    .side-foot a.exit:hover { color: var(--accent); }
    .main { flex: 1; min-width: 0; padding: 26px 32px; }
    .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .head h1 { font-size: 21px; margin: 0; letter-spacing: -.3px; }
    .head .sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .badge { display: inline-flex; align-items: center; height: 20px; padding: 0 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--soft); color: var(--muted); }
    .badge.role { background: var(--accent-tint); color: var(--accent); }
    .av { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 13px; font-weight: 700; background-size: cover; background-position: center; flex: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color .12s, box-shadow .12s; }
    .card:hover { border-color: #cfd4e6; box-shadow: 0 6px 18px rgba(20,24,40,.06); }
    .card .ch { display: flex; align-items: center; gap: 11px; margin-bottom: 10px; }
    .card .ch b { font-size: 14.5px; }
    .card .ch span { font-size: 12px; color: var(--muted); display: block; }
    .card .ch > div:first-child { flex: 1; min-width: 0; }
    .author-badge { flex: none; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* supervisor "Diákjaim kutatása" surface */
    .segctl { display: inline-flex; gap: 4px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
    .segctl button { border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 7px; cursor: pointer; }
    .segctl button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,24,40,.08); }
    .sup-student { margin-bottom: 22px; }
    .sup-head { display: flex; align-items: center; gap: 11px; margin-bottom: 11px; flex-wrap: wrap; }
    .sup-head b { font-size: 14.5px; }
    .sup-topic { display: block; font-size: 12px; color: var(--muted); }
    .sup-empty { font-size: 13px; color: var(--faint); padding: 10px 2px 2px; }
    .ro-banner { background: var(--accent-tint); color: var(--accent); border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; font-size: 12.5px; font-weight: 600; margin-bottom: 12px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; background: var(--accent-tint); color: var(--accent); }
    .meter { height: 6px; border-radius: 4px; background: var(--line); overflow: hidden; margin-top: 4px; }
    .meter > i { display: block; height: 100%; background: var(--accent); }
    .kv { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 10px; }
    .empty { color: var(--faint); font-size: 14px; padding: 40px; text-align: center; }
    .soon { background: var(--surface); border: 1px dashed var(--line); border-radius: 14px; padding: 36px; text-align: center; color: var(--muted); }
    .center { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .center .box { text-align: center; max-width: 380px; }
    .center .mk { width: 52px; height: 52px; margin: 0 auto 16px; }
    .center h1 { font-size: 20px; margin: 0 0 6px; }
    .center p { font-size: 13.5px; color: var(--muted); margin: 0 0 20px; }
    .btn { border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 9px 15px; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer; }
    .btn.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn:hover { filter: brightness(1.03); }
    .scrim { position: fixed; inset: 0; background: rgba(15,20,40,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { width: 560px; max-width: 100%; max-height: 88vh; overflow: auto; background: var(--surface); border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.3); }
    .modal-h { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); }
    .modal-h .x { margin-left: auto; border: 0; background: transparent; font-size: 18px; color: var(--muted); cursor: pointer; }
    .modal-b { padding: 18px 20px; }
    .modal-foot { display: flex; gap: 10px; justify-content: flex-end; padding: 14px 20px; border-top: 1px solid var(--line); }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; }
    .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .4px; color: var(--faint); margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 12px; }
    .back-btn:hover { color: var(--accent); }
    .dhead { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
    .dhead .dt { flex: 1; } .dhead .dt h1 { margin: 0 0 3px; } .dhead .dt p { margin: 0; font-size: 13px; color: var(--muted); }
    .chip { display: inline-flex; align-items: center; height: 22px; padding: 0 9px; border-radius: 7px; font-size: 11px; font-weight: 700; border: 0; font-family: inherit; }
    .chip.c-ok { background: var(--ok-bg); color: var(--ok); } .chip.c-warn { background: var(--warn-bg); color: var(--warn); }
    .chip.c-grey { background: var(--surface-2); color: var(--muted); } .chip.c-acc { background: var(--accent-tint); color: var(--accent); }
    .chip.c-danger { background: var(--danger-bg); color: var(--danger); }
    /* journal recommender cards */
    .jl-card { border-bottom: 1px solid var(--soft); padding: 11px 0; }
    .jl-card:last-child { border-bottom: 0; }
    .jl-title { font-weight: 600; font-size: 14px; color: var(--ink); text-decoration: none; }
    .jl-title:hover { color: var(--accent); text-decoration: underline; }
    .jl-lvl { font-size: 10px; font-weight: 700; padding: 1.5px 7px; border-radius: 999px; flex: none; white-space: nowrap; }
    .jl-lvl.lvl2 { background: #fef3c7; color: #92400e; }
    .jl-lvl.lvl1 { background: var(--surface-2); color: var(--muted); }
    .jl-q { font-size: 10px; font-weight: 700; padding: 1.5px 7px; border-radius: 999px; }
    .jl-q.q1 { background: #dcfce7; color: #166534; } .jl-q.q2 { background: #e0f2fe; color: #075985; }
    .jl-q.q3 { background: #fef9c3; color: #854d0e; } .jl-q.q4 { background: #fee2e2; color: #991b1b; }
    .jl-fit { font-size: 11px; font-weight: 700; color: var(--accent); margin-left: auto; }
    .jl-meta { font-size: 11.5px; color: var(--faint); margin-top: 3px; }
    .jl-reason { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
    /* journal dossier KPI grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 2px 20px; margin-top: 8px; }
    .kpi { display: flex; justify-content: space-between; gap: 10px; font-size: 12.5px; padding: 4px 0; border-bottom: 1px dashed var(--soft); }
    .kpi-k { color: var(--muted); }
    .kpi-v { color: var(--ink); font-weight: 600; text-align: right; }
    /* "AI is working" indicator */
    .ai-think { display: flex; align-items: center; gap: 11px; padding: 10px 13px; background: var(--accent-tint); border: 1px solid #d7dbf5; border-radius: 11px; }
    .ai-orb { width: 20px; height: 20px; border-radius: 50%; flex: none; background: conic-gradient(from 0deg, var(--accent), #d946ef, var(--accent)); box-shadow: 0 0 0 3px rgba(79,70,229,.10); animation: ai-orb-spin 1.05s linear infinite; }
    @keyframes ai-orb-spin { to { transform: rotate(360deg); } }
    .ai-think-lbl { font-size: 12.5px; font-weight: 700; color: var(--accent-d); }
    .ai-dots { display: inline-block; width: 1.1em; text-align: left; }
    .ai-dots::after { content: ''; animation: ai-dots 1.4s steps(1) infinite; }
    @keyframes ai-dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
    .ai-ind { height: 4px; border-radius: 3px; background: rgba(79,70,229,.15); overflow: hidden; margin-top: 6px; }
    .ai-ind > i { display: block; height: 100%; width: 40%; border-radius: 3px; background: var(--accent); animation: ai-ind 1.15s ease-in-out infinite; }
    @keyframes ai-ind { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
    .ai-think-sec { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; flex: none; }
    /* task attachment drag & drop zone */
    .att-drop { border: 1.5px dashed var(--line); border-radius: 9px; padding: 12px; text-align: center; font-size: 12px; color: var(--faint); transition: border-color .12s, background .12s, color .12s; }
    .att-drop.over { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }
    /* per-step protocol report (rendered markdown) */
    .step-report { margin-top: 8px; font-size: 12.5px; color: var(--ink); line-height: 1.55; }
    .step-report h2 { font-size: 14px; margin: 6px 0 6px; }
    .step-report h3 { font-size: 12.5px; margin: 10px 0 4px; color: var(--muted); }
    .step-report p { margin: 6px 0; }
    .step-report ul, .step-report ol { margin: 6px 0; padding-left: 18px; }
    .step-report li { margin: 2px 0; }
    .step-report code { background: var(--soft); padding: 1px 4px; border-radius: 4px; font-size: 11.5px; }
    .step-report table { border-collapse: collapse; margin: 8px 0; font-size: 11.5px; width: auto; }
    .step-report th, .step-report td { border: 1px solid var(--line); padding: 3px 9px; text-align: left; }
    .step-report th { background: var(--surface-2); font-weight: 600; }
    .step-report strong { color: var(--ink); }
    /* full-page formatted report reader */
    .rv-scrim { position: fixed; inset: 0; background: rgba(15,20,40,.55); z-index: 1100; display: flex; align-items: stretch; justify-content: center; padding: 24px; }
    .rv-shell { width: 920px; max-width: 100%; max-height: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.32); display: flex; flex-direction: column; overflow: hidden; }
    .rv-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--line); flex: none; flex-wrap: wrap; row-gap: 6px; }
    /* single column by default (body fills); two columns only when a TOC is actually present → no empty/squished track */
    .rv-main { display: grid; grid-template-columns: minmax(0,1fr); flex: 1; min-height: 0; }
    .rv-main:has(.rv-toc) { grid-template-columns: 232px minmax(0,1fr); }
    .rv-toc { min-width: 0; width: 232px; border-right: 1px solid var(--line); overflow: auto; padding: 16px 8px 40px; background: var(--surface); box-sizing: border-box; }
    .rv-toc-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); padding: 0 8px 8px; }
    .rv-toc-i { display: block; width: 100%; text-align: left; border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 12.5px; line-height: 1.35; padding: 5px 8px; border-radius: 7px; cursor: pointer; white-space: normal; }
    .rv-toc-i:hover { background: var(--soft); color: var(--ink); }
    .rv-toc-i.lvl1 { font-weight: 700; color: var(--ink); margin-top: 4px; }
    .rv-toc-i.lvl2 { padding-left: 14px; }
    .rv-toc-i.lvl3 { padding-left: 26px; font-size: 12px; color: var(--faint); }
    .rv-body { min-width: 0; overflow: auto; padding: 28px 24px 64px; background: var(--softer); overflow-wrap: anywhere; }
    .report-doc { max-width: 770px; margin: 0 auto; background: var(--surface); padding: 40px 48px; border-radius: 12px; box-shadow: 0 1px 3px rgba(20,24,40,.06); color: var(--ink); font-size: 14px; line-height: 1.65; }
    .report-doc h1 { font-size: 24px; margin: 0 0 14px; letter-spacing: -.3px; }
    .report-doc h2 { font-size: 18px; margin: 26px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--line); }
    .report-doc h3 { font-size: 15px; margin: 18px 0 6px; color: var(--muted); }
    .report-doc p { margin: 10px 0; }
    .report-doc ul, .report-doc ol { margin: 10px 0; padding-left: 22px; }
    .report-doc li { margin: 4px 0; }
    .report-doc blockquote { margin: 12px 0; padding: 6px 14px; border-left: 3px solid var(--accent); background: var(--accent-tint); color: var(--accent-d); border-radius: 0 6px 6px 0; }
    .report-doc code { background: var(--soft); padding: 1.5px 5px; border-radius: 4px; font-size: 12.5px; }
    .report-doc pre { background: var(--soft); padding: 12px 14px; border-radius: 8px; overflow: auto; }
    .report-doc pre code { background: none; padding: 0; }
    .report-doc table { border-collapse: collapse; margin: 14px 0; font-size: 13px; }
    .report-doc th, .report-doc td { border: 1px solid var(--line); padding: 6px 12px; text-align: left; }
    .report-doc th { background: var(--surface-2); font-weight: 600; }
    .report-doc img { max-width: 100%; height: auto; display: block; margin: 16px auto; border: 1px solid var(--line); border-radius: 8px; }
    .report-doc hr { border: 0; border-top: 1px solid var(--line); margin: 26px 0; }
    .report-doc strong { font-weight: 600; }
    /* in-flow report pane (integrated into the page; slides in from the side) */
    .report-pane { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; min-height: 78vh; animation: rp-slide .2s ease both; }
    @keyframes rp-slide { from { opacity: 0; transform: translateX(48px); } to { opacity: 1; transform: none; } }
    @media print {
      body * { visibility: hidden; }
      .rv-scrim, .rv-scrim *, .report-pane, .report-pane * { visibility: visible; }
      .rv-scrim { position: absolute; inset: 0; padding: 0; background: #fff; }
      .rv-shell { box-shadow: none; max-height: none; border-radius: 0; width: 100%; }
      .report-pane { position: absolute; left: 0; top: 0; width: 100%; border: 0; min-height: 0; }
      .rv-bar, .rv-toc { display: none; }
      .rv-main { display: block; }
      .rv-body { overflow: visible; padding: 0; background: #fff; }
      .report-doc { box-shadow: none; max-width: 100%; padding: 0; }
    }
    .addrow { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .addrow input, .addrow select { height: 34px; border: 1px solid var(--line); border-radius: 8px; padding: 0 10px; font-family: inherit; font-size: 13px; }
    .addrow input.grow { flex: 1; min-width: 140px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 12px 0 4px; }
    .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-family: inherit; font-size: 13.5px; }
    /* element-level .field (input/select/textarea that ARE .field, not a container) — mirror the .field input look */
    input.field, select.field, textarea.field { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-family: inherit; font-size: 13.5px; background: var(--surface); color: var(--ink); }
    .field input, .field select { height: 38px; }
    input.field, select.field { height: 38px; }
    .icon-x { border: 0; background: transparent; color: var(--faint); cursor: pointer; font-size: 14px; padding: 2px 4px; }
    .icon-x:hover { color: var(--danger); }
    /* research stepper */
    .stepper { display: flex; align-items: center; gap: 3px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; margin-bottom: 16px; overflow-x: auto; }
    .step { display: flex; align-items: center; gap: 7px; padding: 5px 9px; border-radius: 9px; cursor: pointer; white-space: nowrap; border: 0; background: transparent; font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--faint); }
    .step .dot { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 700; background: var(--soft); color: var(--muted); flex: none; }
    .step .dot svg { width: 12.5px; height: 12.5px; }
    .step.done .dot { background: var(--ok-bg); color: var(--ok); }
    .step.cur { color: var(--accent); } .step.cur .dot { background: var(--accent); color: #fff; }
    .step:hover { background: var(--soft); }
    .step-sep { width: 12px; height: 2px; background: var(--line); flex: none; }
    /* log + tasks */
    .log-entry { display: flex; gap: 11px; padding: 11px 0; border-bottom: 1px solid var(--soft); }
    .log-entry:last-child { border-bottom: 0; }
    .log-entry .lt { flex: 1; min-width: 0; } .log-entry .lt p { margin: 0 0 2px; font-size: 13px; } .log-entry .lt span { font-size: 11px; color: var(--faint); }
    .trow { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--soft); font-size: 13px; }
    .trow:last-child { border-bottom: 0; }
    .trow .tt { flex: 1; min-width: 0; } .trow .tt.done { text-decoration: line-through; color: var(--faint); }
    .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; flex: none; }
    .seg button { border: 0; background: var(--surface); font-family: inherit; font-size: 11px; font-weight: 700; padding: 4px 9px; cursor: pointer; color: var(--muted); }
    .seg button.on { background: var(--accent); color: #fff; }
    .preview-banner { background: #fef3c7; color: var(--warn); padding: 9px 14px; font-size: 13px; font-weight: 600; border-radius: 10px; margin-bottom: 14px; }
    .preview-banner a { color: var(--warn); }
    /* notifications bell */
    .notif-wrap { position: relative; }
    .bell { position: relative; border: 1px solid var(--line); background: var(--surface); border-radius: 10px; width: 38px; height: 38px; cursor: pointer; display: grid; place-items: center; }
    .bell:hover { border-color: #cfd4e6; }
    .bell svg { width: 18px; height: 18px; }
    .bell .nb { position: absolute; top: -6px; right: -6px; min-width: 17px; height: 17px; padding: 0 4px; border-radius: 9px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; display: grid; place-items: center; }
