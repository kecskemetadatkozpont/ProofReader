<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --surface-3:#fafbfc; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fdf6e3; --danger:#b42318; --danger-bg:#fdeef0;
      --accent: #4f46e5; --accent-d: #4338ca; --ink: #1a2030; --muted: #5b6473; --faint: #8a92a0;
      --line: #e6e8ee; --soft: #f5f6f9; --softer: #fafbfc; --paper: #fff;
      --be: #7c3aed; --ok: #15803d; --ok-bg: #e7f6ee; --warn: #b45309; --warn-bg: #fdf6e3;
      --danger: #b42318; --danger-bg: #fdeef0; --grey-bg: #eef0f3;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { background: var(--surface-2); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 14px; height: 60px; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
    .brand .mk { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: linear-gradient(135deg, #6366f1, #d946ef); }
    .brand .mk span { width: 12px; height: 12px; border: 0; border-top: 2.8px solid #fff; border-left: 2.8px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); }
    .brand .tag { font-size: 11px; font-weight: 700; color: var(--be); background: var(--accent-tint); padding: 2px 8px; border-radius: 20px; letter-spacing: .04em; }
    .topbar .sp { flex: 1; }
    .topbar a.back { font-size: 13.5px; color: var(--muted); font-weight: 600; text-decoration: none; }
    .topbar a.back:hover { color: var(--accent); }
    .topbar .me { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--muted); }
    .topbar .me .av { width: 28px; height: 28px; border-radius: 50%; background-size: cover; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 12px; }
    .topbar button.so { border: 1px solid var(--line); background: var(--surface); border-radius: 9px; padding: 7px 12px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer; }
    .topbar button.so:hover { border-color: #c9cdd6; }

    .wrap { max-width: 1240px; margin: 0 auto; padding: 26px 24px 60px; }

    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 26px; }
    .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 13px; padding: 16px 18px; }
    .stat .n { font-size: 25px; font-weight: 700; letter-spacing: -.5px; }
    .stat .l { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .stat.alert .n { color: var(--warn); }

    .sec-h { display: flex; align-items: center; gap: 10px; margin: 26px 0 14px; }
    .sec-h h2 { font-size: 17px; font-weight: 700; margin: 0; }
    .sec-h .count { font-size: 12px; font-weight: 700; color: var(--warn); background: var(--warn-bg); padding: 2px 9px; border-radius: 20px; }
    .pub-rows { display: flex; flex-direction: column; gap: 2px; padding: 4px 0; }
    .pub-row { display: flex; align-items: baseline; gap: 10px; font-size: 12.5px; padding: 4px 6px; border-radius: 6px; }
    .pub-row:hover { background: var(--surface); }
    .pub-row .py { color: var(--muted); font-variant-numeric: tabular-nums; flex: none; width: 38px; }
    .pub-row .pt { flex: 1; min-width: 0; }
    .pub-row .pc { color: var(--muted); font-size: 11px; flex: none; }

    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); font-weight: 700; padding: 11px 14px; border-bottom: 1px solid var(--line); background: var(--softer); white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; vertical-align: middle; }
    tr:last-child td { border-bottom: 0; }
    tr.clickable:hover td { background: var(--softer); cursor: pointer; }
    .u { display: flex; align-items: center; gap: 10px; }
    .u .av { width: 32px; height: 32px; border-radius: 50%; background-size: cover; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 12px; flex: none; }
    .u b { font-size: 13.5px; display: block; }
    .u span { font-size: 12px; color: var(--muted); }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: capitalize; }
    .b-approved { color: var(--ok); background: var(--ok-bg); }
    .b-pending { color: var(--warn); background: var(--warn-bg); }
    .b-rejected { color: var(--danger); background: var(--danger-bg); }
    .b-suspended { color: var(--muted); background: var(--grey-bg); }
    .b-incomplete { color: var(--faint); background: var(--grey-bg); }
    .b-admin { color: var(--be); background: var(--accent-tint); margin-left: 6px; }
    .acts { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn { border: 1px solid var(--line); background: var(--surface); border-radius: 8px; padding: 6px 11px; font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink); cursor: pointer; white-space: nowrap; }
    .btn:hover { border-color: #c9cdd6; }
    .btn.ok { background: var(--ok); color: #fff; border-color: var(--ok); }
    .btn.ok:hover { background: #136a3f; }
    .btn.dng { color: var(--danger); border-color: #f3c3c3; }
    .btn.dng:hover { background: var(--danger-bg); }
    .btn.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.pri:hover { background: var(--accent-d); }
    .ext { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600; }
    .ext:hover { text-decoration: underline; }

    /* drawer */
    .scrim { position: fixed; inset: 0; background: rgba(20,22,34,.4); z-index: 40; display: none; }
    .scrim.on { display: block; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 720px; max-width: 96vw; background: var(--surface); z-index: 41; box-shadow: -16px 0 48px rgba(16,20,40,.22); transform: translateX(100%); transition: transform .26s cubic-bezier(.3,.8,.3,1); display: flex; flex-direction: column; }
    .drawer.on { transform: translateX(0); }
    .drawer .dh { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--line); }
    .drawer .dh .x { margin-left: auto; border: 0; background: var(--soft); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); }
    .drawer .db { padding: 20px 22px; overflow: auto; flex: 1; }
    .kv { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .kv .c { border: 1px solid var(--line); border-radius: 11px; padding: 12px 14px; }
    .kv .c .l { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); font-weight: 700; }
    .kv .c .v { font-size: 18px; font-weight: 700; margin-top: 4px; }
    .kv .c .s { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
    .meta-line { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .meta-line b { color: var(--ink); font-weight: 600; }
    h3.dsub { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); margin: 20px 0 10px; }
    .proj { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 11px; margin-bottom: 9px; }
    .proj .pt { flex: 1; }
    .proj .pt b { font-size: 13.5px; } .proj .pt span { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }

    /* project preview modal */
    .pv-scrim { position: fixed; inset: 0; background: rgba(20,22,34,.5); z-index: 50; display: none; align-items: center; justify-content: center; padding: 30px; }
    .pv-scrim.on { display: flex; }
    .pv { width: 900px; max-width: 100%; max-height: 90vh; background: var(--surface); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 70px rgba(16,20,40,.35); }
    .pv .pvh { display: flex; align-items: center; gap: 12px; padding: 15px 20px; border-bottom: 1px solid var(--line); }
    .pv .pvh b { font-size: 15px; } .pv .pvh .x { margin-left: auto; border: 0; background: var(--soft); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; color: var(--muted); }
    .pv .pvb { display: grid; grid-template-columns: 180px 1fr; min-height: 0; flex: 1; }
    .pv .files { border-right: 1px solid var(--line); background: var(--softer); padding: 12px; overflow: auto; }
    .pv .files .f { font-size: 12.5px; padding: 7px 9px; border-radius: 7px; color: var(--muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; }
    .pv .files .f.on { background: var(--accent-tint); color: var(--accent-d); font-weight: 600; }
    .pv .render { padding: 26px 30px; overflow: auto; font-family: 'Source Serif 4', Georgia, serif; line-height: 1.65; color: var(--ink); }
    .pv .render h1, .pv .render h2, .pv .render h3 { font-family: 'Source Serif 4', serif; }
    .pv .render .sent { padding: 0 1px; }
    .pv .render img { max-width: 100%; }
    .pv .src { padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; white-space: pre-wrap; line-height: 1.7; color: var(--ink); overflow: auto; }

    .center-msg { min-height: 70vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; text-align: center; padding: 30px; }
    .center-msg .mk { width: 54px; height: 54px; border-radius: 15px; display: grid; place-items: center; background: linear-gradient(135deg, #6366f1, #d946ef); }
    .center-msg .mk span { width: 22px; height: 22px; border: 0; border-top: 2.8px solid #fff; border-left: 2.8px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); }
    .center-msg.spin .mk span { animation: sp .9s linear infinite; }
    @keyframes sp { to { transform: rotate(340deg); } }
    .center-msg h1 { font-size: 20px; margin: 0; } .center-msg p { font-size: 14px; color: var(--muted); margin: 0; max-width: 30em; }
    .center-msg .btn { margin-top: 6px; }
    .empty { padding: 40px; text-align: center; color: var(--faint); font-size: 13.5px; }

    /* --- global task board (Kanban) --- */
    .gb-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; margin-bottom: 22px; overflow: hidden; }
    .gb-head { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: transparent; border: 0; padding: 14px 16px; cursor: pointer; font: inherit; color: inherit; }
    .gb-head:hover { background: var(--softer); }
    .gb-body { padding: 4px 14px 14px; border-top: 1px solid var(--line); }
    .gb-bar { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: flex-start; justify-content: space-between; margin: 12px 0; }
    .gb-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .gb-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); border-radius: 999px; padding: 3px 9px 3px 6px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; max-width: 240px; }
    .gb-chip:hover { border-color: var(--accent); color: var(--ink); }
    .gb-chip.on { background: var(--accent-tint); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
    .gb-chip .gb-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .gb-chip .gb-nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gb-chip .gb-c { font-size: 10.5px; font-weight: 700; background: var(--soft); color: var(--muted); padding: 0 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
    .gb-chip.on .gb-c { background: rgba(255,255,255,.55); color: var(--accent); }
    .gb-tools { display: flex; align-items: center; gap: 8px; flex: none; }
    .gb-seg { display: inline-flex; background: var(--soft); border: 1px solid var(--line); border-radius: 9px; padding: 2px; }
    .gb-seg button { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 7px; cursor: pointer; }
    .gb-seg button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,26,32,.08); }
    .gb-q { border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 9px; padding: 6px 10px; font: inherit; font-size: 12.5px; width: 140px; }
    .gb-q:focus { outline: none; border-color: var(--accent); }
    .gb-owner { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; font-size: 11px; font-weight: 700; color: var(--ink); }
    .gb-chip .av, .gb-owner .av { border-radius: 50%; background-size: cover; display: grid; place-items: center; color: #fff; flex: none; }
    .gb-onm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gb-proj { display: flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; color: var(--muted); margin-bottom: 5px; overflow: hidden; }
    .gb-proj i { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .gb-proj span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bwrap { display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 12px; align-items: flex-start; }
    .bcol { flex: 0 0 240px; background: var(--surface-2); border: 1px solid var(--line); border-top: 3px solid var(--bcap, var(--line)); border-radius: 11px; display: flex; flex-direction: column; max-height: 72vh; }
    .bcol.cap-hu { --bcap: #7c3aed; } .bcol.cap-ai { --bcap: #0e8fa8; } .bcol.cap-bk { --bcap: var(--warn); }
    .bcol-h { display: flex; align-items: center; gap: 7px; padding: 9px 11px 7px; font-size: 11.5px; font-weight: 700; }
    .bcol-t { flex: 1; min-width: 0; }
    .bcol-n { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--soft); padding: 1px 7px; border-radius: 999px; }
    .bcol-b { padding: 7px; display: flex; flex-direction: column; gap: 7px; overflow-y: auto; flex: 1; min-height: 34px; }
    .bcol-empty { font-size: 11px; color: var(--faint); text-align: center; padding: 8px; }
    .bcard { position: relative; background: var(--surface); border: 1px solid var(--line); border-left: 3px solid var(--bst, var(--line)); border-radius: 9px; padding: 8px 9px; cursor: pointer; box-shadow: 0 1px 2px rgba(20,24,40,.04); transition: box-shadow .12s, border-color .12s; }
    .bcard.ai { --bst: #0e8fa8; } .bcard.hu { --bst: #7c3aed; }
    .bcard:hover { box-shadow: 0 6px 16px -8px rgba(20,24,40,.28); border-color: #cfd4e6; }
    .bcard-top { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .bcard-t { font-size: 12px; font-weight: 600; line-height: 1.3; color: var(--ink); }
    .bcard-m { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .bchip { font-size: 9.5px; font-weight: 700; padding: 1px 5px; border-radius: 5px; background: var(--soft); color: var(--muted); font-variant-numeric: tabular-nums; }
    .bchip.who.ai { background: #e0f3f7; color: #0a6f83; } .bchip.who.hu { background: #f1eafe; color: #6425c7; }
    .bchip.ok { background: var(--ok-bg); color: var(--ok); } .bchip.fail { background: var(--danger-bg); color: var(--danger); } .bchip.warn { background: var(--warn-bg); color: var(--warn); }

    @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } .topbar .me span.nm { display: none; } table { font-size: 12.5px; } }

    /* Feature permissions sub-section */
    .perm-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; margin: 8px 0 22px; overflow: hidden; }
    .perm-head { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 18px; background: transparent; border: 0; cursor: pointer; font: inherit; color: inherit; text-align: left; }
    .perm-head:hover { background: var(--surface-2); }
    .perm-ic { font-size: 18px; line-height: 1; }
    .perm-t { font-weight: 700; font-size: 15px; }
    .perm-sub { font-size: 12.5px; color: var(--muted); }
    .perm-cv { margin-left: auto; color: var(--muted); font-size: 13px; }
    .perm-body { border-top: 1px solid var(--line); padding: 14px 18px 18px; }
    .perm-q { width: 100%; max-width: 320px; border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; font: inherit; font-size: 13px; background: var(--surface); color: inherit; display: block; }
    .perm-q:focus { outline: none; border-color: var(--accent); }
    .perm-legend { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 12px 0 14px; }
    .perm-list { display: flex; flex-direction: column; gap: 10px; }
    .perm-user { border: 1px solid var(--line); border-radius: 11px; padding: 12px 14px; }
    .perm-uhead { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
    .perm-uinfo { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
    .perm-uinfo b { font-size: 13.5px; } .perm-uinfo span { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .perm-ustatus { margin-left: auto; flex: none; }
    .perm-pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .perm-pill { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); border-radius: 999px; padding: 5px 11px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: border-color .12s, background .12s, color .12s; }
    .perm-pill:hover { border-color: var(--accent); color: var(--ink); }
    .perm-pill .perm-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); flex: none; transition: background .12s; }
    .perm-pill.on { background: color-mix(in srgb, var(--ok) 13%, transparent); color: var(--ok); border-color: color-mix(in srgb, var(--ok) 42%, transparent); }
    .perm-pill.on .perm-dot { background: var(--ok); }
    .perm-pill.page.on { background: var(--accent-tint); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 42%, transparent); }
    .perm-pill.page.on .perm-dot { background: var(--accent); }
  </style>

    <div class="center-msg spin"><div class="mk"><span></span></div><h1>Loading admin…</h1></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
