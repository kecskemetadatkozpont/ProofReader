<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — researcher profiles & publications</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    if (window.pdfjsLib) { try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; } catch (e) { } }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --surface-3:#fafbfc; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fdf6e3; --danger:#b42318; --danger-bg:#fdeef0;
      --accent: #4f46e5;
      --accent-d: #4338ca;
      --line: #e4e7ec;
      --muted: #6b7280;
      --reading: #ffe08a;
      --serif-size: 17px;
      --mono-size: 13.5px;
      --paper-width: 720px;
      --app-bg: #eceef1;
      --pane: #ffffff;
      --paper-bg: #ffffff;
      --ink: #1d2430;
      --dim: 1;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; margin: 0; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--app-bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    button { font-family: inherit; cursor: pointer; }

    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ---------- top bar ---------- */
    .topbar {
      height: 52px; flex: none; display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 16px; background: var(--pane);
      border-bottom: 1px solid var(--line); gap: 12px; z-index: 5;
    }
    [data-theme="night"] .topbar, [data-theme="night"] .filepanel, [data-theme="night"] .pane-head,
    [data-theme="night"] .transport, [data-theme="night"] .editor { border-color: #283146; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .back-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line); background: var(--pane);
      color: var(--muted); display: grid; place-items: center; text-decoration: none; flex: none; }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }
    .brand-mark {
      width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
      background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 2px 6px rgba(79, 70, 229, .35);
    }
    .brand-mark span { width: 13px; height: 13px; border: 0; border-top: 2.8px solid #fff; border-left: 2.8px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); }
    .brand-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
    .brand-text b { font-size: 14px; font-weight: 700; letter-spacing: -.2px; max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-text i { font-size: 11px; color: var(--muted); font-style: normal; }
    .topbar-center { display: flex; justify-content: center; }
    .file-chip { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 500;
      color: var(--ink); background: color-mix(in srgb, var(--app-bg) 60%, transparent);
      border: 1px solid var(--line); border-radius: 7px; padding: 5px 11px; }
    .file-chip .dot { width: 8px; height: 8px; fill: #16a34a; }
    .topbar-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .btn { display: inline-flex; align-items: center; gap: 7px; height: 32px; padding: 0 13px;
      border: 1px solid var(--line); background: var(--pane); color: var(--ink);
      border-radius: 8px; font-size: 12.5px; font-weight: 600; }
    .btn:hover { background: color-mix(in srgb, var(--accent) 8%, var(--pane)); border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); color: var(--accent); }

    /* ---------- workspace ---------- */
    .workspace { flex: 1; display: flex; min-height: 0; overflow: hidden; }

    .filepanel { width: 226px; flex: none; background: var(--pane); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; }
    .fp-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
    .fp-title { font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); }
    .fp-add { width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--line); background: transparent;
      color: var(--muted); font-size: 16px; line-height: 1; display: grid; place-items: center; }
    .fp-add:hover { color: var(--accent); border-color: var(--accent); }
    .fp-list { flex: 1; overflow: auto; padding: 2px 8px; }
    .fp-item { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; border: 0;
      background: transparent; color: var(--ink); padding: 7px 9px; border-radius: 7px; font-size: 13px; }
    .fp-item:hover { background: color-mix(in srgb, var(--accent) 7%, transparent); }
    .fp-item.active { background: color-mix(in srgb, var(--accent) 13%, transparent); color: var(--accent); font-weight: 600; }
    .fp-ico svg { width: 16px; height: 16px; display: block; opacity: .85; }
    .fp-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fp-foot { padding: 11px 14px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--line); line-height: 1.5; }
    /* document outline / TOC navigator (click an item → jump in both code + preview) */
    .fp-outline { flex: none; max-height: 42%; display: flex; flex-direction: column; border-top: 1px solid var(--line); }
    .fp-out-head { flex: none; display: flex; align-items: center; gap: 4px; width: 100%; border: 0; background: transparent; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 8px 12px 4px; cursor: pointer; }
    .fp-out-n { margin-left: auto; font-style: normal; font-weight: 600; font-size: 10px; color: var(--muted); background: var(--app-bg); border-radius: 9px; padding: 0 6px; }
    .fp-out-list { overflow: auto; padding: 0 6px 6px; }
    .fp-out-i { display: flex; align-items: center; gap: 6px; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); font-size: 12px; line-height: 1.3; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    .fp-out-i:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); color: var(--accent); }
    .fp-out-i.k-chapter, .fp-out-i.k-part { font-weight: 700; }
    .fp-out-i.k-subsubsection { color: var(--muted); }
    .fp-out-i.k-figure, .fp-out-i.k-table { color: var(--muted); }
    .fp-out-tag { font-size: 8.5px; font-weight: 800; padding: 1px 4px; border-radius: 8px; background: var(--app-bg); color: var(--muted); flex: none; }
    .fp-out-t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fp-foot code { background: color-mix(in srgb, var(--app-bg) 70%, transparent); padding: 1px 4px; border-radius: 4px; font-size: 10.5px; }
    .fp-actions { display: flex; gap: 3px; }
    .fp-actions button { width: 24px; height: 24px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--muted); display: grid; place-items: center; }
    .fp-actions button:hover { color: var(--accent); border-color: var(--line); background: var(--pane); }
    .fp-actions svg { width: 15px; height: 15px; }
    .fp-list.drop-root { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent); border-radius: 8px; }
    .tree-row { display: flex; align-items: center; gap: 6px; width: 100%; padding: 6px 8px; border: 0; background: transparent;
      color: var(--ink); font-size: 13px; border-radius: 7px; cursor: pointer; position: relative; user-select: none; }
    .tree-row:hover { background: color-mix(in srgb, var(--accent) 7%, transparent); }
    .tree-row.file.active { background: color-mix(in srgb, var(--accent) 13%, transparent); color: var(--accent); font-weight: 600; }
    .tree-row.folder.sel { background: color-mix(in srgb, var(--accent) 9%, transparent); }
    .tree-row.drop { background: color-mix(in srgb, var(--accent) 18%, transparent); box-shadow: inset 0 0 0 1.5px var(--accent); }
    .chev { width: 14px; height: 14px; flex: none; display: grid; place-items: center; color: var(--muted); transition: transform .12s; }
    .chev svg { width: 12px; height: 12px; } .chev.open { transform: rotate(90deg); }
    .chev-spacer { width: 14px; flex: none; }
    .fp-ico { flex: none; display: grid; place-items: center; }
    .fp-ico svg { width: 16px; height: 16px; opacity: .85; display: block; }
    .folder-ico svg { color: #d9a300; opacity: 1; }
    .fp-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .row-actions { display: none; gap: 1px; flex: none; }
    .tree-row:hover .row-actions, .tree-row:focus-within .row-actions, .row-actions:focus-within { display: flex; }
    .row-actions button { width: 21px; height: 21px; border: 0; background: transparent; color: var(--muted); border-radius: 5px; display: grid; place-items: center; }
    .row-actions button:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .row-actions button.del:hover { color: var(--danger); background: var(--danger-bg); }
    .row-actions button.fnote.has { color: var(--accent); }
    /* per-file note (what it is / why it was added) */
    .fp-note-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex: none; margin: 0 2px; }
    .fp-note-edit { padding: 4px 10px 8px; }
    .fp-note-edit textarea { width: 100%; min-height: 46px; resize: vertical; font: inherit; font-size: 11.5px; line-height: 1.4; border: 1px solid var(--accent); border-radius: 7px; padding: 6px 8px; outline: none; background: var(--pane); color: var(--ink); }
    .fp-note-hint { font-size: 9.5px; color: var(--muted); margin-top: 3px; }
    .row-actions svg { width: 13px; height: 13px; }
    .tree-rename { flex: 1; min-width: 0; font: inherit; font-size: 13px; border: 1px solid var(--accent); border-radius: 5px; padding: 2px 5px; outline: none;
      background: var(--pane); color: var(--ink); }

    .editor-pane, .preview-pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--pane); }
    .pane-head { height: 34px; flex: none; display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; border-bottom: 1px solid var(--line); }
    .ph-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .ph-hint { font-size: 11px; color: var(--muted); opacity: .8; }
    .ph-right { display: flex; align-items: center; gap: 12px; }
    .ph-ok { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--ok); opacity: .9; }
    .diag-wrap { position: relative; }
    .diag-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--warn); background: color-mix(in srgb, #f59e0b 14%, var(--pane)); border: 1px solid color-mix(in srgb, #f59e0b 42%, var(--line)); padding: 3px 9px; border-radius: 20px; }
    .diag-chip:hover, .diag-chip.on { background: color-mix(in srgb, #f59e0b 24%, var(--pane)); }
    .diag-pop { position: absolute; top: calc(100% + 6px); right: 0; width: 330px; max-height: 300px; overflow: auto; background: var(--pane); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 14px 38px rgba(20,24,40,.22); z-index: 40; padding: 6px; }
    .diag-head { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 6px 8px 4px; }
    .diag-row { display: flex; align-items: flex-start; gap: 8px; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); padding: 7px 8px; border-radius: 8px; font-size: 12px; line-height: 1.4; }
    .diag-row:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); }
    .diag-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; margin-top: 4px; }
    .diag-dot.warn { background: #f59e0b; } .diag-dot.error { background: #dc2626; }
    .diag-msg { flex: 1; } .diag-msg em { color: var(--muted); font-style: normal; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .diag-fix { flex: none; align-self: center; border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line)); background: color-mix(in srgb, var(--accent) 10%, var(--pane));
      color: var(--accent); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 7px; }
    .diag-fix:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .sent.cursor { background: color-mix(in srgb, var(--accent) 12%, transparent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 16%, transparent); border-radius: 3px; }
    @keyframes sentFlash { 0% { background: color-mix(in srgb, var(--accent) 48%, transparent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 38%, transparent); } 100% { background: transparent; box-shadow: 0 0 0 0 transparent; } }
    .sent.sent-flash { animation: sentFlash 1.6s ease-out; border-radius: 4px; }
    .tree-row.folder[draggable="true"] { cursor: grab; }
    .tree-row.folder[draggable="true"]:active { cursor: grabbing; }

    .splitter { width: 7px; flex: none; cursor: col-resize; background: var(--app-bg); display: grid; place-items: center; }
    .splitter span { width: 1px; height: 30px; background: var(--line); border-radius: 1px; }
    .splitter:hover span { background: var(--accent); height: 60px; }

    /* ---------- dynamic window management ---------- */
    .ws-area { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; background: var(--app-bg); }
    .ws-toolbar { height: 40px; flex: none; display: flex; align-items: center; gap: 10px; padding: 0 12px; border-bottom: 1px solid var(--line); background: var(--pane); }
    .ws-tb-sp { flex: 1; }
    .ws-presets { display: flex; gap: 3px; }
    .ws-preset { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px; border: 1px solid transparent; background: transparent; color: var(--muted); border-radius: 7px; font-size: 12px; font-weight: 600; }
    .ws-preset svg { opacity: .8; } .ws-preset:hover { color: var(--ink); background: color-mix(in srgb, var(--accent) 7%, transparent); }
    .ws-preset.on { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    @media (max-width: 1100px) { .ws-preset span { display: none; } .ws-preset { padding: 0 7px; } }
    .add-wrap { position: relative; }
    .add-pane-btn.on { color: var(--accent); border-color: var(--accent); }

    .ws-root { flex: 1; min-height: 0; min-width: 0; position: relative; overflow: hidden; }
    .ws-root.ws-empty { display: grid; place-items: center; }
    .ws-add-empty { border: 1.5px dashed var(--accent); color: var(--accent); background: transparent; border-radius: 10px; padding: 12px 20px; font-weight: 600; font-size: 14px; }
    .ws-split { position: absolute; inset: 0; display: flex; }
    .ws-split.row { flex-direction: row; } .ws-split.col { flex-direction: column; }
    .ws-cell { position: relative; display: flex; }
    .ws-divider { flex: none; background: var(--app-bg); display: grid; place-items: center; z-index: 2; }
    .ws-divider.row { width: 7px; cursor: col-resize; } .ws-divider.col { height: 7px; cursor: row-resize; }
    .ws-divider span { background: var(--line); border-radius: 2px; display: block; }
    .ws-divider.row span { width: 2px; height: 34px; } .ws-divider.col span { height: 2px; width: 34px; }
    .ws-divider:hover span { background: var(--accent); }
    .ws-divider.row:hover span { height: 70px; } .ws-divider.col:hover span { width: 70px; }

    .ws-pane { position: absolute; inset: 0; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--pane); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .ws-cell > .ws-pane { margin: 4px; inset: 0; position: absolute; width: auto; height: auto; }
    .ws-root > .ws-pane { margin: 6px; }
    .ws-pane.focused { border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent), 0 4px 16px rgba(20,24,40,.07); }
    .ws-head { height: 32px; flex: none; display: flex; align-items: center; gap: 6px; padding: 0 6px 0 9px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--app-bg) 45%, var(--pane)); }
    .ws-sync-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; box-shadow: 0 0 0 2px color-mix(in srgb, currentColor 8%, transparent); }
    .ws-type { display: grid; place-items: center; color: var(--muted); } .ws-type svg { width: 14px; height: 14px; }
    .ws-type.source { color: #4f46e5; } .ws-type.preview { color: var(--ok); } .ws-type.pdf { color: var(--warn); } .ws-type.image { color: #db2777; }
    .ws-name { display: inline-flex; align-items: center; gap: 6px; border: 0; background: transparent; color: var(--ink); font-size: 12px; font-weight: 600; padding: 3px 6px; border-radius: 6px; max-width: 60%; }
    .ws-name:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); } .ws-name-t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ws-caret { opacity: .5; } .ws-ro { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--warn); background: var(--warn-bg); padding: 1px 5px; border-radius: 10px; }
    .ws-reading { font-size: 9.5px; font-weight: 700; color: var(--ok); } 
    .ws-head-sp { flex: 1; }
    .ws-hbtn { width: 26px; height: 26px; border: 0; background: transparent; color: var(--muted); border-radius: 6px; display: grid; place-items: center; }
    .ws-hbtn:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .ws-close:hover { color: var(--danger); background: var(--danger-bg); }
    .ws-body { flex: 1; min-height: 0; min-width: 0; position: relative; display: flex; flex-direction: column; }
    .ws-pane.dragging { opacity: .55; }
    .ws-head[draggable="true"] { cursor: grab; }
    .ws-head[draggable="true"]:active { cursor: grabbing; }
    .ws-dropzone { position: absolute; z-index: 18; pointer-events: none; border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 22%, transparent); box-shadow: inset 0 0 0 2px var(--accent);
      display: grid; place-items: center; transition: all .08s ease; }
    .ws-dropzone.dz-left { left: 0; top: 0; bottom: 0; width: 50%; }
    .ws-dropzone.dz-right { right: 0; top: 0; bottom: 0; width: 50%; }
    .ws-dropzone.dz-top { left: 0; right: 0; top: 0; height: 50%; }
    .ws-dropzone.dz-bottom { left: 0; right: 0; bottom: 0; height: 50%; }
    .ws-dropzone.dz-center { inset: 14%; }
    .ws-drop-hint { font-size: 11px; font-weight: 700; color: #fff; background: var(--accent); padding: 3px 10px; border-radius: 20px; box-shadow: 0 2px 8px rgba(20,24,40,.25); }
    .ws-body > .editor, .ws-body > .preview-scroll, .ws-body > .pdf-render, .ws-body > .pdf-frame, .ws-body > .img-pane, .ws-body > .pane-missing { flex: 1; min-height: 0; }
    .ws-body > .preview-scroll { padding-top: 20px; }

    /* pane menus */
    .ws-menu { position: absolute; top: 30px; z-index: 30; background: var(--pane); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 14px 36px rgba(20,24,40,.22); padding: 5px; min-width: 184px; }
    .ws-menu.bm { left: 26px; } .ws-menu.sm { right: 30px; }
    .ws-menu-h { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 6px 9px 3px; }
    .ws-menu-i, .ws-menu button.ws-back, .ws-menu > button { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); font-size: 12.5px; padding: 7px 9px; border-radius: 7px; }
    .ws-menu-i svg { width: 14px; height: 14px; color: var(--muted); flex: none; } .ws-menu-i .ws-name-t { flex: 1; }
    .ws-menu-i:hover, .ws-menu > button:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); }
    .ws-menu-i.sel { color: var(--accent); font-weight: 600; }
    .ws-menu-i em { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--warn); background: var(--warn-bg); padding: 1px 5px; border-radius: 10px; font-style: normal; }
    .ws-menu-sep { height: 1px; background: var(--line); margin: 4px 4px; }
    .ws-chev { margin-left: auto; color: var(--muted); } .ws-back { color: var(--muted) !important; font-weight: 600; }
    .ws-seg { display: flex; gap: 5px; padding: 2px 6px 6px; } .ws-seg button { flex: 1; border: 1px solid var(--line); background: var(--pane); border-radius: 7px; padding: 6px; font-size: 12px; font-weight: 600; color: var(--ink); }
    .ws-seg button.on { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--pane)); color: var(--accent); }
    .ws-menu-empty { padding: 8px 9px; font-size: 12px; color: var(--muted); }
    .ws-art-row { display: flex; align-items: center; gap: 6px; padding: 5px 9px; } .ws-art-row .ws-name-t { flex: 1; font-size: 12.5px; }
    .ws-art-row button { border: 1px solid var(--line); background: var(--pane); color: var(--ink); font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
    .ws-art-row button:hover { border-color: var(--accent); color: var(--accent); } .ws-art-row button.both { background: var(--accent); color: #fff; border-color: var(--accent); }
    .ws-add-menu { position: absolute; top: 38px; right: 0; z-index: 40; background: var(--pane); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 16px 40px rgba(20,24,40,.24); padding: 6px; width: 280px; max-height: 70vh; overflow: auto; }

    /* pdf + image panes */
    .pdf-render { position: relative; display: flex; flex-direction: column; background: #f3f0ec; }
    /* floating PDF zoom control (compiled + rendered + uploaded PDF panes) */
    .pdf-zoom { position: absolute; right: 14px; bottom: 14px; z-index: 8; display: inline-flex; align-items: center; gap: 2px; background: var(--pane); border: 1px solid var(--line); border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,.18); padding: 3px; }
    .pdf-zoom button { border: 0; background: transparent; color: var(--ink); font: inherit; font-size: 14px; font-weight: 700; min-width: 28px; height: 26px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .pdf-zoom button:hover { background: color-mix(in srgb, var(--accent) 12%, var(--pane)); color: var(--accent); }
    .pdf-zoom .pz-pct { min-width: 48px; font-size: 12px; }
    /* IDE-style quick scrollbar / minimap on the compiled PDF — click or drag to jump to a region */
    .pdf-rail { position: absolute; top: 0; right: 0; bottom: 0; width: 12px; z-index: 7; cursor: pointer; background: linear-gradient(var(--line), var(--line)) center / 1px 100% no-repeat; }
    .pdf-rail-thumb { position: absolute; left: 2px; right: 2px; min-height: 26px; background: color-mix(in srgb, var(--accent) 42%, transparent); border-radius: 6px; box-shadow: 0 0 0 1px rgba(0,0,0,.18); transition: background .12s ease; }
    .pdf-rail:hover .pdf-rail-thumb { background: var(--accent); }
    .pdf-render-bar { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--line); background: var(--pane); font-size: 11.5px; color: var(--muted); font-weight: 600; }
    .pdf-render-bar .prb-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }   /* keep the Recompile/Word buttons always visible */
    .cspin { display: inline-block; width: 11px; height: 11px; margin-right: 6px; vertical-align: -1px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: cspin .7s linear infinite; }
    @keyframes cspin { to { transform: rotate(360deg); } }
    .pdf-render-bar button { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: var(--pane); color: var(--accent); font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 7px; }
    .pdf-render-bar button:hover { border-color: var(--accent); }
    .pdf-render-scroll { flex: 1; min-height: 0; overflow: auto; padding: 18px; display: flex; justify-content: safe center; }
    .pdf-paper { background: var(--surface); color: var(--ink); width: 100%; max-width: 600px; height: max-content; padding: 40px 44px; border-radius: 2px; box-shadow: 0 2px 8px rgba(0,0,0,.14); font-family: 'Source Serif 4', Georgia, serif; }
    .pdf-frame { border: 0; width: 100%; background: #525659; }
    .pdf-view-wrap { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; background: #6b7280; }
    .pdf-view { flex: 1; min-height: 0; overflow: auto; padding: 14px; display: flex; flex-direction: column; align-items: safe center; gap: 12px; }
    .pdf-page { max-width: 100%; border-radius: 2px; box-shadow: 0 2px 10px rgba(0,0,0,.35); background: var(--surface); }
    .pdf-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 13px; background: rgba(0,0,0,.35); padding: 8px 14px; border-radius: 20px; }
    .pdf-status a { color: #c7d2fe; font-weight: 600; }
    .pdf-fallback { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: var(--app-bg); color: var(--muted); font-size: 13px; text-align: center; padding: 24px; }
    .pdf-fallback a { color: var(--accent); font-weight: 600; text-decoration: none; } .pdf-fallback a:hover { text-decoration: underline; }
    /* Compiled-pane PDF view with read-aloud text layer (lazy-rendered) */
    .ct-scroll { position: relative; flex: 1; min-height: 0; overflow: auto; padding: 14px; display: flex; flex-direction: column; align-items: safe center; gap: 12px; background: #6b7280; scrollbar-width: none; }
    .ct-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }   /* the custom .pdf-rail replaces the native scrollbar here */
    .ct-doc { display: flex; flex-direction: column; align-items: center; gap: 12px; width: max-content; }   /* CSS-`zoom`ed wrapper → smooth, re-render-free zoom */
    .ct-page { position: relative; border-radius: 2px; box-shadow: 0 2px 10px rgba(0,0,0,.35); background: var(--surface); }
    .ct-page canvas.ct-canvas { display: block; border-radius: 2px; }
    .ct-textlayer { position: absolute; left: 0; top: 0; overflow: hidden; line-height: 1; opacity: 1; }
    .ct-textlayer > span { color: transparent; position: absolute; white-space: pre; cursor: pointer; transform-origin: 0 0; border-radius: 2px; }
    /* PDF.js selection helper — makes drag-selection precise (see workspace.jsx): a clean full-width boundary
       the selection lands on, instead of snapping to far-away absolutely-positioned spans. */
    .ct-textlayer .endOfContent { display: block; position: absolute; left: 0; top: 100%; right: 0; bottom: 0; z-index: -1; cursor: default; user-select: none; -webkit-user-select: none; }
    .ct-textlayer .endOfContent.active { top: 0; }
    .ct-textlayer > span::selection { background: rgba(79,70,229,.35); }
    .ct-textlayer > span::-moz-selection { background: rgba(79,70,229,.35); }
    .ct-textlayer > span.sent:hover { background: rgba(79,70,229,.18); }
    .ct-textlayer > span.sent-cur { background: rgba(255,170,0,.42); box-shadow: 0 0 0 1px rgba(255,140,0,.35); }
    .ct-textlayer > span.sent-cursor { background: rgba(79,70,229,.26); box-shadow: 0 0 0 1px rgba(79,70,229,.3); }
    /* comment/to-do highlight on the compiled PDF (reuse preview colors; reset padding/margin for positioned spans) */
    .ct-textlayer > span.sent.has-comment, .ct-textlayer > span.sent.has-todo, .ct-textlayer > span.sent.has-both { padding: 0; margin: 0; }
    /* ♪ marks sentences already voiced with ElevenLabs (free to replay) — faint tint + a note on the last span */
    .ct-textlayer > span.sent.voiced { background: color-mix(in srgb, var(--accent) 9%, transparent); }
    .ct-textlayer > span.sent.voiced-end::after { content: '\266A'; color: var(--accent); opacity: .9; font-weight: 700; margin-left: 1px; pointer-events: none; }
    /* AI-review markers on the compiled PDF */
    .ct-textlayer > span.sent.review-major { background: color-mix(in srgb, #dc2626 16%, transparent); }
    .ct-textlayer > span.sent.review-minor { background: color-mix(in srgb, #b4530f 15%, transparent); }
    .ct-textlayer > span.sent.review-nit { background: color-mix(in srgb, #64748b 14%, transparent); }
    .ct-textlayer > span.sent.review-end::after { content: '\2726'; color: var(--danger); font-weight: 700; margin-left: 1px; pointer-events: none; }
    .ct-textlayer > span.sent.review-minor.review-end::after { color: var(--warn); }
    .ct-textlayer > span.sent.review-nit.review-end::after { color: var(--muted); }
    .img-pane { background: #2a2530; display: grid; place-items: center; overflow: auto; padding: 14px; }
    .img-pane img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 3px; box-shadow: 0 4px 18px rgba(0,0,0,.4); }
    .pane-missing { display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }

    /* transport doc chip + drawer doc banner */
    .tp-doc { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 600; color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); padding: 1px 8px 1px 6px; border-radius: 20px; letter-spacing: 0; text-transform: none; }
    .drawer-doc { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 8px 12px; border-bottom: 1px solid var(--line); font-size: 11.5px; color: var(--muted); background: color-mix(in srgb, var(--app-bg) 50%, var(--pane)); }
    .drawer-doc b { color: var(--ink); } .drawer-doc .dd-hint { opacity: .8; }
    .thread-file { font-size: 9.5px; font-weight: 600; color: var(--muted); background: var(--app-bg); padding: 1px 6px; border-radius: 10px; margin-left: 7px; vertical-align: middle; }

    /* ---------- code editor ---------- */
    .editor { flex: 1; min-height: 0; display: flex; background: var(--pane); position: relative; }
    .gutter { width: 54px; flex: none; overflow: hidden; background: color-mix(in srgb, var(--app-bg) 45%, var(--pane));
      border-right: 1px solid var(--line); }
    .gutter-inner { padding: 14px 10px 14px 0; font-family: 'JetBrains Mono', monospace; text-align: right; }
    .ln { color: color-mix(in srgb, var(--muted) 75%, transparent); font-variant-numeric: tabular-nums; }
    .ln-active { color: var(--accent); font-weight: 500; }

    .codearea { position: relative; flex: 1; min-width: 0; overflow: hidden; }
    .backdrop, .code-input {
      position: absolute; inset: 0; margin: 0; border: 0; padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace; white-space: pre; tab-size: 2; -moz-tab-size: 2; overflow: auto;
      letter-spacing: 0; word-spacing: 0; box-sizing: border-box; line-height: 1.6;
      /* JetBrains Mono ligatures (->, !=, ::, …) merge glyphs in the <pre> backdrop but NOT in the <textarea>
         caret layer, which drifts the caret. Disable ligatures on BOTH layers so glyph advance matches. */
      font-variant-ligatures: none; font-kerning: none; font-feature-settings: "liga" 0, "calt" 0;
    }
    .backdrop { pointer-events: none; color: var(--ink); overflow: hidden; }
    .code-input { color: transparent; caret-color: var(--accent); background: transparent; resize: none; outline: none; }
    .code-input::selection { background: color-mix(in srgb, var(--accent) 25%, transparent); }
    /* soft word-wrap: long lines fold to the pane width (no horizontal scroll). The line-number gutter can't
       stay aligned with wrapped rows in a textarea editor, so it's hidden while wrapping. */
    .editor.wrap .code-input, .editor.wrap .backdrop { white-space: pre-wrap; overflow-wrap: break-word; overflow-x: hidden; }
    .editor.wrap .gutter { display: none; }
    .cw-wrap { position: absolute; top: 8px; right: 12px; z-index: 16; border: 1px solid var(--line); background: var(--pane);
      color: var(--muted); font-family: inherit; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px; opacity: .55; transition: opacity .15s ease; }
    .codearea:hover .cw-wrap { opacity: 1; }
    .cw-wrap.on { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
    /* blinking purple caret pulse when jumping to the exact spot from the preview / compiled PDF */
    .jump-cursor { position: absolute; width: 2.5px; z-index: 15; background: var(--accent); border-radius: 2px;
      box-shadow: 0 0 7px 1.5px color-mix(in srgb, var(--accent) 65%, transparent); pointer-events: none;
      transform-origin: center; animation: jump-cur 1.9s ease-out forwards; }
    @keyframes jump-cur {
      0% { opacity: 1; transform: scaleY(1.2); } 12% { opacity: .15; } 24% { opacity: 1; } 36% { opacity: .15; }
      48% { opacity: 1; } 60% { opacity: .15; } 72% { opacity: 1; transform: scaleY(1); } 100% { opacity: 0; } }

    /* find & replace bar */
    .find-bar { position: absolute; top: 8px; right: 14px; z-index: 14; background: var(--pane); border: 1px solid var(--line);
      border-radius: 10px; box-shadow: 0 8px 26px rgba(20,24,40,.18); padding: 7px; display: flex; flex-direction: column; gap: 6px; width: 340px; }
    [data-theme="night"] .find-bar { border-color: #2c3650; }
    .fb-row { display: flex; align-items: center; gap: 6px; }
    .fb-in { flex: 1; min-width: 0; height: 28px; border: 1px solid var(--line); border-radius: 7px; background: var(--app-bg);
      color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 0 8px; outline: none; }
    .fb-in:focus { border-color: var(--accent); background: var(--pane); }
    .fb-count { font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 46px; text-align: right; }
    .fb-count.err { color: var(--danger); }
    .fb-tgs { display: flex; gap: 2px; }
    .fb-tg { min-width: 24px; height: 24px; padding: 0 5px; border: 1px solid var(--line); background: var(--pane); color: var(--muted);
      border-radius: 6px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .fb-tg.on { background: color-mix(in srgb, var(--accent) 14%, var(--pane)); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); color: var(--accent); }
    .fb-tg:hover { color: var(--accent); }
    .fb-btn { width: 26px; height: 26px; border: 1px solid var(--line); background: var(--pane); color: var(--muted); border-radius: 6px; display: grid; place-items: center; font-size: 13px; }
    .fb-btn:hover { color: var(--accent); border-color: var(--accent); }
    .fb-x:hover { color: var(--danger); border-color: #dc2626; }
    .fb-rep { height: 28px; padding: 0 11px; border: 1px solid var(--line); background: var(--pane); color: var(--ink); border-radius: 7px; font-size: 11.5px; font-weight: 600; }
    .fb-rep:hover { color: var(--accent); border-color: var(--accent); }

    /* autocomplete menu */
    .ac-menu { position: absolute; z-index: 16; background: var(--pane); border: 1px solid var(--line); border-radius: 9px;
      box-shadow: 0 10px 30px rgba(20,24,40,.2); padding: 4px; min-width: 168px; max-width: 280px; overflow: hidden; }
    [data-theme="night"] .ac-menu { border-color: #2c3650; }
    .ac-item { display: flex; align-items: center; gap: 8px; padding: 5px 9px; border-radius: 6px; font-size: 12.5px; color: var(--ink); cursor: pointer; }
    .ac-item.on { background: color-mix(in srgb, var(--accent) 13%, var(--pane)); color: var(--accent); }
    .ac-label { font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ac-hint { margin-left: auto; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #be185d;
      background: color-mix(in srgb, #be185d 11%, var(--pane)); padding: 1px 6px; border-radius: 10px; }
    /* ✨ AI writing-assist bar on a source selection */
    .ai-bar { position: fixed; z-index: 200; display: flex; align-items: center; gap: 3px; background: var(--pane); border: 1px solid var(--line); border-radius: 11px; padding: 5px; box-shadow: 0 14px 36px rgba(20,24,40,.34); font-size: 12.5px; }
    .ai-bar-wide { display: block; width: 320px; }
    .ai-bar-h { font-size: 14px; padding: 0 4px; }
    .ai-bar-b, .ai-bar-x, .ai-bar-accept { border: 0; background: transparent; color: var(--ink); border-radius: 7px; padding: 5px 9px; font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; }
    .ai-bar-b:hover { background: var(--surface-2, color-mix(in srgb, var(--accent) 9%, var(--pane))); color: var(--accent); }
    .ai-bar-x { color: var(--faint, #8a92a0); font-size: 16px; line-height: 1; }
    .ai-bar-accept { background: var(--accent); color: #fff; }
    .ai-bar-accept:hover { filter: brightness(1.08); }
    .ai-bar-busy { padding: 5px 11px; color: var(--muted); }
    .ai-bar-err { padding: 5px 9px; color: var(--danger, #dc2626); font-weight: 600; }
    .ai-bar-res-t { font-size: 13px; line-height: 1.5; max-height: 220px; overflow-y: auto; padding: 9px 11px; background: var(--surface-2, color-mix(in srgb, var(--accent) 6%, var(--pane))); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; white-space: pre-wrap; }
    .ai-bar-row { display: flex; gap: 6px; }

    /* command palette (⌘K) */
    .cmdk-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(15,18,30,.4); display: flex; justify-content: center; align-items: flex-start; padding-top: 12vh; }
    .cmdk { width: 560px; max-width: calc(100% - 40px); background: var(--pane); border: 1px solid var(--line); border-radius: 14px;
      box-shadow: 0 24px 70px rgba(20,24,40,.4); overflow: hidden; display: flex; flex-direction: column; max-height: 64vh; }
    [data-theme="night"] .cmdk { border-color: #2c3650; }

    .cmdk-in input { flex: 1; border: 0; background: transparent; outline: none; font: inherit; font-size: 15px; color: var(--ink); }
    .cmdk-esc { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border: 1px solid var(--line); border-radius: 5px; padding: 2px 6px; }
    .cmdk-list { overflow: auto; padding: 6px; }
    .cmdk-empty { padding: 22px; text-align: center; color: var(--muted); font-size: 13px; }
    .cmdk-gh { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 8px 10px 4px; }
    .cmdk-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 8px; font-size: 13.5px; color: var(--ink); cursor: pointer; }
    .cmdk-row.on { background: color-mix(in srgb, var(--accent) 12%, var(--pane)); color: var(--accent); }
    .cmdk-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cmdk-hint { font-size: 10.5px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .cmdk-kind { font-size: 9.5px; font-weight: 700; min-width: 28px; text-align: center; color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, var(--pane)); border-radius: 5px; padding: 2px 4px; }
    .cmdk-kind.figure { color: #db2777; background: color-mix(in srgb, #db2777 12%, var(--pane)); }
    .cmdk-kind.table { color: var(--warn); background: color-mix(in srgb, #d9760b 12%, var(--pane)); }
    .tk-cmd { color: #7c3aed; } .tk-com { color: #94a3b8; font-style: italic; }
    .tk-math { color: #0e7490; } .tk-br { color: var(--warn); } .tk-sp { color: #be185d; }
    [data-theme="night"] .tk-cmd { color: #c4b5fd; } [data-theme="night"] .tk-com { color: var(--muted); }
    [data-theme="night"] .tk-math { color: #67e8f9; } [data-theme="night"] .tk-br { color: #fbbf24; } [data-theme="night"] .tk-sp { color: #f9a8d4; }
    mark.rd { background: var(--reading); color: inherit; border-radius: 2px;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--reading) 70%, #00000022); -webkit-box-decoration-break: clone; box-decoration-break: clone; }
    mark.fm { background: color-mix(in srgb, #f6c344 45%, transparent); color: inherit; border-radius: 2px; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
    mark.fm.cur { background: color-mix(in srgb, #f59e0b 78%, transparent); box-shadow: 0 0 0 1.5px #d97706; }
    [data-theme="night"] mark.fm { background: color-mix(in srgb, #7c6312 60%, transparent); }
    [data-theme="night"] mark.fm.cur { background: color-mix(in srgb, #b9831a 80%, transparent); box-shadow: 0 0 0 1.5px #f59e0b; }
    /* spell-check squiggle — red wavy underline under a misspelled word, no fill */
    mark.sp-err { background: transparent; color: inherit; text-decoration: underline; text-decoration-style: wavy; text-decoration-color: #dc2626; text-decoration-skip-ink: none; text-underline-offset: 2px; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
    [data-theme="night"] mark.sp-err { text-decoration-color: #f87171; }
    /* subtle comment/to-do underlay in the LaTeX code (matches the preview .has-comment/.has-todo colors) */
    mark.anno-c { background: color-mix(in srgb, var(--accent) 13%, transparent); color: inherit; border-radius: 2px; box-shadow: inset 0 -1.5px 0 0 color-mix(in srgb, var(--accent) 50%, transparent); -webkit-box-decoration-break: clone; box-decoration-break: clone; }
    mark.anno-t { background: color-mix(in srgb, #d9760b 13%, transparent); color: inherit; border-radius: 2px; box-shadow: inset 0 -1.5px 0 0 #e08a1e; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
    /* per-category highlight toggles (the ✎/✓/∿ buttons set these classes on the editor root) */
    .editor.hl-hide-comment mark.anno-c { background: transparent; box-shadow: none; }
    .editor.hl-hide-todo mark.anno-t { background: transparent; box-shadow: none; }
    .editor.hl-hide-spell mark.sp-err { text-decoration: none; }

    /* ---------- preview ---------- */
    .preview-scroll { flex: 1; min-height: 0; overflow: auto; background: var(--app-bg); padding: 30px 0 80px; position: relative; }
    /* #6 — margin comment/to-do cards anchored beside their sentence, scrolling with the document */
    .preview-scroll.has-anno-margin { padding-right: 248px; }
    .anno-margin-card { position: absolute; right: 14px; width: 218px; background: var(--pane); border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 9px; padding: 7px 9px; box-shadow: 0 2px 8px rgba(20,24,40,.08); cursor: pointer; z-index: 6; }
    .anno-margin-card.todo { border-left-color: #d9760b; }
    .anno-margin-card:hover { box-shadow: 0 6px 18px rgba(20,24,40,.16); border-color: var(--accent); }
    .amc-head { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .amc-head .anno-av { width: 18px; height: 18px; font-size: 9px; margin-left: 0; box-shadow: none; flex: none; }
    .amc-head b { font-size: 11.5px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .amc-more { font-size: 10px; color: var(--muted); margin-left: auto; flex: none; }
    .amc-body { font-size: 11.5px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    /* same margin cards on the REAL compiled PDF (#6) — a right gutter is reserved when annotations exist;
       a small left-pointing tail makes each card read as a speech bubble for its sentence */
    .ct-scroll.ct-has-gutter { padding-right: 254px; }
    .anno-margin-card::before { content: ''; position: absolute; left: -7px; top: 13px; width: 0; height: 0; border: 6px solid transparent; border-right-color: var(--pane); }
    .anno-margin-card.expanded .amc-body { -webkit-line-clamp: unset; overflow: visible; }
    .anno-margin-card.expanded { box-shadow: 0 10px 26px rgba(20,24,40,.22); border-color: var(--accent); z-index: 9; }
    /* floating thread popover opened from a margin bubble — full conversation + reply + resolve, no list */
    .bubble-pop { position: fixed; z-index: 90; background: var(--pane, #fff); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 18px 50px rgba(15,20,40,.28); display: flex; flex-direction: column; max-height: 72vh; overflow: hidden; }
    .bubble-pop-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .bubble-pop-x { border: 1px solid var(--line); background: var(--app-bg); color: var(--ink); font-size: 13px; font-weight: 700; line-height: 1; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; display: grid; place-items: center; flex: none; }
    .bubble-pop-x:hover { background: var(--danger-bg, #fdeef0); color: var(--danger, #b42318); border-color: var(--danger, #b42318); }
    .bubble-pop-body { padding: 8px; overflow: auto; }
    .bubble-empty { padding: 14px 8px; color: var(--muted); font-size: 12px; text-align: center; }
    .paper { background: var(--paper-bg); color: var(--ink); width: var(--paper-width); max-width: calc(100% - 48px);
      margin: 0 auto; padding: 56px 64px 64px; border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 12px 32px rgba(20,24,40,.10);
      font-family: 'Source Serif 4', Georgia, serif; font-size: var(--serif-size); line-height: 1.62; }
    .paper p { margin: 0 0 .7em; text-align: justify; hyphens: auto; }
    .titleblock { text-align: center; margin-bottom: 30px; }
    .paper-title { font-size: 1.62em; font-weight: 700; line-height: 1.25; margin: 0 0 .5em; letter-spacing: -.01em; }
    .paper-author { font-size: 1.02em; margin-bottom: .15em; }
    .paper-date { font-size: .92em; color: var(--muted); }
    .abstract { margin: 0 auto 26px; width: 88%; font-size: .94em; }
    .abstract-title { text-align: center; font-weight: 700; font-size: .92em; letter-spacing: .04em; margin-bottom: .35em; }
    .abstract p { text-align: justify; }
    .hd { font-weight: 700; line-height: 1.25; margin: 1.5em 0 .5em; }
    h2.hd { font-size: 1.24em; } h3.hd { font-size: 1.09em; } h4.hd { font-size: 1em; }
    .secnum { font-variant-numeric: tabular-nums; }
    .list { margin: .2em 0 .8em; padding-left: 1.4em; } .list li { margin: .18em 0; }
    .figure { margin: 1.1em 0; text-align: center; }
    .fig-img img { max-width: 100%; border: 1px solid var(--line); border-radius: 2px; background: var(--surface); }
    .img-missing { padding: 30px; border: 1px dashed #f0a868; color: var(--warn); background: color-mix(in srgb, #f59e0b 8%, transparent); border-radius: 4px; font-size: .85em; }
    figcaption, .table-cap { font-size: .85em; color: color-mix(in srgb, var(--ink) 80%, transparent); margin-top: .6em; line-height: 1.45; text-align: left; }
    .cap-label { font-weight: 700; }
    .dmath { margin: .8em 0; text-align: center; position: relative; }
    .dmath.numbered::after { content: attr(data-eqn); position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: .85em; color: var(--muted); }
    .table-float { margin: 1.1em auto; text-align: center; }
    table.tabular { margin: 0 auto; border-collapse: collapse; font-size: .92em; }
    table.tabular th, table.tabular td { padding: 4px 16px; }
    table.tabular th { border-bottom: 1.5px solid var(--ink); border-top: 1.5px solid var(--ink); }
    table.tabular tr:last-child td { border-bottom: 1.5px solid var(--ink); }
    blockquote { margin: 1em 0; padding-left: 1em; border-left: 3px solid var(--line); color: color-mix(in srgb, var(--ink) 85%, transparent); }
    .center { text-align: center; }
    .thm { margin: .8em 0; } .thm-h { font-style: italic; font-weight: 700; }
    .verb { font-family: 'JetBrains Mono', monospace; font-size: .82em; background: color-mix(in srgb, var(--app-bg) 70%, transparent);
      padding: 10px 14px; border-radius: 5px; overflow: auto; white-space: pre; }
    .cite { color: var(--accent); } .url { color: var(--accent); text-decoration: none; }
    .sc { font-variant: small-caps; } .latex-a { position: relative; top: -.2em; font-size: .8em; margin: 0 -.12em; }
    .latex-e { position: relative; top: .2em; margin: 0 -.05em; }
    .math-raw { font-family: 'JetBrains Mono', monospace; color: #0e7490; }

    /* reading highlight in preview */
    .sent { transition: background .18s, opacity .18s; border-radius: 3px; }
    .sent.reading { background: var(--reading); box-shadow: 0 0 0 3px var(--reading); }
    .preview-scroll.reading-mode .sent:not(.reading) { opacity: calc(1 - .5 * var(--dim)); }
    .sent:hover { cursor: pointer; }
    /* ♪ marks sentences whose ElevenLabs audio is already generated (free to replay, no extra credit) */
    .sent.voiced::after { content: '\266A'; font-size: .72em; line-height: 0; color: var(--accent); opacity: .6; margin-left: 2px; vertical-align: super; font-weight: 700; user-select: none; pointer-events: none; }
    .sent.voiced:hover::after { opacity: 1; }
    /* AI-review markers: the flagged sentence is highlighted in the preview text with a wavy
       underline (classic "issue here") + a faint severity tint, plus a ✦ tag opening the panel */
    .sent.has-review { background: color-mix(in srgb, var(--rev, #6b7280) 10%, transparent); border-radius: 3px;
      text-decoration: underline; text-decoration-style: wavy; text-decoration-color: var(--rev, #6b7280); text-decoration-thickness: 1.5px; text-underline-offset: 3px; }
    .sent.has-review:hover { background: color-mix(in srgb, var(--rev, #6b7280) 18%, transparent); }
    .sent.review-major { --rev: #dc2626; } .sent.review-minor { --rev: #b4530f; } .sent.review-nit { --rev: #64748b; }
    .review-tag { display: inline-flex; align-items: center; gap: 1px; margin-left: 3px; padding: 0 3px; height: 14px; border-radius: 7px; background: var(--rev, #6b7280); color: #fff; vertical-align: middle; cursor: pointer; user-select: none; }
    .review-tag svg { width: 9px; height: 9px; } .review-tag .rt-n { font-size: 8.5px; font-weight: 800; font-style: normal; line-height: 1; }

    /* write mode (WYSIWYG editing in the preview) */
    .wm-seg { display: inline-flex; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; margin-right: 4px; flex: none; }
    .wm-seg button { border: 0; background: var(--pane); color: var(--muted); font-size: 10.5px; font-weight: 700; padding: 3px 10px; }
    .wm-seg button.on { background: #be185d; color: #fff; }
    .wm-seg button:not(.on):hover { color: var(--ink); }
    .preview-scroll.write-mode .sent.wm-edit { outline: none; border-radius: 3px; transition: background .12s; cursor: text; }
    .preview-scroll.write-mode .sent.wm-edit:hover { background: color-mix(in srgb, var(--accent) 7%, transparent); }
    .preview-scroll.write-mode .sent.wm-edit:focus { background: color-mix(in srgb, var(--accent) 11%, transparent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 32%, transparent); }
    .preview-scroll.write-mode .sent.wm-lock { cursor: pointer; border-radius: 3px; text-decoration: underline dotted color-mix(in srgb, var(--muted) 55%, transparent); text-underline-offset: 3px; }
    .preview-scroll.write-mode .sent.wm-lock:hover { background: color-mix(in srgb, #d9760b 13%, transparent); }
    .wm-fmt { z-index: 130; display: flex; gap: 3px; background: #252a36; padding: 5px 6px; border-radius: 9px; box-shadow: 0 8px 24px rgba(0,0,0,.32); }
    .wm-fmt button { width: 30px; height: 28px; border: 0; background: rgba(255,255,255,.13); color: #fff; border-radius: 6px; font-size: 13.5px; display: grid; place-items: center; }
    .wm-fmt button:hover { background: rgba(255,255,255,.28); }
    .wm-fmt-sep { width: 1px; height: 20px; background: rgba(255,255,255,.22); margin: 0 3px; }
    .preview-scroll.write-mode .imath { cursor: pointer; border-radius: 3px; padding: 0 1px; transition: background .12s, box-shadow .12s; }
    .preview-scroll.write-mode .imath:hover { background: color-mix(in srgb, var(--accent) 13%, transparent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 28%, transparent); }
    .wm-bar { flex: none; display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: color-mix(in srgb, #be185d 6%, var(--pane)); border-bottom: 1px solid var(--line); }
    .wm-style { font: inherit; font-size: 12px; font-weight: 600; border: 1px solid var(--line); border-radius: 7px; padding: 4px 8px; background: var(--pane); color: var(--ink); cursor: pointer; }
    .wm-bar-sep { width: 1px; height: 20px; background: var(--line); }
    .wm-bar-b { border: 1px solid var(--line); background: var(--pane); color: var(--ink); font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 7px; }
    .wm-bar-b:hover { border-color: #be185d; color: #be185d; }
    .wm-bar-b.on { background: color-mix(in srgb, #be185d 12%, var(--pane)); border-color: #be185d; color: #be185d; }
    .wm-bar-hint { margin-left: auto; font-size: 10.5px; color: var(--muted); }
    [data-theme="night"] .wm-bar { border-color: #283146; }
    .wm-ins-wrap { position: relative; }
    .wm-ins-menu { position: absolute; top: 32px; left: 0; z-index: 20; background: var(--pane); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 12px 30px rgba(20,24,40,.2); padding: 9px; width: 196px; }
    .wm-ins-h { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 0 2px 7px; }
    .wm-ins-sep { height: 1px; background: var(--line); margin: 8px 0; }
    .wm-ins-i { display: flex; align-items: center; gap: 8px; width: 100%; border: 0; background: transparent; color: var(--ink); font-size: 12.5px; padding: 7px 6px; border-radius: 7px; text-align: left; }
    .wm-ins-i:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); color: var(--accent); }
    .wm-grid-cells { display: grid; grid-template-columns: repeat(8, 18px); gap: 2px; }
    .wm-grid-c { width: 18px; height: 18px; border: 1px solid var(--line); border-radius: 3px; background: var(--pane); cursor: pointer; }
    .wm-grid-c.on { background: color-mix(in srgb, #be185d 30%, var(--pane)); border-color: #be185d; }
    .wm-grid-lbl { font-size: 11px; color: var(--muted); margin-top: 7px; text-align: center; font-weight: 600; }
    .wm-tbltb { z-index: 130; display: flex; gap: 3px; align-items: center; background: #252a36; padding: 5px 6px; border-radius: 9px; box-shadow: 0 8px 24px rgba(0,0,0,.32); }
    .wm-tbltb button { border: 0; background: rgba(255,255,255,.13); color: #fff; font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 6px; }
    .wm-tbltb button:hover { background: rgba(255,255,255,.28); }
    .preview-scroll.write-mode table.wm-tbl td, .preview-scroll.write-mode table.wm-tbl th { cursor: text; }
    .preview-scroll.write-mode table.wm-tbl td:focus, .preview-scroll.write-mode table.wm-tbl th:focus { outline: none; background: color-mix(in srgb, var(--accent) 11%, transparent); box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 32%, transparent); }

    /* ---------- transport ---------- */
    .transport { flex: none; height: 76px; display: flex; align-items: center; gap: 18px; padding: 0 18px;
      background: var(--pane); border-top: 1px solid var(--line); box-shadow: 0 -2px 14px rgba(0,0,0,.04); z-index: 5; }
    .tp-controls { display: flex; align-items: center; gap: 6px; }
    .tp-btn { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--line); background: var(--pane);
      color: var(--ink); display: grid; place-items: center; }
    .tp-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .tp-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tp-play { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 4px 12px rgba(79,70,229,.4); }
    .tp-play:hover { background: var(--accent-d); border-color: var(--accent-d); color: #fff; }
    .tp-play.is-playing { background: var(--accent); }

    .tp-now { flex: 1; min-width: 0; }
    .tp-now-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
    .tp-now-label .tp-count { color: var(--muted); font-weight: 600; letter-spacing: 0; text-transform: none; }
    .tp-save { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: var(--pane); color: var(--muted);
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; letter-spacing: 0; text-transform: none; margin-left: 4px; }
    .tp-save:hover { color: var(--accent); border-color: var(--accent); }
    .tp-save.done { color: var(--ok); border-color: #16a34a; background: color-mix(in srgb, #16a34a 8%, var(--pane)); }
    .tp-now-text { font-family: 'Source Serif 4', serif; font-size: 14.5px; line-height: 1.35; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .tp-bar { height: 5px; border-radius: 3px; background: color-mix(in srgb, var(--app-bg) 80%, var(--muted) 20%); cursor: pointer; overflow: hidden; }
    .tp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #8b5cf6); border-radius: 3px; transition: width .25s; }

    .tp-right { display: flex; align-items: center; gap: 16px; flex: none; }
    .tp-field { display: flex; flex-direction: column; gap: 4px; }
    .tp-field label { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
    .speed-seg { display: flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .speed-seg button { border: 0; background: var(--pane); color: var(--muted); font-size: 11.5px; font-weight: 600;
      padding: 6px 9px; border-right: 1px solid var(--line); }
    .speed-seg button:last-child { border-right: 0; }
    .speed-seg button.on { background: var(--accent); color: #fff; }
    .voice-sel { height: 30px; max-width: 190px; border: 1px solid var(--line); border-radius: 8px; background: var(--pane);
      color: var(--ink); font-size: 12px; font-family: inherit; padding: 0 8px; }

    .nontext { flex: 1; display: grid; place-items: center; background: var(--app-bg); padding: 30px; }
    .nt-img { text-align: center; } .nt-img img { max-width: 100%; max-height: 60vh; border: 1px solid var(--line); border-radius: 4px; background: var(--surface); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
    .nt-cap { margin-top: 12px; font-size: 12px; color: var(--muted); }
    .nt-msg { color: var(--muted); font-size: 14px; }

    .katex { font-size: 1em; }

    /* ---------- references / bibliography ---------- */
    .references { margin-top: 30px; padding-top: 16px; border-top: 1px solid var(--line, #e4e7ec); }
    .references .refs-h { margin-bottom: 10px; }
    .reflist { padding-left: 0; list-style: none; margin: 0; }
    .reflist .refitem { display: flex; gap: 8px; font-size: .92em; margin: 7px 0; line-height: 1.5; }
    .reflist .refnum { color: var(--muted, #5b6473); font-variant-numeric: tabular-nums; flex: none; min-width: 26px; }
    .reflist.ay .refitem { display: list-item; list-style: disc; margin-left: 20px; }
    .reflist .reftitle { font-style: italic; }

    /* ---------- manual-render pill ---------- */
    .tweaks-fab { position: fixed; bottom: 22px; right: 22px; z-index: 60; width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--line, #e4e7ec); background: var(--surface); color: var(--ink, #1a2030); cursor: pointer; box-shadow: 0 6px 18px rgba(16,20,40,.16); display: grid; place-items: center; }
    .tweaks-fab:hover { color: #4f46e5; border-color: #c9cdd6; }
    .render-pill { position: fixed; bottom: 88px; right: 22px; z-index: 60; display: inline-flex; align-items: center; gap: 8px; background: #4f46e5; color: #fff; border: 0; border-radius: 22px; padding: 10px 17px; font: 600 13px 'IBM Plex Sans', system-ui, sans-serif; cursor: pointer; box-shadow: 0 6px 18px rgba(79,70,229,.42); }
    .render-pill:hover { background: #4338ca; }
    .tp-pdf-btn { display: inline-flex; align-items: center; gap: 8px; width: 100%; justify-content: center; border: 1px solid var(--line, #e4e7ec); background: var(--surface); color: var(--ink, #1a2030); border-radius: 9px; padding: 9px 14px; font: 600 13px 'IBM Plex Sans', system-ui, sans-serif; cursor: pointer; }
    .tp-pdf-btn:hover { border-color: #c9cdd6; color: #4f46e5; }

    /* ---------- upload modal ---------- */
    .up-scrim { position: fixed; inset: 0; z-index: 1300; background: rgba(20,22,34,.35); display: flex; align-items: flex-end; justify-content: flex-end; padding: 22px; }
    .up-modal { width: 390px; max-width: calc(100% - 32px); background: var(--surface); border-radius: 14px; box-shadow: 0 18px 50px rgba(16,20,40,.32); overflow: hidden; }
    .up-head { display: flex; align-items: center; gap: 8px; padding: 13px 16px; border-bottom: 1px solid var(--line, #e6e8ee); flex-wrap: wrap; }
    .up-head b { font-size: 14.5px; color: var(--ink, #1a2030); }
    .up-head .up-sub { font-size: 11.5px; color: #8a92a0; width: 100%; }
    .up-head .up-x { margin-left: auto; border: 0; background: var(--surface-2); width: 26px; height: 26px; border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 13px; }
    .up-head .up-x:disabled { opacity: .4; cursor: default; }
    .up-list { max-height: 300px; overflow: auto; padding: 6px; }
    .up-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; font-size: 13px; color: var(--ink, #1a2030); }
    .up-row + .up-row { border-top: 1px solid #f1f2f5; }
    .up-ic { width: 18px; text-align: center; font-weight: 700; flex: none; color: #8a92a0; }
    .up-done .up-ic { color: var(--ok); } .up-skipped .up-ic { color: var(--warn); } .up-error .up-ic { color: var(--danger); }
    .up-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .up-meta { font-size: 11.5px; color: #8a92a0; flex: none; max-width: 46%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    .up-skipped .up-meta { color: var(--warn); } .up-error .up-meta { color: var(--danger); }
    .up-bar { display: inline-block; width: 72px; height: 4px; border-radius: 3px; background: var(--surface-2); overflow: hidden; vertical-align: middle; }
    .up-bar i { display: block; height: 100%; width: 40%; border-radius: 3px; background: linear-gradient(90deg, #4f46e5, #8b5cf6); animation: upslide 1.1s ease-in-out infinite; }
    @keyframes upslide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
    .up-spin { display: inline-block; width: 13px; height: 13px; border-radius: 50%; border: 2px solid #c7c2f7; border-right-color: transparent; animation: upspin .7s linear infinite; vertical-align: middle; }
    @keyframes upspin { to { transform: rotate(360deg); } }

    /* ---------- boot splash ---------- */
    #pr-boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      background: var(--app-bg); z-index: 999; }
    #pr-boot .boot-mark { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center;
      background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 6px 18px rgba(79,70,229,.4); }
    #pr-boot .boot-mark span { width: 24px; height: 24px; border: 0; border-top: 2.8px solid #fff; border-left: 2.8px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg);
      animation: bootspin 0.9s linear infinite; }
    @keyframes bootspin { to { transform: rotate(340deg); } }
    #pr-boot .boot-title { font-size: 19px; font-weight: 700; letter-spacing: -.3px; color: var(--ink, #1d2430); }
    #pr-boot .boot-sub { font-size: 13px; color: var(--muted); margin-top: -6px; }
    #pr-boot .boot-bar { width: 180px; height: 4px; border-radius: 3px; background: var(--surface-2); overflow: hidden; }

    /* account drawer (side panel) */

    /* drawer */

    .dtab { position: relative; border: 0; background: transparent; color: var(--muted); font-size: 12.5px; font-weight: 600; padding: 6px 9px; border-radius: 7px; }

    .drawer-x { margin-left: auto; border: 1px solid var(--line); background: var(--app-bg); color: var(--ink); font-size: 15px; font-weight: 700; line-height: 1; width: 28px; height: 28px; border-radius: 7px; cursor: pointer; display: grid; place-items: center; }

    .drawer-head { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .empty-d { color: var(--muted); font-size: 12.5px; line-height: 1.5; padding: 18px 6px; text-align: center; }
    .empty-d code { background: var(--app-bg); padding: 1px 4px; border-radius: 4px; font-size: 11px; }
    .link { border: 0; background: transparent; color: var(--accent); font-size: 12.5px; font-weight: 600; cursor: pointer; }

    /* AI Review panel */
    .review { display: flex; flex-direction: column; gap: 8px; }

    .rev-item.focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); border-color: var(--accent); }
    .rev-item.done { opacity: .55; } .rev-item.done .rev-body { text-decoration: line-through; }
    .rev-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }

    .rev-cat { font-size: 10px; font-weight: 600; color: var(--muted); background: var(--app-bg); padding: 1px 6px; border-radius: 10px; }
    .rev-grow { flex: 1; }
    .rev-body { font-size: 13px; line-height: 1.45; color: var(--ink); }
    .rev-sug { font-size: 12px; line-height: 1.4; color: var(--muted); margin-top: 5px; }
    .rev-quote { font-size: 11px; line-height: 1.4; color: var(--muted); font-style: italic; margin-top: 6px; border-left: 2px solid var(--line); padding-left: 7px; }
    .rev-acts { display: flex; gap: 12px; margin-top: 7px; }

    .rev-item.major { --rev: #dc2626; } .rev-item.minor { --rev: #b4530f; } .rev-item.nit { --rev: #64748b; }
    .ct-badge.warn { background: #b4530f; } .dtab .badge.warn { background: #b4530f; }
    /* Number consistency panel */
    .numbers { display: flex; flex-direction: column; gap: 8px; }
    .num-bar { font-size: 11.5px; color: var(--muted); line-height: 1.5; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
    .num-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
    .num-item.conflict { border-left: 3px solid #b4530f; background: color-mix(in srgb, #b4530f 5%, var(--pane)); }
    .num-head { display: flex; align-items: center; gap: 8px; }

    .num-flag { font-size: 10.5px; font-weight: 700; color: var(--warn); background: var(--warn-bg); padding: 1px 7px; border-radius: 10px; margin-left: auto; }

    .num-x { font-style: normal; font-size: 9.5px; color: var(--muted); margin-left: 3px; }
    .num-occ { display: flex; flex-direction: column; gap: 2px; margin-top: 7px; }
    .num-occ-i { text-align: left; border: 0; background: transparent; color: var(--muted); font-size: 11px; line-height: 1.4; padding: 2px 4px; border-radius: 5px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .num-occ-i:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); color: var(--accent); }
    .num-occ-i b { color: var(--ink); }
    .num-sec { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 6px 2px 0; }

    /* Spell-check panel */

    /* References / citation manager panel */
    .ref-doi { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; display: flex; flex-direction: column; gap: 6px; }
    .ref-doi-row { display: flex; gap: 6px; }

    .ref-doi-row input:focus { outline: none; border-color: var(--accent); }
    .ref-doi-hint { font-size: 10.5px; color: var(--muted); line-height: 1.45; }
    .ref-doi-hint code { background: color-mix(in srgb, var(--app-bg) 70%, transparent); padding: 0 4px; border-radius: 4px; }
    .ref-msg { font-size: 11.5px; line-height: 1.4; padding: 5px 8px; border-radius: 6px; }

    .ref-keys { display: flex; flex-wrap: wrap; gap: 4px; margin: 5px 2px 2px; }

    .ref-uncited { display: block; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); font-size: 12px; line-height: 1.4; padding: 3px 6px; border-radius: 6px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ref-uncited:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); }
    .ref-uncited b { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11.5px; }
    .ref-uncited-t { color: var(--muted); }
    .solid { border: 0; background: var(--accent); color: #fff; font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 8px; cursor: pointer; }

    .compose { border: 1px solid var(--line); border-radius: 10px; padding: 9px; margin-bottom: 12px; background: var(--app-bg); }

    .compose-meta { display: flex; gap: 6px; margin: 6px 0; } .compose-meta select { flex: 1; }
    .compose-actions { display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
    .attach-btn { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: var(--pane); color: var(--muted); font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 8px; }

    /* @mention input + menu */

    .mention-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-top: 6px; }

    .m-note { font-size: 10px; color: var(--muted); } .tchip.mention-chip { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); font-weight: 600; }

    /* attachments */
    .attach-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 2px; }

    .attach-grid.compact .attach-thumb { height: 48px; }

    .lb-bar { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 14px; background: rgba(0,0,0,.55); color: #fff; padding: 8px 8px 8px 16px; border-radius: 24px; font-size: 13px; }

    .thread { border: 1px solid var(--line); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
