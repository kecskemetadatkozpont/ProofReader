<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Figure Board</title>
  <script>if (new URLSearchParams(location.search).get('embed')) document.documentElement.classList.add('embed');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f2f4f8; --surface-3:#e9ecf4; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fbf1dd; --danger:#b42318; --danger-bg:#fdeef0;
      --accent:#4f46e5; --accent-d:#4338ca; --ink:#1a2030; --muted:#5b6473; --faint:#8a92a0; --line:#e4e7ef; --line-2:#d7dbe8; --soft:#f5f6f9; --softer:#f7f8fb; --canvas-bg:#f6f7fb; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; overflow:hidden; }
    /* embedded in the Publify app as a Literature sub-tab (?embed=1) → drop only the CHROME (brand + ← Research + dark
       toggle); KEEP the functional topbar controls (#modeseg Simple/Pro, #grpseg By-paper/All-figures, #toghide Show-hidden)
       so the embedded board is fully usable. The .app auto grid-row shrinks to fit the remaining controls. */
    html.embed .topbar a[href^="Research"] { display:none !important; }   /* the .brand link AND the ← Research link */
    html.embed #fb-dark { display:none !important; }
    html.embed .topbar { padding-left:14px; }
    html.embed .version-badge, html.embed .vbadge { display:none !important; }
    body { background:var(--softer); color:var(--ink); font-family:'IBM Plex Sans',system-ui,sans-serif; -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45; }
    a { color:var(--accent); text-decoration:none; }
    .mk { width:26px; height:26px; border-radius:8px; display:grid; place-items:center; background:linear-gradient(135deg,#6366f1,#d946ef); box-shadow:0 3px 10px rgba(79,70,229,.34); flex:none; }
    .mk i { width:9px; height:9px; border-top:2px solid #fff; border-left:2px solid #fff; border-radius:2px 0 0 0; transform:rotate(45deg); margin-top:2px; }
    .btn { display:inline-flex; align-items:center; gap:7px; height:34px; border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:10px; padding:0 13px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn:hover { border-color:var(--line-2); }
    .btn.pri { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.pri:hover { background:var(--accent-d); }
    .btn.ic { width:34px; padding:0; justify-content:center; font-size:15px; flex:none; }
    .btn.ic.on { background:var(--accent-tint); border-color:var(--accent); color:var(--accent); }

    .center { height:100vh; display:flex; align-items:center; justify-content:center; }
    .center .box { text-align:center; max-width:440px; } .center .mk { width:52px; height:52px; margin:0 auto 16px; } .center .mk i { width:17px; height:17px; }
    .center h1 { font-size:20px; margin:0 0 6px; } .center p { font-size:13.5px; color:var(--muted); margin:0 0 20px; }

    .app { display:grid; grid-template-rows:auto 1fr; grid-template-columns:340px 1fr; height:100vh; }
    .topbar { grid-column:1 / 3; display:flex; align-items:center; gap:13px; height:54px; padding:0 18px; background:var(--surface); border-bottom:1px solid var(--line); z-index:20; }
    .brand { display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:-.2px; color:var(--ink); }
    .brand small { display:block; font-size:10.5px; font-weight:600; color:var(--faint); }
    .spring { flex:1; }
    .tstat { font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:7px; } .tstat b { color:var(--ink); font-weight:700; }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

    .side { grid-row:2; grid-column:1; border-right:1px solid var(--line); background:var(--surface); overflow-y:auto; padding:16px; }
    .side h2 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--faint); margin:20px 0 8px; }
    .side-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .sortsel { font-family:inherit; font-size:11.5px; font-weight:600; color:var(--ink); background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:4px 6px; cursor:pointer; }
    .sortsel:hover { border-color:var(--line-2); }
    .extract-card { border:1px solid var(--line); border-radius:14px; background:linear-gradient(180deg,var(--accent-tint),var(--surface)); padding:15px; }
    .extract-card .lead { font-size:12.5px; color:var(--muted); line-height:1.5; margin-bottom:12px; } .extract-card .lead b { color:var(--ink); }
    .extract-card .btn.pri { width:100%; justify-content:center; height:38px; }
    .fb-scope { display:flex; align-items:center; gap:8px; margin-bottom:11px; }
    .fb-scope-k { font-size:11.5px; font-weight:700; color:var(--muted); flex:none; }
    .fb-scope select { flex:1; min-width:0; }
    .prog { margin-top:11px; font-size:12px; color:var(--muted); min-height:0; }
    .prog:empty { display:none; }
    .pbar { height:6px; background:var(--surface-3); border-radius:999px; overflow:hidden; margin-bottom:6px; } .pbar i { display:block; height:100%; background:var(--accent); border-radius:999px; transition:width .3s ease; }
    .prow { display:flex; justify-content:space-between; gap:8px; font-size:11.5px; color:var(--muted); } .prow span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .paper { display:flex; gap:9px; align-items:flex-start; padding:9px 8px; border-radius:10px; cursor:pointer; }
    .paper:hover { background:var(--surface-2); }
    .paper .st { width:20px; height:20px; border-radius:6px; display:grid; place-items:center; font-size:11px; font-weight:800; flex:none; margin-top:1px; }
    .paper .st.ok { background:var(--ok-bg); color:var(--ok); } .paper .st.idle { background:var(--accent-tint); color:var(--accent); } .paper .st.nodoi { background:var(--surface-3); color:var(--faint); }
    .paper .pt { min-width:0; } .paper .pt b { display:block; font-size:12.5px; font-weight:620; color:var(--ink); line-height:1.35; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .paper .pt span { font-size:11px; color:var(--faint); }

    .canvas { grid-row:2; grid-column:2; position:relative; overflow:hidden; background:var(--canvas-bg);
      background-image:radial-gradient(circle, var(--line-2) 1px, transparent 1px); background-size:26px 26px; cursor:default; }
    .canvas.grab { cursor:grabbing; }
    .world { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
    .cluster { position:absolute; width:580px; background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:0 8px 26px rgba(20,26,40,.07); }
    .cl-head { padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; justify-content:space-between; gap:10px; } .cl-head b { display:block; font-size:13.5px; line-height:1.3; } .cl-head span { font-size:11.5px; color:var(--faint); }
    .cl-pin { flex:none; border:1px solid var(--line); background:var(--surface); color:var(--accent); font-family:inherit; font-size:11.5px; font-weight:650; border-radius:8px; padding:5px 10px; cursor:pointer; white-space:nowrap; }
    .cl-pin:hover { background:var(--accent-tint); border-color:var(--accent); }
    .fig.dim, .gcard.dim { opacity:.42; }

    /* metric badges: journal · Q · citations */
    .mrow { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .mtag { font-size:10.5px; font-weight:650; padding:2px 7px; border-radius:6px; background:var(--surface-2); color:var(--muted); border:1px solid var(--line); white-space:nowrap; max-width:100%; overflow:hidden; text-overflow:ellipsis; }
    .mtag.jrnl { color:var(--ink); }
    .mtag.cite { color:var(--accent-d); background:var(--accent-tint); border-color:transparent; }
    .mtag.q { color:#fff; border-color:transparent; }
    .mtag.q.q1 { background:#15803d; } .mtag.q.q2 { background:#4f46e5; } .mtag.q.q3 { background:#b45309; } .mtag.q.q4 { background:#8a92a0; }
    .paper .mrow { margin-top:4px; } .paper .mtag { font-size:10px; padding:1px 6px; }
    .gcap .mrow { margin-top:5px; }

    /* "why relevant" blurb */
    .relbox { background:var(--accent-tint); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; padding:9px 12px; margin-bottom:12px; font-size:12px; color:var(--ink); line-height:1.5; }
    .relbox .rk { display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--accent); margin-bottom:3px; }

    /* readable abstract inside a By-paper cluster */
    details.abs { margin-bottom:12px; border:1px solid var(--line); border-radius:10px; background:var(--surface-2); }
    details.abs > summary { cursor:pointer; padding:8px 12px; font-size:11.5px; font-weight:650; color:var(--accent); list-style:none; user-select:none; }
    details.abs > summary::-webkit-details-marker { display:none; }
    details.abs > summary::before { content:'▸ '; }
    details.abs[open] > summary::before { content:'▾ '; }
    details.abs[open] > summary { border-bottom:1px solid var(--line); }
    .abs-body { padding:11px 13px; font-size:11.5px; color:var(--muted); line-height:1.55; max-width:100%; overflow-wrap:anywhere; }
    .abs-load { font-style:italic; color:var(--faint); }

    .cl-box { padding:14px 16px; }
    .figrow { display:flex; flex-wrap:wrap; gap:14px; }
    .fig { width:252px; border:1px solid var(--line); border-radius:12px; overflow:hidden; cursor:pointer; background:var(--surface); transition:border-color .12s, box-shadow .12s; }
    .fig:hover { border-color:var(--accent); box-shadow:0 6px 18px rgba(79,70,229,.16); }
    .thumb { background:var(--surface-2); display:grid; place-items:center; min-height:120px; max-height:230px; overflow:hidden; }
    .thumb img { width:100%; height:auto; display:block; }
    .thumb .ph { color:var(--faint); font-size:20px; padding:40px; }
    .cap { padding:9px 11px; font-size:11px; color:var(--muted); line-height:1.4; max-height:56px; overflow:hidden; }
    .cap .pg { font-weight:700; color:var(--accent); font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; }

    .hintbar { position:absolute; left:16px; bottom:14px; font-size:11.5px; color:var(--muted); background:color-mix(in srgb,var(--surface) 88%,transparent); backdrop-filter:blur(6px); border:1px solid var(--line); border-radius:999px; padding:6px 13px; }
    .zoom { position:absolute; right:16px; bottom:14px; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:0 6px 18px rgba(20,26,40,.1); }
    .zoom button { width:38px; height:36px; border:0; background:var(--surface); color:var(--ink); font-size:16px; cursor:pointer; } .zoom button:hover { background:var(--surface-2); }
    .zoom .lvl { font-size:10.5px; text-align:center; color:var(--faint); border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:4px 0; font-variant-numeric:tabular-nums; }

    .scrim { position:fixed; inset:0; background:rgba(15,20,40,.42); z-index:40; opacity:0; pointer-events:none; transition:opacity .18s; }
    .scrim.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; top:0; right:0; height:100vh; width:min(520px,96vw); background:var(--surface); border-left:1px solid var(--line); box-shadow:-28px 0 70px rgba(15,20,40,.28); z-index:41; transform:translateX(100%); transition:transform .24s cubic-bezier(.32,.72,0,1); display:flex; flex-direction:column; }
    .drawer.open { transform:translateX(0); }
    @media (prefers-reduced-motion:reduce) { .scrim,.drawer { transition:none; } }
    .dr-close { position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--muted); font-size:15px; cursor:pointer; z-index:2; }
    .dr-fig { background:var(--surface-2); border-bottom:1px solid var(--line); max-height:52vh; overflow:auto; display:grid; place-items:center; padding:12px; }
    .dr-fig img { max-width:100%; height:auto; display:block; border-radius:6px; }
    .dr-body { overflow-y:auto; padding:18px 22px 40px; flex:1; }
    .dr-body h3 { margin:8px 0 4px; font-size:17px; }
    .tag { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; }
    .tag.ok { background:var(--ok-bg); color:var(--ok); }
    .dr-src { font-size:12.5px; color:var(--muted); line-height:1.5; margin-bottom:10px; } .dr-src b { color:var(--ink); }
    .dr-cap { font-size:12.5px; color:var(--muted); line-height:1.55; background:var(--surface-2); border-radius:10px; padding:11px 13px; margin-bottom:14px; }
    .kvs { display:flex; flex-direction:column; gap:0; margin-bottom:16px; }
    .kv { display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid var(--line); font-size:12.5px; } .kv span { color:var(--faint); } .kv b { color:var(--ink); font-weight:600; text-align:right; }
    .kv .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; }
    .dr-actions { display:flex; gap:9px; flex-wrap:wrap; }

    /* topbar segmented control + toggles */
    .seg { display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:2px; }
    .seg button { border:0; background:transparent; color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; padding:5px 10px; border-radius:7px; cursor:pointer; white-space:nowrap; }
    .seg button.on { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(20,26,32,.08); }
    .btn.on { background:var(--accent-tint); border-color:var(--accent); color:var(--accent); }
    .btn.ghost { color:var(--muted); } .btn.ghost:hover { color:var(--ink); }
    .btn.restore { color:var(--ok); border-color:color-mix(in srgb,var(--ok) 40%,var(--line)); }

    /* all-figures gallery card */
    .gcard { position:absolute; width:260px; border:1px solid var(--line); border-radius:12px; overflow:hidden; cursor:pointer; background:var(--surface); box-shadow:0 4px 14px rgba(20,26,40,.05); transition:border-color .12s, box-shadow .12s; }
    .gcard:hover { border-color:var(--accent); box-shadow:0 6px 18px rgba(79,70,229,.16); }
    .gcap { padding:8px 11px; font-size:11px; color:var(--muted); line-height:1.4; max-height:52px; overflow:hidden; }
    .gcap .pg { font-weight:700; color:var(--accent); }

    /* toast */
    .fb-toast { position:fixed; left:50%; bottom:26px; transform:translate(-50%,14px); background:var(--ink); color:#fff; font-size:13px; font-weight:600; padding:10px 16px; border-radius:11px; box-shadow:0 10px 30px rgba(15,20,40,.3); z-index:60; opacity:0; transition:opacity .22s, transform .22s; pointer-events:none; max-width:90vw; }
    .fb-toast.show { opacity:1; transform:translate(-50%,0); }
    .fb-toast.err { background:var(--danger); }
    @media (prefers-reduced-motion:reduce) { .fb-toast { transition:none; } }

    @media (max-width:820px) { .app { grid-template-columns:1fr; grid-template-rows:auto auto 1fr; } .topbar { grid-column:1; flex-wrap:wrap; height:auto; padding:8px 12px; } .side { grid-row:2; grid-column:1; border-right:0; border-bottom:1px solid var(--line); max-height:220px; } .canvas { grid-row:3; grid-column:1; } }

    /* ================= NEW DESIGN (beta) — a real, restructured Figure Board ================= */
    html.newdesign .app.simple .adv { display:none !important; }        /* progressive disclosure */
    html.newdesign .topbar { height:60px; padding:0 22px; gap:15px; background:var(--surface); border-bottom:1px solid var(--line); }
    html.newdesign .brand small { color:var(--accent); }
    html.newdesign .crumb { font-size:12.5px; font-weight:600; color:var(--faint); position:relative; padding-left:15px; }
    html.newdesign .crumb::before { content:'/'; position:absolute; left:3px; color:var(--line-2); }
    html.newdesign .seg.mode { background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:3px; }
    html.newdesign .seg.mode button { border-radius:999px; padding:6px 15px; font-weight:650; color:var(--muted); }
    html.newdesign .seg.mode button.on { background:var(--accent); color:#fff; box-shadow:0 1px 3px rgba(79,70,229,.3); }
    html.newdesign .seg:not(.mode) { border-radius:10px; }
    html.newdesign .side { padding:20px 16px; }
    html.newdesign .extract-card { border-radius:16px; border:1px solid color-mix(in srgb,var(--accent) 22%,var(--line)); box-shadow:0 1px 2px rgba(20,26,40,.04); padding:18px; }
    html.newdesign .extract-card .btn.pri { height:40px; border-radius:11px; }
    html.newdesign .side h2 { font-size:11px; letter-spacing:.06em; margin:22px 0 9px; }
    html.newdesign .paper { border-radius:12px; padding:10px; } html.newdesign .paper .st { border-radius:8px; }
    html.newdesign .cluster { border-radius:18px; box-shadow:0 1px 2px rgba(20,26,40,.04),0 16px 38px rgba(20,26,40,.07); }
    html.newdesign .cl-head { padding:15px 18px; } html.newdesign .cl-head b { font-size:14.5px; letter-spacing:-.2px; }
    html.newdesign .cl-pin { border-radius:999px; }
    html.newdesign .fig { border-radius:14px; transition:transform .14s, box-shadow .14s, border-color .14s; }
    html.newdesign .fig:hover { transform:translateY(-2px); box-shadow:0 12px 26px rgba(79,70,229,.16); border-color:var(--accent); }
    html.newdesign .relbox { border-radius:0 12px 12px 0; } html.newdesign .gcard { border-radius:14px; }
    html.newdesign .drawer { border-radius:20px 0 0 20px; }
    html.newdesign .zoom { border-radius:14px; } html.newdesign .hintbar { border-radius:999px; }
    /* onboarding — a guided first-run panel overlaid on the canvas (not the panning world) */
    html.newdesign .fb-ob-wrap { position:absolute; inset:0; display:grid; place-items:start center; padding:6vh 20px 20px; pointer-events:none; z-index:5; }
    html.newdesign .fb-onboard { pointer-events:auto; width:min(560px,100%); background:var(--surface); border:1px solid var(--line); border-radius:22px; padding:34px 34px 30px; box-shadow:0 1px 2px rgba(20,26,40,.05),0 26px 64px rgba(20,26,40,.14); }
    html.newdesign .fb-onboard .ob-badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); background:var(--accent-tint); padding:4px 11px; border-radius:999px; }
    html.newdesign .fb-onboard h1 { font-size:26px; letter-spacing:-.5px; line-height:1.15; margin:16px 0 8px; }
    html.newdesign .fb-onboard p { font-size:14px; color:var(--muted); line-height:1.55; margin:0 0 20px; max-width:52ch; }
    html.newdesign .ob-steps { display:grid; gap:12px; margin-bottom:22px; }
    html.newdesign .ob-step { display:grid; grid-template-columns:auto 1fr; gap:13px; align-items:center; }
    html.newdesign .ob-step .obn { width:28px; height:28px; border-radius:50%; background:var(--accent-tint); color:var(--accent); display:grid; place-items:center; font-weight:750; font-size:13px; flex:none; }
    html.newdesign .ob-step b { font-size:13.5px; display:block; } html.newdesign .ob-step i { font-style:normal; font-size:12.5px; color:var(--muted); }
    html.newdesign .ob-cta { height:44px; font-size:14px; padding:0 20px; border-radius:12px; }
    html.newdesign .ob-hint { font-size:12px; color:var(--faint); margin-top:12px; }
  </style>
  <script src="theme.js?v=1784815941"></script>
</head>

<body>
  <div id="root">
    <div class="center"><div class="box"><div class="mk"><i></i></div><h1>Figure Board</h1><p>Loading…</p></div></div>

  <script src="backend/config.js?v=1784815941"></script>
  <script src="auth.js?v=1784815941"></script>
  <script src="backend.js?v=1784815941"></script>
  <script src="figure-board.js?v=1784815941"></script>

  <script src="build.js?v=1784815941"></script>
  <script src="version-badge.js?v=1784815941"></script>
</body>

</html>
