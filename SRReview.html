<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Review results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f2f4f8; --surface-3:#e9ecf4; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fbf1dd; --danger:#b42318; --danger-bg:#fdeef0;
      --accent:#4f46e5; --accent-d:#4338ca; --ink:#1a2030; --muted:#5b6473; --faint:#8a92a0; --line:#e4e7ef; --line-2:#d7dbe8; --soft:#f5f6f9; --softer:#f7f8fb; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; }
    body { background:var(--softer); color:var(--ink); font-family:'IBM Plex Sans',system-ui,sans-serif; -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45; }
    a { color:var(--accent); text-decoration:none; }
    .num { font-variant-numeric:tabular-nums; }
    .mk { width:26px; height:26px; border-radius:8px; display:grid; place-items:center; background:linear-gradient(135deg,#6366f1,#d946ef); box-shadow:0 3px 10px rgba(79,70,229,.34); flex:none; }
    .mk span { width:9px; height:9px; border-top:2px solid #fff; border-left:2px solid #fff; border-radius:2px 0 0 0; transform:rotate(45deg); margin-top:2px; }
    .center { min-height:80vh; display:flex; align-items:center; justify-content:center; }
    .center .box { text-align:center; max-width:420px; } .center .mk { width:52px; height:52px; margin:0 auto 16px; }
    .center h1 { font-size:20px; margin:0 0 6px; } .center p { font-size:13.5px; color:var(--muted); margin:0 0 20px; }
    .btn { display:inline-flex; align-items:center; gap:7px; height:34px; border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:10px; padding:0 13px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; }
    .btn:hover { border-color:var(--line-2); }
    .btn.ic { width:34px; padding:0; justify-content:center; font-size:15px; flex:none; }
    .btn.ic.on { background:var(--accent-tint); border-color:var(--accent); color:var(--accent); }
    .empty { color:var(--faint); font-size:14px; padding:44px; text-align:center; }
    .banner { margin:14px 0 2px; padding:12px 15px; border-radius:12px; font-size:13px; line-height:1.55; }
    .banner.warn { background:var(--warn-bg); color:var(--warn); border:1px solid color-mix(in srgb,var(--warn) 32%,transparent); }

    .topbar { position:sticky; top:0; z-index:20; background:color-mix(in srgb,var(--surface) 90%,transparent); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
    .topbar-in { max-width:1280px; margin:0 auto; padding:0 22px; display:flex; align-items:center; gap:14px; height:54px; }
    .brand { display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:-.2px; color:var(--ink); }
    .brand small { display:block; font-size:10.5px; font-weight:600; color:var(--faint); }
    .crumb { color:var(--muted); font-size:13px; font-weight:600; }

    .wrap { max-width:1280px; margin:0 auto; padding:0 22px; }
    header.rv { padding:20px 0 4px; }
    .rv-title { display:flex; align-items:flex-start; gap:12px; flex-wrap:wrap; }
    .rv-title h1 { margin:0; font-size:22px; letter-spacing:-.4px; line-height:1.2; flex:1; min-width:280px; }
    .rv-q { color:var(--muted); font-size:13px; margin-top:6px; max-width:80ch; }
    .pill { display:inline-flex; align-items:center; gap:6px; height:26px; padding:0 12px; border-radius:999px; font-size:12px; font-weight:650; white-space:nowrap; margin-top:5px; }
    .pill::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
    .pill.ok { background:var(--ok-bg); color:var(--ok); } .pill.bad { background:var(--danger-bg); color:var(--danger); } .pill.run { background:var(--accent-tint); color:var(--accent); }
    .rv-meta { display:flex; gap:16px; flex-wrap:wrap; color:var(--faint); font-size:12.5px; margin-top:10px; }
    .rv-meta b { color:var(--muted); font-weight:600; }

    .funnel { display:flex; margin:16px 0 4px; border:1px solid var(--line); border-radius:14px; background:var(--surface); overflow:hidden; }
    .fstage { flex:1; padding:12px 14px; min-width:0; } .fstage + .fstage { border-left:1px solid var(--line); }
    .fk { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--faint); }
    .fv { font-size:25px; font-weight:750; letter-spacing:-.5px; margin-top:3px; }
    .fd { font-size:11.5px; color:var(--muted); }
    .fdrop { font-size:11px; color:var(--danger); font-weight:600; margin-top:2px; }
    .fstage.cur { background:var(--accent-tint); }

    .tabs { display:flex; gap:2px; margin-top:16px; border-bottom:1px solid var(--line); overflow-x:auto; }
    .tab { border:0; background:transparent; color:var(--muted); font-family:inherit; font-size:13.5px; font-weight:600; padding:10px 14px; border-bottom:2px solid transparent; white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:7px; }
    .tab:hover { color:var(--ink); } .tab.on { color:var(--accent); border-bottom-color:var(--accent); }
    .tc { font-size:11px; font-weight:700; background:var(--surface-3); color:var(--muted); border-radius:999px; padding:1px 7px; }
    .tab.on .tc { background:var(--accent-tint); color:var(--accent); }

    main { padding:16px 0 60px; }
    .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .srch { height:36px; border:1px solid var(--line); background:var(--surface); border-radius:10px; padding:0 12px; color:var(--ink); font-family:inherit; font-size:13.5px; flex:1; min-width:200px; max-width:400px; }
    .srch:focus { outline:2px solid var(--accent-tint); border-color:var(--accent); }
    .cnt { font-size:12.5px; color:var(--muted); } .cnt b { color:var(--ink); }
    .hint { font-size:12px; color:var(--faint); }
    .seg { display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:2px; }
    .seg button { border:0; background:transparent; color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; padding:5px 10px; border-radius:7px; cursor:pointer; white-space:nowrap; }
    .seg button.on { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(20,26,32,.08); }

    .tbl-wrap { border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--surface); }
    .tbl-scroll { overflow-x:auto; }
    table { border-collapse:collapse; width:100%; font-size:13px; }
    thead th { position:sticky; top:0; background:var(--surface-2); text-align:left; font-weight:650; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.03em; padding:9px 12px; white-space:nowrap; border-bottom:1px solid var(--line); z-index:2; }
    tbody td { padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
    tbody tr:last-child td { border-bottom:0; }
    tbody tr { cursor:pointer; } tbody tr:hover td { background:var(--surface-2); }
    td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; color:var(--muted); white-space:nowrap; }
    .c-title { font-weight:620; color:var(--ink); max-width:340px; min-width:220px; }
    .c-title .doi { display:inline-block; font-size:11px; color:var(--accent); font-weight:600; margin-top:3px; }
    .c-auth { color:var(--muted); font-size:12.5px; max-width:150px; }
    .c-excl { color:var(--danger); font-size:12px; max-width:220px; }
    .ans { max-width:280px; color:var(--muted); font-size:12.5px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .decide { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:2px 9px; border-radius:999px; white-space:nowrap; }
    .decide.inc { background:var(--ok-bg); color:var(--ok); } .decide.exc { background:var(--danger-bg); color:var(--danger); }

    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .card { border:1px solid var(--line); border-radius:14px; background:var(--surface); padding:15px 16px; }
    .ck { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--faint); }
    .cv { font-size:27px; font-weight:750; letter-spacing:-.6px; margin-top:4px; }
    .cd { font-size:12px; color:var(--muted); margin-top:1px; }
    .prose { border:1px solid var(--line); border-radius:14px; background:var(--surface); padding:20px 24px; margin-top:14px; max-width:80ch; line-height:1.6; }
    .prose h3 { margin:0 0 8px; font-size:16px; } .prose h1,.prose h2 { font-size:18px; margin:18px 0 8px; }
    .prose p { color:var(--muted); margin:0 0 12px; } .prose .lead { color:var(--ink); font-size:14.5px; }
    .prose a { color:var(--accent); }
    .prose { overflow-wrap:anywhere; }
    .prose table { display:block; width:max-content; max-width:100%; overflow-x:auto; border-collapse:collapse; margin:12px 0; font-size:12.5px; }
    .prose th, .prose td { border:1px solid var(--line); padding:5px 9px; text-align:left; vertical-align:top; }
    .prose thead th { background:var(--surface-2); font-weight:700; }
    .prose pre { background:var(--surface-2); padding:12px 14px; border-radius:8px; overflow:auto; }
    .prose img { max-width:100%; height:auto; }
    details.md-tbl-collapse { margin:14px 0; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    details.md-tbl-collapse > summary { cursor:pointer; padding:9px 13px; font-size:12.5px; font-weight:650; color:var(--accent); background:var(--surface-2); list-style:none; user-select:none; }
    details.md-tbl-collapse > summary::-webkit-details-marker { display:none; }
    details.md-tbl-collapse > summary::before { content:'📋 ▸ '; }
    details.md-tbl-collapse[open] > summary::before { content:'📋 ▾ '; }
    details.md-tbl-collapse[open] > summary { border-bottom:1px solid var(--line); }
    details.md-tbl-collapse > table { margin:0; }

    .dr-scrim { position:fixed; inset:0; background:rgba(15,20,40,.42); z-index:40; display:flex; justify-content:flex-end; animation:sc .18s ease; }
    @keyframes sc { from { background:rgba(15,20,40,0); } }
    .drawer { width:min(560px,96vw); height:100%; background:var(--surface); border-left:1px solid var(--line); box-shadow:-28px 0 70px rgba(15,20,40,.28); display:flex; flex-direction:column; animation:dr .24s cubic-bezier(.32,.72,0,1); }
    @keyframes dr { from { transform:translateX(100%); } }
    @media (prefers-reduced-motion:reduce) { .dr-scrim,.drawer { animation:none; } }
    .dr-head { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:flex-start; }
    .dr-head h2 { margin:0; font-size:16px; line-height:1.3; }
    .dr-sub { font-size:12px; color:var(--faint); margin-top:4px; }
    .dr-x { width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--muted); font-size:15px; cursor:pointer; flex:none; }
    .dr-body { overflow-y:auto; padding:16px 20px 40px; flex:1; }
    .qcard { border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:12px; }
    .qh { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--accent); }
    .qans { margin-top:6px; font-size:13.5px; color:var(--ink); line-height:1.5; white-space:pre-wrap; }
    .ev { margin-top:10px; border-top:1px dashed var(--line); padding-top:9px; }
    .ev summary { font-size:11.5px; font-weight:650; color:var(--muted); cursor:pointer; }
    .quote { border-left:3px solid var(--line-2); padding:4px 0 4px 11px; margin:8px 0; font-size:12.5px; color:var(--muted); font-style:italic; white-space:pre-wrap; }
    .reason { font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.5; white-space:pre-wrap; } .reason b { color:var(--ink); font-weight:600; }
    .metarow { font-size:12px; color:var(--muted); padding:3px 0; border-bottom:1px solid var(--line); } .metarow b { color:var(--ink); font-weight:600; }
    @media (max-width:720px) { .funnel { flex-wrap:wrap; } .fstage { flex:1 1 44%; } .fstage + .fstage { border-left:0; } .ans,.c-auth { display:none; } }
  </style>
  <script src="theme.js?v=1784626000"></script>
</head>

<body>
  <div id="root">
    <div class="center"><div class="box"><div class="mk"><span></span></div><h1>Review results</h1><p>Loading…</p></div></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="backend/config.js?v=1783137934"></script>
  <script src="auth.js?v=1783137934"></script>
  <script src="backend.js?v=1783539952"></script>

  <script src="build.js?v=1783542910"></script>

</body>

</html>
