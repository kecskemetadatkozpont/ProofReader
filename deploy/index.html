<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProofReader</title>
  <meta http-equiv="refresh" content="0; url=Projects.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #eceef1; color: #1d2430; font-family: 'IBM Plex Sans', system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .mk { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 6px 18px rgba(79,70,229,.4); }
    .mk span { width: 24px; height: 24px; border-radius: 50%; border: 3.5px solid #fff; border-right-color: transparent;
      transform: rotate(-20deg); animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(340deg); } }
    .t { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .s { font-size: 13px; color: #5b6473; }
    a { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="mk"><span></span></div>
  <div class="t">ProofReader</div>
  <div class="s">Loading… if nothing happens, <a href="Projects.html">open the dashboard</a>.</div>
  <script>location.replace('Projects.html');</script>
</body>
</html>
