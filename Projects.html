<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Publications</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --surface-3:#fafbfc; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fdf6e3; --danger:#b42318; --danger-bg:#fdeef0;
      --accent: #4f46e5; --accent-d: #4338ca; --line: #e4e7ec; --muted: #6b7280;
      --bg: #eceef1; --pane: #ffffff; --ink: #1d2430; --reading: #ffe08a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; cursor: pointer; }

    .topbar { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px;
      background: var(--pane); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 20; }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-mark { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center;
      background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 2px 6px rgba(79,70,229,.35); }
    .brand-mark span { width: 14px; height: 14px; border: 0; border-top: 2.8px solid #fff; border-left: 2.8px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); }
    .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
    .brand-text b { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
    .brand-text i { font-size: 11px; color: var(--muted); font-style: normal; }
    .top-right { display: flex; align-items: center; gap: 12px; }

    .btn-primary { display: inline-flex; align-items: center; gap: 8px; height: 38px; padding: 0 17px; border: 0; white-space: nowrap;
      background: var(--accent); color: #fff; border-radius: 9px; font-size: 13.5px; font-weight: 600; box-shadow: 0 2px 8px rgba(79,70,229,.32); }
    .btn-primary:hover { background: var(--accent-d); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 7px; height: 36px; padding: 0 14px; border: 1px solid var(--line);
      background: var(--pane); color: var(--ink); border-radius: 8px; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .btn-ghost:hover { color: var(--accent); border-color: var(--accent); }
    .btn-text { border: 0; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; padding: 6px 8px; border-radius: 7px; }
    .btn-text:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

    .avatar { border-radius: 50%; color: #fff; font-weight: 700; display: grid; place-items: center; flex: none; user-select: none; }
    .usage-chip { display: inline-flex; align-items: center; gap: 8px; height: 32px; padding: 0 11px; border: 1px solid var(--line); border-radius: 8px; font-size: 12px; color: var(--muted); }
    .usage-chip .mini { width: 46px; height: 5px; border-radius: 3px; background: var(--surface-2); overflow: hidden; }
    .usage-chip .mini i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #8b5cf6); }

    .acct { position: relative; }
    .acct-btn { border: 0; background: transparent; padding: 0; cursor: pointer; border-radius: 50%; }
    .menu { position: absolute; background: var(--pane); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 14px 38px rgba(20,24,40,.2); z-index: 40; padding: 6px; }
    .acct .menu { right: 0; top: 46px; min-width: 248px; }
    .menu .mhead { display: flex; gap: 10px; align-items: center; padding: 9px 10px; }
    .menu a.mhead-link { color: inherit; text-decoration: none; border-radius: 8px; } .menu a.mhead-link:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .menu a.mi { text-decoration: none; }
    .menu .mhead b { font-size: 13.5px; display: block; } .menu .mhead small { color: var(--muted); font-size: 11.5px; }
    .menu .plan-pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: var(--accent-tint); color: var(--accent); margin-left: auto; }
    .menu button.mi { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); font-size: 13px; padding: 9px 10px; border-radius: 7px; }
    .menu button.mi:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); }
    .menu button.mi.danger { color: var(--danger); } .menu button.mi.danger:hover { background: var(--danger-bg); }
    .menu .divider { height: 1px; background: var(--line); margin: 5px 4px; }
    .menu svg { width: 16px; height: 16px; }
    .menu .sub { padding: 6px 10px 2px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; }
    /* account drawer (side panel) */
    .acct-scrim { position: fixed; inset: 0; background: rgba(15,20,40,.30); z-index: 60; }
    .acct-drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 292px; max-width: 86vw; background: var(--pane, #fff); border-left: 1px solid var(--line); box-shadow: -14px 0 44px rgba(20,24,40,.18); z-index: 61; display: flex; flex-direction: column; padding: 14px 14px 16px; overflow-y: auto; animation: adr-in .18s ease; }
    @keyframes adr-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .adr-head { display: flex; align-items: center; gap: 11px; padding: 8px 8px 14px; text-decoration: none; color: inherit; border-bottom: 1px solid var(--line); }
    .adr-head b { font-size: 14px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .adr-head small { color: var(--muted); font-size: 11.5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .adr-head:hover b { color: var(--accent); }
    .adr-head .plan-pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: var(--accent-tint); color: var(--accent); flex: none; }
    .adr-nav { padding: 8px 0; }
    .adr-i { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); font-family: inherit; font-size: 13.5px; font-weight: 500; padding: 10px 11px; border-radius: 9px; text-decoration: none; cursor: pointer; }
    .adr-i:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); }
    .adr-i svg { width: 17px; height: 17px; flex: none; }
    .adr-i.danger { color: var(--danger); } .adr-i.danger:hover { background: var(--danger-bg); color: var(--danger); }
    .adr-sub { padding: 10px 11px 4px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; border-top: 1px solid var(--line); margin-top: 4px; }
    .adr-foot { margin-top: auto; border-top: 1px solid var(--line); padding-top: 6px; }

    .wrap { max-width: 1140px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 14px; }
    .page-head h1 { font-size: 26px; font-weight: 700; letter-spacing: -.5px; margin: 0 0 4px; }
    .page-head p { margin: 0; color: var(--muted); font-size: 14px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { border: 0; background: transparent; color: var(--muted); font-size: 13.5px; font-weight: 600; padding: 7px 13px; border-radius: 8px; }
    .tab.on { background: var(--pane); color: var(--accent); box-shadow: inset 0 0 0 1px var(--line); }
    .tab:hover { color: var(--ink); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(252px, 1fr)); gap: 22px; }
    .card { background: var(--pane); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; position: relative; cursor: pointer; transition: transform .14s, box-shadow .14s, border-color .14s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(20,24,40,.13); border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
    .thumb { height: 168px; background: linear-gradient(160deg, #f4f5f8, #e8eaf0); display: grid; place-items: center; padding: 20px; position: relative; }
    /* the thumbnail is a real white-paper preview of the manuscript — keep it light in BOTH themes */
    .mini-page { width: 100%; max-width: 142px; background: #fcfcfd; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,.18), 0 14px 30px rgba(0,0,0,.30); padding: 15px 14px; aspect-ratio: 1 / 1.32; font-family: 'Source Serif 4', serif; overflow: hidden; }
    .mp-title { font-size: 8px; font-weight: 700; line-height: 1.25; color: #222; margin-bottom: 8px; text-align: center; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .mp-bar { height: 3px; border-radius: 2px; background: #dfe3ea; margin: 4px 0; }
    .mp-bar.h { background: #c3c8d4; height: 4px; width: 55% !important; margin-top: 9px; }
    .mp-bar.read { background: #d8a93a; }
    .shared-badge { position: absolute; top: 10px; left: 10px; display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600; background: rgba(255,255,255,.9); border: 1px solid var(--line); padding: 3px 8px 3px 5px; border-radius: 20px; backdrop-filter: blur(3px); }
    /* ── Aurora dark polish: glassy card frame around the bright paper preview ── */
    html.dark .card .thumb { background: linear-gradient(160deg, #1b2133 0%, #10131f 100%) !important; }
    html.dark .card .thumb::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(120% 90% at 80% -10%, rgba(168,85,247,.18), transparent 55%), radial-gradient(120% 90% at 0% 110%, rgba(99,102,241,.16), transparent 55%); }
    html.dark .mini-page { position: relative; z-index: 1; }
    html.dark .card:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)) !important; box-shadow: 0 20px 46px -20px rgba(99,102,241,.55) !important; }
    html.dark .shared-badge { background: rgba(18,22,34,.82); border-color: rgba(255,255,255,.14); color: var(--ink); }
    /* ── clean info-card (mockup style): gradient doc icon + status chips, no big preview ── */
    .proj-card { display: flex; flex-direction: column; border-radius: 16px; }
    .pc-head { display: flex; align-items: center; gap: 10px; padding: 15px 15px 0; }
    .pc-ico { width: 40px; height: 40px; border-radius: 11px; flex: none; display: grid; place-items: center; color: #fff; background: linear-gradient(135deg, #6366f1, #a855f7); box-shadow: 0 6px 16px -6px rgba(124,92,240,.55); }
    .pc-ico svg { width: 19px; height: 19px; }
    .pc-chips { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .pc-chip { font-size: 11px; font-weight: 600; padding: 3px 9px 3px 4px; border-radius: 999px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--line); display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    .pc-chip:not(.shared) { padding: 3px 10px; }
    .pc-chip.shared { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); background: var(--accent-tint); }
    .proj-card .card-foot { padding: 11px 15px 16px; }
    .proj-card .card-title { font-size: 15px; margin: 0 0 6px; }
    /* submission-status pill (a styled <select>) + lifecycle progress bar */
    .pc-status { font-size: 11px; font-weight: 700; padding: 3px 22px 3px 10px; border-radius: 999px; background-color: var(--surface-2); border: 1px solid var(--line); cursor: pointer; font-family: inherit; -webkit-appearance: none; appearance: none; max-width: 138px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='6' viewBox='0 0 8 6'><path d='M1 1l3 3 3-3' fill='none' stroke='%238a92a0' stroke-width='1.4' stroke-linecap='round'/></svg>"); background-repeat: no-repeat; background-position: right 8px center; }
    .pc-status:hover { filter: brightness(1.12); }
    .pc-progress { position: absolute; left: 0; right: 0; bottom: 0; height: 4px; background: var(--surface-2); }
    .pc-progress > i { display: block; height: 100%; transition: width .35s ease; border-radius: 0 2px 2px 0; }

    .card-foot { padding: 12px 15px 14px; }
    .card-title { font-size: 14.5px; font-weight: 600; line-height: 1.3; margin: 0 0 5px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
    .card-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .5; }
    .members-stack { display: flex; margin-top: 9px; }
    .members-stack .avatar { box-shadow: 0 0 0 2px var(--pane); margin-left: -6px; }
    .members-stack .avatar:first-child { margin-left: 0; }
    .rename-input { width: 100%; font: inherit; font-size: 14px; font-weight: 600; border: 1px solid var(--accent); border-radius: 6px; padding: 4px 7px; outline: none; }

    /* always-visible per-card action bar (Open / Share / Rename / Duplicate / Delete) */
    .card-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; row-gap: 8px; margin-top: 12px; padding-top: 11px; border-top: 1px solid var(--line); }
    .ca { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px; flex-shrink: 0; white-space: nowrap; border: 1px solid var(--line); background: var(--pane); color: var(--ink); border-radius: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: color .12s, border-color .12s, background .12s; }
    .ca svg { width: 14px; height: 14px; }
    .ca:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); background: color-mix(in srgb, var(--accent) 6%, var(--pane)); }
    .ca.ca-open { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); background: color-mix(in srgb, var(--accent) 8%, var(--pane)); }
    .ca.ca-open:hover { background: color-mix(in srgb, var(--accent) 14%, var(--pane)); }
    .ca.ca-ico { width: 30px; padding: 0; justify-content: center; }
    /* resting danger cue (red icon) so Delete reads as destructive without hover and on touch */
    .ca.ca-danger { color: var(--danger); border-color: color-mix(in srgb, #dc2626 22%, var(--line)); }
    .ca.ca-danger:hover { color: var(--danger); border-color: color-mix(in srgb, #dc2626 55%, var(--line)); background: var(--danger-bg); }
    .ca-grow { flex: 1 1 0; min-width: 0; }
    /* roomier touch targets on coarse pointers (phones/tablets) */
    @media (pointer: coarse) { .ca { height: 38px; } .ca.ca-ico { width: 38px; } }

    .new-card { border: 2px dashed color-mix(in srgb, var(--accent) 40%, var(--line)); background: color-mix(in srgb, var(--accent) 4%, var(--pane)); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 168px; color: var(--accent); }
    .new-card:hover { background: color-mix(in srgb, var(--accent) 9%, var(--pane)); }
    .new-card .plus { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; box-shadow: 0 4px 12px rgba(79,70,229,.4); }
    .new-card .plus svg { width: 24px; height: 24px; } .new-card span { font-weight: 600; font-size: 14px; }
    .empty { text-align: center; padding: 70px 20px; color: var(--muted); }
    .empty h2 { color: var(--ink); font-size: 19px; margin: 0 0 8px; }

    .overlay { position: fixed; inset: 0; background: rgba(20,24,40,.42); display: grid; place-items: center; z-index: 60; padding: 20px; backdrop-filter: blur(2px); }
    .modal { background: var(--pane); border-radius: 16px; width: 460px; max-width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,.3); overflow: hidden; max-height: 88vh; display: flex; flex-direction: column; }
    .modal-head { padding: 20px 22px 0; } .modal-head h3 { margin: 0; font-size: 18px; font-weight: 700; }
    .modal-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .modal-body { padding: 18px 22px 4px; overflow: auto; }
    .field-label { font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin: 4px 0 7px; }
    .text-input { width: 100%; height: 42px; border: 1px solid var(--line); border-radius: 9px; padding: 0 13px; font: inherit; font-size: 14px; outline: none; }
    .text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
    .tpl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .tpl { border: 1.5px solid var(--line); border-radius: 11px; padding: 14px; text-align: left; background: var(--pane); }
    .tpl.on { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
    .tpl-ico { width: 34px; height: 34px; border-radius: 8px; display: grid; place-items: center; margin-bottom: 9px; background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); } .tpl-ico svg { width: 18px; height: 18px; }
    .tpl b { display: block; font-size: 13.5px; } .tpl small { color: var(--muted); font-size: 11.5px; line-height: 1.35; display: block; margin-top: 2px; }
    /* publication-template gallery (grouped by publisher, with venue KPIs) */
    .tpl-gallery { margin-top: 8px; max-height: 320px; overflow: auto; padding-right: 4px; }
    .tpl-group { margin-bottom: 12px; }
    .tpl-group-h { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 4px 2px 8px; }
    .tpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tpl-card { border: 1.5px solid var(--line); border-radius: 10px; padding: 9px 11px; text-align: left; background: var(--pane); cursor: pointer; transition: border-color .12s, box-shadow .12s, background .12s; min-width: 0; }
    .tpl-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
    .tpl-card.on { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); background: color-mix(in srgb, var(--accent) 4%, var(--pane)); }
    .tpl-card-top { display: flex; align-items: center; gap: 6px; }
    .tpl-card-top b { font-size: 12.8px; font-weight: 600; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .idx-badge { font-size: 8.5px; font-weight: 800; letter-spacing: .04em; padding: 1px 5px; border-radius: 10px; background: var(--ok-bg); color: var(--ok); flex: none; }
    .idx-badge.scopus { background: var(--warn-bg); color: var(--warn); }
    .tpl-cls { display: block; color: var(--muted); font-size: 10.5px; font-family: 'JetBrains Mono', ui-monospace, monospace; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tpl-kpi { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .tpl-kpi span { font-size: 9.5px; font-weight: 700; padding: 1px 6px; border-radius: 9px; background: color-mix(in srgb, var(--accent) 9%, transparent); color: var(--accent); }
    .tpl-kpi .q { background: #eef2f7; color: #475569; }
    .modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px 20px; border-top: 1px solid var(--line); }
    .sel { height: 36px; border: 1px solid var(--line); border-radius: 8px; background: var(--pane); font: inherit; font-size: 13px; padding: 0 8px; color: var(--ink); }

    .member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
    .member-row .mname { flex: 1; font-size: 13.5px; } .member-row .mname small { display: block; color: var(--muted); font-size: 11.5px; }
    .role-pill { font-size: 11px; color: var(--muted); }
    .link-box { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .link-box input { flex: 1; height: 36px; border: 1px solid var(--line); border-radius: 8px; padding: 0 10px; font-size: 12px; background: var(--bg); color: var(--muted); }

    .bar { height: 9px; border-radius: 5px; background: #e6e8ee; overflow: hidden; margin: 6px 0 3px; }
    .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #8b5cf6); }
    .bar.warn i { background: linear-gradient(90deg, #d9760b, #e11d48); }
    .usage-line { display: flex; justify-content: space-between; font-size: 13px; margin-top: 14px; }
    .usage-sub { font-size: 11.5px; color: var(--muted); }

    .act-row { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; align-items: flex-start; }
    .act-row:last-child { border-bottom: 0; }
