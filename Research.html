<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- New design (Academic Data-Dense): serif headings (Crimson Pro) + highly readable body (Atkinson Hyperlegible); applied only under html.newdesign -->
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --surface-3:#fafbfc; --accent-tint:#eef0ff; --ok:#15803d; --ok-bg:#e7f6ee; --warn:#b45309; --warn-bg:#fdf6e3; --danger:#b42318; --danger-bg:#fdeef0;
      --accent: #4f46e5; --accent-d: #4338ca; --ink: #1a2030; --muted: #5b6473; --faint: #8a92a0;
      --line: #e6e8ee; --soft: #f5f6f9; --softer: #fafbfc; --paper: #fff;
      --ok: #15803d; --ok-bg: #e7f6ee; --warn: #b45309; --warn-bg: #fdf6e3; --danger: #b42318; --danger-bg: #fdeef0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { background: var(--softer); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); }
    .app { display: flex; min-height: 100vh; }
    .side { width: 248px; flex: none; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .side-brand { display: flex; align-items: center; gap: 11px; padding: 18px 18px 14px; }
    .mk { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 4px 12px rgba(79,70,229,.34); flex: none; }
    .mk span { width: 12px; height: 12px; border: 0; border-top: 2.4px solid #fff; border-left: 2.4px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); margin-top: 3px; }
    .side-brand b { font-size: 15px; letter-spacing: -.2px; }
    .side-brand i { display: block; font-style: normal; font-size: 11.5px; color: var(--faint); }
    .nav { padding: 6px 10px; flex: 1; }
    .nav button { width: 100%; display: flex; align-items: center; gap: 10px; padding: 9px 11px; margin-bottom: 2px; border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 13.5px; font-weight: 600; border-radius: 9px; cursor: pointer; text-align: left; }
    .nav button:hover { background: var(--soft); color: var(--ink); }
    .nav button.on { background: var(--accent-tint); color: var(--accent); }
    .nav button svg { width: 17px; height: 17px; flex: none; }
    .nav-badge { margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--accent); color: #fff; font-size: 10.5px; font-weight: 700; font-style: normal; display: inline-flex; align-items: center; justify-content: center; }
    .side-foot { border-top: 1px solid var(--line); padding: 12px; display: flex; align-items: center; gap: 9px; }
    .side-foot .who { flex: 1; min-width: 0; }
    .side-foot .who b { font-size: 12.5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .side-foot .who span { font-size: 11px; color: var(--faint); }
    .side-foot a.exit { font-size: 12px; color: var(--muted); text-decoration: none; font-weight: 600; }
    .side-foot a.exit:hover { color: var(--accent); }
    .main { flex: 1; min-width: 0; padding: 26px 32px; }
    .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .head h1 { font-size: 21px; margin: 0; letter-spacing: -.3px; }
    .head .sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .badge { display: inline-flex; align-items: center; height: 20px; padding: 0 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--soft); color: var(--muted); }
    .badge.role { background: var(--accent-tint); color: var(--accent); }
    .av { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 13px; font-weight: 700; background-size: cover; background-position: center; flex: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .shared-sec-h { font-size: 13px; font-weight: 700; color: var(--muted); margin: 0 0 12px; display: flex; align-items: center; gap: 8px; letter-spacing: .01em; }
    /* ---- Project card, Option A: pipeline-rail (New design) ---- */
    .pc-a { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 16px 17px 15px; cursor: pointer; box-shadow: 0 1px 2px rgba(20,26,40,.05); transition: box-shadow .18s, transform .18s, border-color .18s; position: relative; }
    .pc-a:hover { box-shadow: 0 18px 44px -22px rgba(20,26,40,.4); transform: translateY(-2px); border-color: var(--line-2, #d7dbe8); }
    /* owner-only project-card actions (rename / settings / delete) — the whole card opens the project, so these stopPropagation */
    .card { position: relative; }
    .pc-actions { position: absolute; top: 10px; right: 10px; z-index: 5; }
    .pc-actbtn { width: 26px; height: 26px; border-radius: 8px; border: 1px solid transparent; background: none; color: var(--muted); font-size: 16px; line-height: 1; cursor: pointer; display: grid; place-items: center; opacity: .5; transition: opacity .15s, background .15s, color .15s; }
    .pc-a:hover .pc-actbtn, .card:hover .pc-actbtn, .pc-actbtn:focus-visible { opacity: 1; }
    .pc-actbtn:hover { background: var(--surface-2); color: var(--ink); opacity: 1; }
    .pc-actmenu { position: absolute; top: 30px; right: 0; z-index: 25; min-width: 168px; background: var(--surface); border: 1px solid var(--line-2, var(--line)); border-radius: 11px; padding: 5px; box-shadow: 0 18px 44px -18px rgba(20,26,40,.5); display: flex; flex-direction: column; gap: 1px; }
    .pc-actmenu button { text-align: left; font: inherit; font-size: 12.5px; color: var(--ink); background: none; border: 0; border-radius: 7px; padding: 8px 10px; cursor: pointer; }
    .pc-actmenu button:hover { background: var(--surface-2); }
    .pc-actmenu button.danger { color: var(--danger, #d6323a); }
    .pc-actmenu button.danger:hover { background: color-mix(in srgb, var(--danger, #d6323a) 12%, transparent); }
    .pc-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .pc-t { font-size: 15.5px; font-weight: 700; line-height: 1.3; letter-spacing: -.01em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pc-f { font-size: 12px; color: var(--faint); margin-top: 3px; }
    .pc-st { font-size: 10.5px; font-weight: 700; padding: 2px 9px; border-radius: 999px; white-space: nowrap; flex: none; }
    .pc-st.act { color: var(--ok, #15803d); background: var(--ok-bg, #e7f6ee); }
    .pc-st.pau { color: var(--warn, #b45309); background: var(--warn-bg, #fbf1dd); }
    .pc-st.don { color: var(--accent-d, var(--accent)); background: var(--accent-tint, #eef0ff); }
    .pc-st.arc { color: var(--faint); background: var(--surface-2, #f2f4f8); }
    .pc-rail { display: flex; align-items: center; gap: 0; margin: 16px 0 5px; }
    .pc-seg { flex: 1; height: 4px; background: var(--line); position: relative; }
    .pc-seg:first-child { border-radius: 3px 0 0 3px; } .pc-seg:last-child { border-radius: 0 3px 3px 0; }
    .pc-seg.done { background: var(--accent); }
    .pc-seg.cur { background: linear-gradient(90deg, var(--accent), var(--line)); }
    .pc-dot { position: absolute; top: 50%; left: -3px; transform: translateY(-50%); width: 9px; height: 9px; border-radius: 50%; background: var(--line-2, #d7dbe8); border: 2px solid var(--surface); }
    .pc-seg.done .pc-dot, .pc-seg.cur .pc-dot { background: var(--accent); }
    .pc-rlab { display: flex; justify-content: space-between; font-size: 10px; color: var(--faint); margin-bottom: 12px; }
    .pc-rlab .now { color: var(--accent); font-weight: 800; }
    .pc-metrics { display: flex; gap: 15px; padding: 11px 0 12px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .pc-m { display: flex; flex-direction: column; gap: 1px; }
    .pc-mv { font-size: 16px; font-weight: 750; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .pc-ml { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); }
    .pc-foot { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 11px; }
    .pc-kw { display: flex; gap: 5px; flex-wrap: wrap; min-width: 0; align-items: center; }
    .pc-kwc { font-size: 10.5px; font-weight: 600; color: var(--muted); background: var(--surface-2, #f2f4f8); border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; }
    .pc-upd { font-size: 10.5px; color: var(--faint); white-space: nowrap; flex: none; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color .12s, box-shadow .12s; }
    .card:hover { border-color: #cfd4e6; box-shadow: 0 6px 18px rgba(20,24,40,.06); }
    .card .ch { display: flex; align-items: center; gap: 11px; margin-bottom: 10px; }
    .card .ch b { font-size: 14.5px; }
    .card .ch span { font-size: 12px; color: var(--muted); display: block; }
    .card .ch > div:first-child { flex: 1; min-width: 0; }
    .author-badge { flex: none; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* supervisor "Diákjaim kutatása" surface */
    .segctl { display: inline-flex; gap: 4px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
    .segctl button { border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 7px; cursor: pointer; }
    .segctl button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,24,40,.08); }
    .sup-student { margin-bottom: 22px; }
    .sup-head { display: flex; align-items: center; gap: 11px; margin-bottom: 11px; flex-wrap: wrap; }
    .sup-head b { font-size: 14.5px; }
    .sup-topic { display: block; font-size: 12px; color: var(--muted); }
    .sup-empty { font-size: 13px; color: var(--faint); padding: 10px 2px 2px; }
    .ro-banner { background: var(--accent-tint); color: var(--accent); border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; font-size: 12.5px; font-weight: 600; margin-bottom: 12px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; background: var(--accent-tint); color: var(--accent); }
    .meter { height: 6px; border-radius: 4px; background: var(--line); overflow: hidden; margin-top: 4px; }
    .meter > i { display: block; height: 100%; background: var(--accent); }
    .kv { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 10px; }
    .empty { color: var(--faint); font-size: 14px; padding: 40px; text-align: center; }
    .soon { background: var(--surface); border: 1px dashed var(--line); border-radius: 14px; padding: 36px; text-align: center; color: var(--muted); }
    .center { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .center .box { text-align: center; max-width: 380px; }
    .center .mk { width: 52px; height: 52px; margin: 0 auto 16px; }
    .center h1 { font-size: 20px; margin: 0 0 6px; }
    .center p { font-size: 13.5px; color: var(--muted); margin: 0 0 20px; }
    .btn { border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 9px 15px; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer; }
    .btn.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn:hover { filter: brightness(1.03); }
    .scrim { position: fixed; inset: 0; background: rgba(15,20,40,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { width: 560px; max-width: 100%; max-height: 88vh; overflow: auto; background: var(--surface); border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.3); }
    .modal-h { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); }
    .modal-h .x { margin-left: auto; border: 0; background: transparent; font-size: 18px; color: var(--muted); cursor: pointer; }
    .modal-b { padding: 18px 20px; }
    .modal-foot { display: flex; gap: 10px; justify-content: flex-end; padding: 14px 20px; border-top: 1px solid var(--line); }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; }
    .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .4px; color: var(--faint); margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 12px; }
    .back-btn:hover { color: var(--accent); }
    .dhead { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
    .dhead .dt { flex: 1; } .dhead .dt h1 { margin: 0 0 3px; } .dhead .dt p { margin: 0; font-size: 13px; color: var(--muted); }
    .chip { display: inline-flex; align-items: center; height: 22px; padding: 0 9px; border-radius: 7px; font-size: 11px; font-weight: 700; border: 0; font-family: inherit; }
    .chip.c-ok { background: var(--ok-bg); color: var(--ok); } .chip.c-warn { background: var(--warn-bg); color: var(--warn); }
    .chip.c-grey { background: var(--surface-2); color: var(--muted); } .chip.c-acc { background: var(--accent-tint); color: var(--accent); }
    .chip.c-danger { background: var(--danger-bg); color: var(--danger); }
    /* journal recommender cards */
    .jl-card { border-bottom: 1px solid var(--soft); padding: 11px 0; }
    .jl-card:last-child { border-bottom: 0; }
    .jl-title { font-weight: 600; font-size: 14px; color: var(--ink); text-decoration: none; }
    .jl-title:hover { color: var(--accent); text-decoration: underline; }
    .jl-lvl { font-size: 10px; font-weight: 700; padding: 1.5px 7px; border-radius: 999px; flex: none; white-space: nowrap; }
    .jl-lvl.lvl2 { background: #fef3c7; color: #92400e; }
    .jl-lvl.lvl1 { background: var(--surface-2); color: var(--muted); }
    .jl-q { font-size: 10px; font-weight: 700; padding: 1.5px 7px; border-radius: 999px; }
    .jl-q.q1 { background: #dcfce7; color: #166534; } .jl-q.q2 { background: #e0f2fe; color: #075985; }
    .jl-q.q3 { background: #fef9c3; color: #854d0e; } .jl-q.q4 { background: #fee2e2; color: #991b1b; }
    .jl-fit { font-size: 11px; font-weight: 700; color: var(--accent); margin-left: auto; }
    .jl-meta { font-size: 11.5px; color: var(--faint); margin-top: 3px; }
    .jl-reason { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
    /* journal dossier KPI grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 2px 20px; margin-top: 8px; }
    .kpi { display: flex; justify-content: space-between; gap: 10px; font-size: 12.5px; padding: 4px 0; border-bottom: 1px dashed var(--soft); }
    .kpi-k { color: var(--muted); }
    .kpi-v { color: var(--ink); font-weight: 600; text-align: right; }
    /* "AI is working" indicator */
    .ai-think { display: flex; align-items: center; gap: 11px; padding: 10px 13px; background: var(--accent-tint); border: 1px solid #d7dbf5; border-radius: 11px; }
    .ai-orb { width: 20px; height: 20px; border-radius: 50%; flex: none; background: conic-gradient(from 0deg, var(--accent), #d946ef, var(--accent)); box-shadow: 0 0 0 3px rgba(79,70,229,.10); animation: ai-orb-spin 1.05s linear infinite; }
    @keyframes ai-orb-spin { to { transform: rotate(360deg); } }
    .ai-think-lbl { font-size: 12.5px; font-weight: 700; color: var(--accent-d); }
    .ai-dots { display: inline-block; width: 1.1em; text-align: left; }
    .ai-dots::after { content: ''; animation: ai-dots 1.4s steps(1) infinite; }
    @keyframes ai-dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
    .ai-ind { height: 4px; border-radius: 3px; background: rgba(79,70,229,.15); overflow: hidden; margin-top: 6px; }
    .ai-ind > i { display: block; height: 100%; width: 40%; border-radius: 3px; background: var(--accent); animation: ai-ind 1.15s ease-in-out infinite; }
    @keyframes ai-ind { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
    .ai-think-sec { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; flex: none; }
    /* task attachment drag & drop zone */
    .att-drop { border: 1.5px dashed var(--line); border-radius: 9px; padding: 12px; text-align: center; font-size: 12px; color: var(--faint); transition: border-color .12s, background .12s, color .12s; }
    .att-drop.over { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }
    /* per-step protocol report (rendered markdown) */
    .step-report { margin-top: 8px; font-size: 12.5px; color: var(--ink); line-height: 1.55; }
    .step-report h2 { font-size: 14px; margin: 6px 0 6px; }
    .step-report h3 { font-size: 12.5px; margin: 10px 0 4px; color: var(--muted); }
    .step-report p { margin: 6px 0; }
    .step-report ul, .step-report ol { margin: 6px 0; padding-left: 18px; }
    .step-report li { margin: 2px 0; }
    .step-report code { background: var(--soft); padding: 1px 4px; border-radius: 4px; font-size: 11.5px; }
    .step-report table { border-collapse: collapse; margin: 8px 0; font-size: 11.5px; width: auto; }
    .step-report th, .step-report td { border: 1px solid var(--line); padding: 3px 9px; text-align: left; }
    .step-report th { background: var(--surface-2); font-weight: 600; }
    .step-report strong { color: var(--ink); }
    /* full-page formatted report reader */
    .rv-scrim { position: fixed; inset: 0; background: rgba(15,20,40,.55); z-index: 1100; display: flex; align-items: stretch; justify-content: center; padding: 24px; }
    .rv-shell { width: 920px; max-width: 100%; max-height: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.32); display: flex; flex-direction: column; overflow: hidden; }
    .rv-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--line); flex: none; flex-wrap: wrap; row-gap: 6px; }
    /* single column by default (body fills); two columns only when a TOC is actually present → no empty/squished track */
    .rv-main { display: grid; grid-template-columns: minmax(0,1fr); flex: 1; min-height: 0; }
    .rv-main:has(.rv-toc) { grid-template-columns: 232px minmax(0,1fr); }
    .rv-toc { min-width: 0; width: 232px; border-right: 1px solid var(--line); overflow: auto; padding: 16px 8px 40px; background: var(--surface); box-sizing: border-box; }
    .rv-toc-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); padding: 0 8px 8px; }
    .rv-toc-i { display: block; width: 100%; text-align: left; border: 0; background: transparent; color: var(--muted); font-family: inherit; font-size: 12.5px; line-height: 1.35; padding: 5px 8px; border-radius: 7px; cursor: pointer; white-space: normal; }
    .rv-toc-i:hover { background: var(--soft); color: var(--ink); }
    .rv-toc-i.lvl1 { font-weight: 700; color: var(--ink); margin-top: 4px; }
    .rv-toc-i.lvl2 { padding-left: 14px; }
    .rv-toc-i.lvl3 { padding-left: 26px; font-size: 12px; color: var(--faint); }
    .rv-body { min-width: 0; overflow: auto; padding: 28px 24px 64px; background: var(--softer); overflow-wrap: anywhere; }
    .report-doc { max-width: 770px; margin: 0 auto; background: var(--surface); padding: 40px 48px; border-radius: 12px; box-shadow: 0 1px 3px rgba(20,24,40,.06); color: var(--ink); font-size: 14px; line-height: 1.65; }
    .report-doc h1 { font-size: 24px; margin: 0 0 14px; letter-spacing: -.3px; }
    .report-doc h2 { font-size: 18px; margin: 26px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--line); }
    .report-doc h3 { font-size: 15px; margin: 18px 0 6px; color: var(--muted); }
    .report-doc p { margin: 10px 0; }
    .report-doc ul, .report-doc ol { margin: 10px 0; padding-left: 22px; }
    .report-doc li { margin: 4px 0; }
    .report-doc blockquote { margin: 12px 0; padding: 6px 14px; border-left: 3px solid var(--accent); background: var(--accent-tint); color: var(--accent-d); border-radius: 0 6px 6px 0; }
    .report-doc code { background: var(--soft); padding: 1.5px 5px; border-radius: 4px; font-size: 12.5px; }
    .report-doc pre { background: var(--soft); padding: 12px 14px; border-radius: 8px; overflow: auto; }
    .report-doc pre code { background: none; padding: 0; }
    .report-doc table { border-collapse: collapse; margin: 14px 0; font-size: 13px; display: block; width: max-content; max-width: 100%; overflow-x: auto; }
    .report-doc th, .report-doc td { border: 1px solid var(--line); padding: 6px 12px; text-align: left; }

    @media (max-width: 900px) { .chatwrap { flex-direction: column; } .filebrowser { width: 100% !important; } .fb-resizer { display: none; } .pr-chat-rail { width: 100% !important; flex-direction: row !important; overflow-x: auto; overflow-y: hidden; border-right: none !important; border-bottom: 1px solid var(--line); gap: 6px !important; } .pr-chat-rail > div:first-child { display: none; } .pr-chat-rail button { width: auto !important; flex: none; } }
    .lfilters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 10px; }

    .lchip { font-size: 11.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); cursor: pointer; font-family: inherit; }
    .lchip:hover { border-color: #cfd4e6; }
    .lchip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    /* Literature study workflow (Elicit-style 4-step funnel) */
    .field-label { font-size: 11.5px; font-weight: 700; color: var(--muted); margin: 8px 0 4px; }
    .funnel { display: flex; gap: 8px; flex-wrap: wrap; }
    .funnel-step { flex: 1; min-width: 108px; border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 9px 11px; cursor: pointer; text-align: left; font-family: inherit; display: flex; flex-direction: column; gap: 2px; }
    .funnel-step b { font-size: 12.5px; color: var(--ink); }
    .funnel-step .funnel-count { font-size: 11px; color: var(--muted); }
    .funnel-step:hover { border-color: var(--accent); }
    .funnel-step.on { border-color: var(--accent); background: var(--accent-tint); }
    .funnel-step.on b { color: var(--accent); }
    .funnel-step.done { border-color: var(--ok); }
    .runbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
    .progress { flex: 1; min-width: 160px; position: relative; height: 18px; background: var(--surface-2); border-radius: 9px; overflow: hidden; display: flex; align-items: center; }
    .progress > i { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); opacity: .22; transition: width .2s; }
    .progress-t { position: relative; font-size: 10.5px; color: var(--muted); padding-left: 8px; z-index: 1; }
    .result-reason { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    @media (max-width: 760px) { .side { width: 64px; } .side-brand i, .side-brand b, .nav button span, .side-foot .who { display: none; } .main { padding: 18px; } }

    /* ===== Protocol results & iteration surface ===== */
    .ptabs { display: flex; gap: 3px; margin-top: 12px; background: var(--soft); border: 1px solid var(--line); border-radius: 10px; padding: 3px; width: fit-content; max-width: 100%; }
    .ptab { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12.5px; font-weight: 600; padding: 6px 14px; border-radius: 7px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .ptab.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,26,32,.08); }
    .ptab-c { font-size: 10px; background: var(--surface-2); color: var(--muted); padding: 1px 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
    /* status matrix */
    .smx { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface-2); border-radius: 8px; padding: 6px 10px; font-size: 11.5px; color: var(--ink); cursor: pointer; transition: border-color .12s; }
    .smx:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
    .smx-dot { width: 9px; height: 9px; border-radius: 2px; flex: none; }
    /* deliverables */
    .deliv { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface-2); }
    .deliv.click { cursor: pointer; transition: border-color .12s, box-shadow .12s; }
    .deliv.click:hover { border-color: color-mix(in srgb, var(--accent) 42%, var(--line)); box-shadow: 0 6px 16px -12px rgba(79,70,229,.5); }
    .deliv-ic { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; font-size: 14px; background: var(--soft); flex: none; }
    /* embedded full report (dashboard) */
    /* wrapper establishes a size container so the TOC collapses when THIS panel is narrow, not only when the viewport is */
    .doc-embed-wrap { container-type: inline-size; }
    /* single column by default; the fixed TOC track is added only when a TOC exists → body never lands in a narrow track */
    .doc-embed { display: grid; grid-template-columns: minmax(0,1fr); column-gap: 20px; align-items: start; margin-top: 6px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
    .doc-embed:has(.doc-embed-toc) { grid-template-columns: 200px minmax(0,1fr); }
    .doc-embed-toc { position: sticky; top: 8px; align-self: start; min-width: 0; max-height: 70vh; overflow-y: auto; padding: 14px 10px; border-right: 1px solid var(--line); border-radius: 12px 0 0 12px; background: var(--surface-2); box-sizing: border-box; }
    .doc-embed .report-doc { min-width: 0; padding: 16px 20px; max-width: none; overflow-wrap: anywhere; }
    /* collapse to one column on a narrow CONTAINER (preferred) and, as a fallback, a narrow viewport — same specificity as the :has rule so it wins */
    @container (max-width: 560px) { .doc-embed:has(.doc-embed-toc) { grid-template-columns: minmax(0,1fr); } .doc-embed-toc { display: none; } }
    @media (max-width: 860px) { .doc-embed:has(.doc-embed-toc) { grid-template-columns: minmax(0,1fr); } .doc-embed-toc { display: none; } }
    /* result section headers + acceptance + deviations */
    .res-h { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--faint); margin-bottom: 7px; }
    .acc-row { display: grid; grid-template-columns: 20px 1fr; gap: 8px; align-items: start; font-size: 12px; padding: 6px 9px; border-radius: 7px; background: var(--surface-2); border: 1px solid var(--line); }
    .acc-mk { font-weight: 800; text-align: center; color: var(--ok); }
    .acc-row.fail { background: var(--danger-bg); border-color: color-mix(in srgb, var(--danger) 30%, transparent); }
    .acc-row.fail .acc-mk { color: var(--danger); }
    .acc-rz { display: block; font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
    .dev-row { display: grid; grid-template-columns: 14px 1fr; gap: 8px; font-size: 11.5px; color: var(--warn); background: var(--warn-bg); border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent); border-radius: 7px; padding: 7px 9px; line-height: 1.45; }
    .dev-row::before { content: '⚙'; }
    /* metrics table */
    .metric-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
    .metric-t { border-collapse: collapse; width: 100%; font-size: 12px; }
    .metric-t td { padding: 5px 10px; border-bottom: 1px solid var(--soft); }
    .metric-t tr:last-child td { border-bottom: 0; }
    .metric-t tr:nth-child(even) { background: var(--surface-2); }
    .metric-t .mk { color: var(--muted); font-family: ui-monospace, Menlo, monospace; font-size: 11px; white-space: nowrap; }
    .metric-t .mv { font-family: ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; text-align: right; font-weight: 600; }
    /* artifacts */
    .art-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-family: ui-monospace, Menlo, monospace; background: var(--soft); border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; color: var(--muted); cursor: default; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button.art-chip { cursor: pointer; } button.art-chip:hover { border-color: var(--accent); color: var(--accent); }
    /* iteration dock */
    .iter-dock { margin-top: 12px; padding: 12px; border-radius: 10px; background: color-mix(in srgb, var(--accent-tint) 55%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--line)); }
    .note { display: grid; grid-template-columns: 22px 1fr; gap: 9px; align-items: start; }
    .note-k { font-size: 14px; }
    .note-who { font-size: 11.5px; font-weight: 700; color: var(--ink); }
    .note-kd { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .04em; }
    .note-when { font-size: 10.5px; color: var(--faint); }
    .note-b { font-size: 12.5px; color: var(--ink); line-height: 1.5; margin-top: 2px; }
    .iter-composer { background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 10px; }
    .kbtn { border: 1px solid var(--line); background: var(--surface); color: var(--muted); font: inherit; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; cursor: pointer; }
    .kbtn.on { border-color: var(--accent); background: var(--accent-tint); color: var(--accent-d); }
    /* figure lightbox */
    .fig-lb { position: fixed; inset: 0; z-index: 4000; background: rgba(10,12,18,.82); display: grid; place-items: center; padding: 24px; }
    .fig-lb img { max-width: 100%; max-height: 84vh; border-radius: 10px; box-shadow: 0 24px 64px rgba(0,0,0,.5); background: #fff; }
    .fig-lb-x { position: absolute; top: 16px; right: 18px; width: 38px; height: 38px; border-radius: 9px; border: 0; background: rgba(255,255,255,.14); color: #fff; font-size: 18px; cursor: pointer; }
    .fig-lb-cap { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: #e7edf3; font-size: 13px; padding: 0 24px; }
    /* ===== Task board (Kanban): human ↔ AI ===== */
    .bwrap { display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 12px; align-items: flex-start; }
    .bcol { flex: 0 0 244px; background: var(--surface-2); border: 1px solid var(--line); border-top: 3px solid var(--bcap, var(--line)); border-radius: 11px; display: flex; flex-direction: column; max-height: 72vh; }
    .bcol.cap-hu { --bcap: #7c3aed; } .bcol.cap-ai { --bcap: #0e8fa8; } .bcol.cap-bk { --bcap: var(--warn); }
    .bcol.over { outline: 2px dashed var(--accent); outline-offset: -3px; background: var(--accent-tint); }
    .bcol-h { display: flex; align-items: center; gap: 7px; padding: 9px 11px 7px; font-size: 11.5px; font-weight: 700; }
    .bcol-t { flex: 1; min-width: 0; }
    .bcol-n { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--soft); padding: 1px 7px; border-radius: 999px; }
    .bcol-est { font-size: 10px; color: var(--faint); padding: 0 11px 6px; font-variant-numeric: tabular-nums; }
    .bcol-b { padding: 7px; display: flex; flex-direction: column; gap: 7px; overflow-y: auto; flex: 1; min-height: 34px; }
    .bcol-empty { font-size: 11px; color: var(--faint); text-align: center; padding: 8px; }
    .bcard { position: relative; background: var(--surface); border: 1px solid var(--line); border-left: 3px solid var(--bst, var(--line)); border-radius: 9px; padding: 8px 9px; cursor: pointer; box-shadow: 0 1px 2px rgba(20,24,40,.04); transition: box-shadow .12s, border-color .12s; }
    .bcard.ai { --bst: #0e8fa8; } .bcard.hu { --bst: #7c3aed; }
    .bcard:hover { box-shadow: 0 6px 16px -8px rgba(20,24,40,.28); border-color: #cfd4e6; }
    .bcard[draggable="true"] { cursor: grab; } .bcard[draggable="true"]:active { cursor: grabbing; }
    .bcard-top { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .bcard-t { font-size: 12px; font-weight: 600; line-height: 1.3; color: var(--ink); }
    .bcard-m { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .bchip { font-size: 9.5px; font-weight: 700; padding: 1px 5px; border-radius: 5px; background: var(--soft); color: var(--muted); font-variant-numeric: tabular-nums; }
    .bchip.who.ai { background: #e0f3f7; color: #0a6f83; } .bchip.who.hu { background: #f1eafe; color: #6425c7; }
    html.dark .bchip.who.ai { background: rgba(40,184,212,.16); color: #5fd3e8; } html.dark .bchip.who.hu { background: rgba(165,131,247,.16); color: #c3aefb; }
    .bchip.ok { background: var(--ok-bg); color: var(--ok); } .bchip.fail { background: var(--danger-bg); color: var(--danger); } .bchip.warn { background: var(--warn-bg); color: var(--warn); }
    /* personal ToDo cards on the protocol board: dashed to read as hand-added, not AI-generated */
    .bcard.todo { border-style: dashed; background: color-mix(in srgb, var(--surface) 96%, var(--accent)); }
    .bchip.todo-tag { background: var(--accent-tint); color: var(--accent); }
    /* segmented control inside the Add/Edit task modal */
    .tm-seg { display: inline-flex; flex-wrap: wrap; background: var(--soft); border: 1px solid var(--line); border-radius: 9px; padding: 2px; }
    .tm-seg button { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: 7px; cursor: pointer; }
    .tm-seg button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,26,32,.08); }
    /* --- cross-project global board: filter bar, project chips, per-card project tag --- */
    .gb-bar { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .gb-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; }
    .gb-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); border-radius: 999px; padding: 4px 10px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; max-width: 230px; }
    .gb-chip:hover { border-color: var(--accent); color: var(--ink); }
    .gb-chip.on { background: var(--accent-tint); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
    html.dark .gb-chip.on { background: rgba(99,102,241,.18); color: #c3aefb; }
    .gb-chip .gb-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .gb-chip .gb-nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gb-chip .gb-c { font-size: 10.5px; font-weight: 700; background: var(--soft); color: var(--muted); padding: 0 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
    .gb-chip.on .gb-c { background: rgba(255,255,255,.55); color: var(--accent); } html.dark .gb-chip.on .gb-c { background: rgba(0,0,0,.25); }
    .gb-tools { display: flex; align-items: center; gap: 8px; flex: none; }

    .gb-seg button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(20,26,32,.08); }
    .gb-q { border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 9px; padding: 6px 10px; font: inherit; font-size: 12.5px; width: 150px; }

    /* ============================================================
       ACADEMIC DATA-DENSE REDESIGN — scoped to html.newdesign
       (skill: Data-Dense Dashboard · type: Crimson Pro + Atkinson
       Hyperlegible · palette tokens come from theme.js html.newdesign,
       light + dark). Only structural/type rules live here; colours use
       CSS variables so both themes adapt automatically.
       ============================================================ */
    html.newdesign body,
    html.newdesign .app,
    html.newdesign .main { font-family: 'Atkinson Hyperlegible', system-ui, sans-serif; }
    /* controls otherwise keep theme.js's Plus Jakarta (element rule) — make them follow Atkinson too */
    html.newdesign button, html.newdesign input, html.newdesign select, html.newdesign textarea { font-family: inherit; }
    html.newdesign .dhead h1,
    html.newdesign .head h1,
    html.newdesign .rv-fl,
    html.newdesign .rv-kpi-c .v { font-family: 'Crimson Pro', Georgia, serif; font-weight: 600; letter-spacing: -.2px; }
    html.newdesign .dhead h1 { font-size: 26px; line-height: 1.12; }
    /* Direction A is flat/academic — neutralize theme.js's Aurora-Pro frosted glass on panels/cards in dark so the page reads consistently with the flat KPI + table surfaces */
    html.newdesign.dark .panel, html.newdesign.dark .card { background: var(--surface) !important; backdrop-filter: none !important; border: 1px solid var(--line) !important; box-shadow: none !important; }

    html.newdesign .rv-lib-side { border-right: 1px solid var(--line); padding-right: 14px; }

    html.newdesign .rv-ctx-acct span { font-size: 11px; color: var(--muted); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    html.newdesign .rv-ctx-brand .mk { width: 26px; height: 26px; border-radius: 8px; }

    html.newdesign .rv-ctx-title { font-family: 'Crimson Pro', Georgia, serif; font-weight: 600; font-size: 19px; line-height: 1.2; color: var(--ink); }
    html.newdesign .rv-ctx-field { font-size: 11.5px; color: var(--muted); margin-top: 5px; line-height: 1.4; }
    html.newdesign .rv-ctx-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
    html.newdesign .rv-ctx-sel { height: 28px !important; font-size: 11.5px !important; width: auto !important; padding: 0 6px !important; }
    html.newdesign .rv-ctx-set { padding: 4px 9px !important; height: 28px; font-size: 11.5px; flex: none; }
    html.newdesign .rv-ctx-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); padding: 8px 8px 4px; }
    html.newdesign .rv-stnav, html.newdesign .rv-subnav { display: flex; flex-direction: column; gap: 1px; }
    html.newdesign .rv-st, html.newdesign .rv-sub { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: transparent; border: 0; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--muted); padding: 7px 9px; border-radius: 9px; cursor: pointer; }
    html.newdesign .rv-st:hover, html.newdesign .rv-sub:hover { background: var(--surface-2); color: var(--ink); }
    html.newdesign .rv-st.cur, html.newdesign .rv-sub.on { background: var(--accent-tint); color: var(--accent); font-weight: 800; }
    html.newdesign .rv-st-dot { flex: none; width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 800; background: var(--surface); border: 1.5px solid var(--line); color: var(--muted); font-variant-numeric: tabular-nums; }
    html.newdesign .rv-st.done .rv-st-dot { background: var(--ok); border-color: var(--ok); color: #fff; }
    html.newdesign.dark .rv-st.done .rv-st-dot { color: #0d2018; }
    html.newdesign .rv-st.cur .rv-st-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
    html.newdesign.dark .rv-st.cur .rv-st-dot { color: #0d1233; }
    html.newdesign .rv-st.atstage:not(.cur) .rv-st-dot { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
    html.newdesign .rv-st.done:not(.cur) .rv-st-lbl { color: var(--muted); }
    html.newdesign .rv-st.sub { margin-left: 16px; font-size: 12.5px; }
    html.newdesign .rv-st.sub .rv-st-dot { border: 0; background: transparent; color: var(--faint); width: 16px; height: 16px; }
    html.newdesign .rv-st-lbl { flex: 1; min-width: 0; }
    html.newdesign .rv-sub-c { margin-left: auto; font-size: 11px; font-weight: 800; color: var(--faint); background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 0 7px; }
    html.newdesign .rv-sub.on .rv-sub-c { color: var(--accent); }
    html.newdesign .rv-cmain { min-width: 0; }
    /* collapse the left context panel → full-width content (fullscreen-ish Canvas/Map) */
    html.newdesign .rv-2t.rv-collapsed { grid-template-columns: 1fr; }
    html.newdesign .rv-2t.rv-collapsed .rv-ctx { display: none; }
    .rv-ctx-collapse { border: 1px solid var(--line); background: var(--surface); color: var(--muted); border-radius: 7px; width: 26px; height: 26px; cursor: pointer; flex: none; font-size: 14px; line-height: 1; }
    .rv-ctx-collapse:hover { border-color: var(--line-2); color: var(--ink); }
    .rv-ctx-expand { align-self: flex-start; border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; font-weight: 700; margin-bottom: 12px; box-shadow: 0 4px 14px -8px rgba(20, 26, 40, .35); }
    .rv-ctx-expand:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== Journal — Venue Comparison Table (direction A) ===== */
    html.newdesign .jt-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }

    html.newdesign .jt thead th { background: var(--surface-2); text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    html.newdesign .jt th.jt-r, html.newdesign .jt td.jt-r { text-align: right; }
    html.newdesign .jt th.jt-c, html.newdesign .jt td.jt-c { text-align: center; }
    html.newdesign .jt th.jt-sorted { color: var(--accent); }

    html.newdesign .jt tbody tr:hover td { background: var(--surface-2); }
    html.newdesign .jt tbody tr.jt-sel td { background: var(--accent-tint); }
    html.newdesign.dark .jt tbody tr.jt-sel td { background: color-mix(in srgb, var(--accent) 14%, var(--surface)); }
    html.newdesign .jt tbody tr.jt-sel td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
    html.newdesign .jt .jl-lvl.lvl1 { border: 1px solid var(--line); }
    html.newdesign .jt-jr { max-width: 360px; }
    html.newdesign .jt-jtitle { font-weight: 700; font-size: 13.5px; color: var(--ink); line-height: 1.3; }
    html.newdesign .jt-jtitle:hover { color: var(--accent); }
    html.newdesign .jt-jmeta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
    html.newdesign .jt-jreason { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.4; max-width: 46ch; }

    html.newdesign .jt-fit { display: flex; align-items: center; gap: 9px; justify-content: flex-end; }
    html.newdesign .jt-fitbar { flex: 1; height: 7px; background: var(--line); border-radius: 999px; overflow: hidden; min-width: 44px; }
    html.newdesign .jt-fitbar i { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
    html.newdesign .jt-fitpct { font-size: 12.5px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; min-width: 34px; text-align: right; }
    html.newdesign .jt-num { font-variant-numeric: tabular-nums; color: var(--muted); white-space: nowrap; }
    html.newdesign .jt-oa { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); background: var(--surface); white-space: nowrap; }
    html.newdesign .jt-dash { color: var(--muted); }
    html.newdesign .jt-act { white-space: nowrap; }
    html.newdesign .jt-ib { padding: 3px 8px !important; font-size: 12px; }

    html.newdesign .jt-picked { font-size: 11px; }
    /* dark newdesign: white-on-accent primary buttons need a darker fill (dark --accent #8b88f2 gives only ~3:1 with #fff) — systemic, covers the Ideas primaries too */
    html.newdesign.dark .sr-rcstart, html.newdesign.dark .idb-addbtn, html.newdesign.dark .idb-cta { background: #4f46e5; color: #fff; }

    @media (max-width: 720px) {
      html.newdesign .rv-lib { grid-template-columns: 1fr; }
      html.newdesign .rv-lib-side { border-right: 0; border-bottom: 1px solid var(--line); padding-right: 0; padding-bottom: 12px; }
      html.newdesign .rv-lib-side .rv-fgrp { display: inline-block; vertical-align: top; margin-right: 18px; }
    }

    /* Pipeline Canvas (Map) — P1a swimlane materializer */
    .rmap-wrap { display: flex; gap: 14px; align-items: stretch; position: relative; }
    /* stage column: wraps the canvas + its card-relative floating overlays so they anchor to the STAGE, not the wrap
       (otherwise, with the File Explorer taking flex space on the left, the toolbar/inspector/edge floats shift) */
    .rmap-stage-col { flex: 1; min-width: 0; position: relative; display: flex; align-items: stretch; min-height: 0; }
    /* left File Explorer panel (collapsible) — a flex sibling of the stage; the stage shrinks to fit */
    .rmap-explorer { flex: none; width: 300px; max-width: 42%; display: flex; flex-direction: column; min-height: 0; align-self: stretch; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 10px -6px rgba(20,26,40,.3); }
    .rmap-exp-head { display: flex; align-items: center; gap: 7px; padding: 9px 8px 9px 13px; border-bottom: 1px solid var(--line); background: var(--surface-2); }
    .rmap-exp-t { font-size: 12.5px; font-weight: 800; }
    .rmap-exp-x { flex: none; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 8px; border-radius: 7px; }
    .rmap-exp-x:hover { background: var(--surface-3, var(--surface)); color: var(--accent); }
    .rmap-exp-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .rmap-exp-body .filebrowser { flex: 1; width: auto !important; align-self: stretch; border: 0; border-radius: 0; padding: 6px; max-height: none; min-height: 0; }
    .rmap-exp-body .filebrowser.fbx { display: flex; flex-direction: column; min-height: 0; }
    @media (max-width: 900px) { .rmap-explorer { width: auto; max-width: none; max-height: 300px; } }
    /* on-map dot + located highlight in the file tree (explorer + dock) */
    .fbx-dot { flex: none; width: 8px; height: 8px; border-radius: 50%; margin-right: 1px; }
    .fbx-dot.on { background: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent); }
    .fbx-dot.off { background: none; border: 1.5px solid var(--faint); box-sizing: border-box; }
    .fbx-row.located { background: color-mix(in srgb, var(--accent) 14%, transparent); box-shadow: inset 2px 0 0 var(--accent); }
    /* floating on-canvas card modal: anchored next to the selected node, in front of the canvas (not a side panel) */
    .rmap-insp-float { box-shadow: 0 14px 44px rgba(0,0,0,.30), 0 2px 8px rgba(0,0,0,.14); animation: rmap-insp-pop .13s ease-out; overflow-y: auto; }
    @keyframes rmap-insp-pop { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
    /* floating selection toolbar above the selected card */
    /* ── macOS-Dock toolbars — shared by the card selection toolbar (.rmap-seltool) + the Map menu bar (.rmap-zoom).
       Cursor-distance magnifies each .rmap-dbtn (JS sets transform:scale + --s); the floating .rmap-dlab label is
       counter-scaled (1/--s) so its text stays crisp; the nearest icon gets .rmap-dhot → its label shows. ── */
    .rmap-seltool { display: flex; align-items: flex-end; gap: 3px; background: color-mix(in srgb, var(--surface) 90%, transparent); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: 14px; padding: 5px; box-shadow: 0 14px 34px -12px rgba(20,30,55,.42), 0 2px 8px -4px rgba(20,30,55,.3); animation: rmap-insp-pop .12s ease-out; }
    .rmap-dbtn { position: relative; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); line-height: 1; transform-origin: bottom center; flex: none; transition: transform .13s cubic-bezier(.3,1.4,.5,1), background .12s; }
    .rmap-dbtn:hover { background: var(--surface-2); }
    .rmap-dbtn:disabled { cursor: default; opacity: .5; }
    .rmap-dbtn-danger:hover { background: color-mix(in srgb, var(--danger, #b42318) 15%, transparent); color: var(--danger, #b42318); }
    .rmap-seltool .rmap-dbtn { width: 34px; height: 30px; border-radius: 8px; font-size: 14.5px; }
    .rmap-dbtn .rmap-dlab { position: absolute; bottom: calc(100% + 9px); left: 50%; transform: translateX(-50%) scale(calc(1 / var(--s, 1))); white-space: nowrap; font-size: 11px; font-weight: 650; background: var(--ink); color: var(--surface); padding: 3px 9px; border-radius: 7px; opacity: 0; pointer-events: none; transition: opacity .12s; z-index: 20; }
    .rmap-dbtn .rmap-dlab::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--ink); }
    .rmap-dbtn.rmap-dhot .rmap-dlab { opacity: 1; }
    @media (prefers-reduced-motion: reduce) { .rmap-dbtn { transition: transform .06s linear, background .12s; } }
    /* per-node pin badge + pinned highlight ring */
    .rmap-pin-badge { position: absolute; top: -8px; right: -6px; font-size: 13px; z-index: 2; filter: drop-shadow(0 1px 1px rgba(0,0,0,.3)); pointer-events: none; }
    .rmap-node.rmap-pinned { box-shadow: 0 0 0 2px var(--accent), 0 8px 20px -8px rgba(20,26,40,.4); }
    /* multi-select: marquee rect + selected outline + group action bar */
    .rmap-marquee { border: 1.5px solid var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); border-radius: 4px; }
    .rmap-node.rmap-mselected { box-shadow: 0 0 0 2px var(--accent); }
    /* P1.5 — cards a hovered frame header will carry (group-move preview) */
    .rmap-node.rmap-carry-preview { outline: 2px dashed color-mix(in srgb, #6b5be6 70%, var(--line)); outline-offset: 2px; animation: rmap-carry-pulse 1.3s ease-in-out infinite; }
    @keyframes rmap-carry-pulse { 0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, #6b5be6 34%, transparent); } 50% { box-shadow: 0 0 0 6px transparent; } }
    @media (prefers-reduced-motion: reduce) { .rmap-node.rmap-carry-preview { animation: none; } }
    .rmap-groupbar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 16; display: flex; gap: 6px; align-items: center; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 5px 8px 5px 14px; box-shadow: 0 10px 28px rgba(0,0,0,.22); }
    .rmap-groupbar b { font-size: 12px; font-weight: 800; color: var(--ink); }
    .rmap-groupbar button { border: 1px solid var(--line); background: var(--surface); cursor: pointer; font-size: 13px; width: 30px; height: 27px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
    .rmap-groupbar button:hover { background: var(--surface-2); border-color: var(--accent); }
    /* Map frames (named regions / phase lanes) — a backdrop that does NOT block card interaction */
    .rmap-frame { position: absolute; border: 1.5px solid; border-radius: 14px; pointer-events: none; }
    .rmap-frame-h { pointer-events: auto; display: flex; align-items: center; gap: 6px; padding: 4px 6px 4px 10px; cursor: grab; border-top-left-radius: 12px; border-top-right-radius: 12px; }
    .rmap-frame-h:active { cursor: grabbing; }
    .rmap-frame-t { font-size: 12px; font-weight: 800; letter-spacing: .01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .rmap-frame-acts { display: none; gap: 3px; flex: none; }
    .rmap-frame-h:hover .rmap-frame-acts { display: flex; }
    .rmap-frame-acts button { border: 1px solid var(--line); background: var(--surface); color: var(--ink); cursor: pointer; font-size: 12.5px; line-height: 1; width: 25px; height: 23px; border-radius: 6px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px -1px rgba(0,0,0,.25); }
    .rmap-frame-acts button:hover { border-color: var(--accent); background: var(--surface-2); }
    .rmap-frame-acts button.on { border-color: #d6455f; color: #d6455f; background: color-mix(in srgb, #d6455f 12%, var(--surface)); }
    /* dock frame-scope pill (#2) — the dock chat is bound to a frame */
    .rmap-dock-framepill { display: inline-flex; align-items: center; gap: 6px; margin-left: 8px; font-family: inherit; font-size: 11px; font-weight: 700; color: #d6455f; background: color-mix(in srgb, #d6455f 12%, transparent); border: 1px solid color-mix(in srgb, #d6455f 42%, var(--line)); border-radius: 999px; padding: 2px 9px; cursor: pointer; max-width: 60%; overflow: hidden; white-space: nowrap; }
    .rmap-dock-framepill .x { opacity: .7; font-size: 10px; flex: none; }
    .rmap-dock-framepill:hover { filter: brightness(1.06); }
    .rmap-frame-rz { pointer-events: auto; position: absolute; right: -4px; bottom: -4px; width: 16px; height: 16px; cursor: nwse-resize; border-radius: 4px; background: var(--surface); border: 1.5px solid currentColor; }
    .rmap-frame-gen { pointer-events: auto; position: absolute; left: 8px; right: 8px; bottom: 8px; display: flex; gap: 5px; }
    .rmap-frame-geni { flex: 1; min-width: 0; font-family: inherit; font-size: 11.5px; padding: 5px 9px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--ink); }
    .rmap-frame-geni:focus { outline: none; border-color: var(--accent); }
    .rmap-frame-gen button { flex: none; border: 1px solid var(--line); background: var(--surface); color: var(--ink); cursor: pointer; font-size: 12px; padding: 0 10px; border-radius: 8px; }
    .rmap-frame-gen button:disabled { opacity: .45; cursor: default; }
    .rmap-fc-slate  { border-color: #94a3b8; color: #475569; background: rgba(148,163,184,.07); } .rmap-fc-slate  .rmap-frame-h { background: rgba(148,163,184,.16); }
    .rmap-fc-violet { border-color: #a78bfa; color: #6d28d9; background: rgba(167,139,250,.07); } .rmap-fc-violet .rmap-frame-h { background: rgba(167,139,250,.16); }
    .rmap-fc-cyan   { border-color: #67e8f9; color: #0e7490; background: rgba(103,232,249,.07); } .rmap-fc-cyan   .rmap-frame-h { background: rgba(103,232,249,.16); }
    .rmap-fc-amber  { border-color: #fcd34d; color: #b45309; background: rgba(252,211,77,.09); } .rmap-fc-amber  .rmap-frame-h { background: rgba(252,211,77,.20); }
    .rmap-fc-green  { border-color: #6ee7b7; color: #047857; background: rgba(110,231,183,.07); } .rmap-fc-green  .rmap-frame-h { background: rgba(110,231,183,.16); }
    .rmap-fc-rose   { border-color: #fda4af; color: #be123c; background: rgba(253,164,175,.08); } .rmap-fc-rose   .rmap-frame-h { background: rgba(253,164,175,.18); }
    /* Map comments / annotations */
