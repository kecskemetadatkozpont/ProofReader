<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publify — Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --surface:#fff; --surface-2:#f5f6f9; --accent-tint:#eef0ff; --accent:#4f46e5; --accent-d:#4338ca; --ink:#1a2030; --muted:#5b6473; --faint:#8a92a0; --line:#e6e8ee; --soft:#f5f6f9; --softer:#fafbfc; --paper:#fff; --warn:#b45309; --danger: #dc2626; --danger-bg: #fdecec; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { background: var(--softer); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); }
    .app { display: flex; height: 100vh; }
    /* history sidebar */
    .side { width: 264px; flex: none; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; height: 100vh; }
    .side-brand { display: flex; align-items: center; gap: 11px; padding: 16px 16px 12px; }
    .mk { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, #6366f1, #d946ef); box-shadow: 0 4px 12px rgba(79,70,229,.34); flex: none; }
    .mk span { width: 11px; height: 11px; border-top: 2.4px solid #fff; border-left: 2.4px solid #fff; border-radius: 2px 0 0 0; transform: rotate(45deg); margin-top: 3px; }
    .side-brand b { font-size: 14.5px; letter-spacing: -.2px; }
    .side-brand i { display: block; font-style: normal; font-size: 11px; color: var(--faint); }
    .newchat { margin: 4px 12px 8px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); color: var(--ink); font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .newchat:hover { border-color: var(--accent); color: var(--accent); }
    .hist-h { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--faint); padding: 8px 16px 4px; }
    .hist { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .hist-item { display: flex; align-items: center; gap: 6px; padding: 8px 9px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); }
    .hist-item:hover { background: var(--soft); color: var(--ink); }
    .hist-item.on { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
    .hist-item .ht { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-item .hx { opacity: 0; border: 0; background: transparent; color: var(--faint); cursor: pointer; font-size: 14px; padding: 0 2px; }
    .hist-item:hover .hx, .hist-item:focus-within .hx, .hist-item .hx:focus, .hist-item .hx:focus-visible { opacity: 1; }
    .hist-item .hx:hover { color: var(--warn); }
    .side-foot { border-top: 1px solid var(--line); padding: 12px 14px; display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--muted); }
    .side-foot a { margin-left: auto; color: var(--faint); text-decoration: none; }
    /* main chat */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    .topbar { height: 52px; border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 20px; gap: 10px; font-weight: 700; font-size: 14px; }
    .topbar .mtag { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-tint); padding: 2px 8px; border-radius: 999px; margin-left: auto; }
    .conv { flex: 1; overflow-y: auto; padding: 22px 0; scroll-behavior: smooth; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 0 22px; display: flex; flex-direction: column; gap: 18px; }
    .empty { max-width: 760px; margin: 12vh auto 0; padding: 0 22px; text-align: center; color: var(--muted); }
    .empty h1 { font-size: 26px; letter-spacing: -.4px; color: var(--ink); margin: 0 0 6px; }
    .suggest { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; }
    .suggest button { border: 1px solid var(--line); background: var(--surface); border-radius: 999px; padding: 8px 14px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; }
    .suggest button:hover { border-color: var(--accent); color: var(--accent); }
    .bubble { font-size: 14.5px; line-height: 1.62; }
    .bubble.user { align-self: flex-end; max-width: 82%; padding: 9px 14px; border-radius: 18px 18px 6px 18px; background: var(--accent); color: #fff; }
    .bubble.ai { align-self: stretch; max-width: 100%; color: var(--ink); }
    .btxt { white-space: pre-wrap; word-wrap: break-word; }
    .btxt.md { white-space: normal; }
    .btxt.md > :first-child { margin-top: 0; } .btxt.md > :last-child { margin-bottom: 0; }
    .btxt.md p { margin: 8px 0; } .btxt.md ul, .btxt.md ol { margin: 8px 0; padding-left: 20px; } .btxt.md li { margin: 3px 0; }
    .btxt.md h1, .btxt.md h2, .btxt.md h3 { font-size: 15px; margin: 12px 0 5px; }
    .btxt.md code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 5px; font-size: 12.5px; font-family: ui-monospace, Menlo, monospace; }
    .btxt.md pre { background: #0f1220; color: #e6e8ee; padding: 11px 13px; border-radius: 9px; overflow-x: auto; } .btxt.md pre code { background: none; padding: 0; color: inherit; }
    .btxt.md a { color: var(--accent); } .btxt.md blockquote { border-left: 3px solid var(--line); margin: 6px 0; padding-left: 10px; color: var(--muted); }
    .btxt.md table { border-collapse: collapse; font-size: 12.5px; margin: 6px 0; } .btxt.md th, .btxt.md td { border: 1px solid var(--line); padding: 3px 7px; }
    .bmeta { display: flex; gap: 12px; align-items: center; margin-top: 7px; font-size: 11px; color: var(--muted); }
    .bmeta button { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 600; padding: 0; font-family: inherit; }
    .bmeta button:hover { color: var(--accent); }
    .tw-cursor { display: inline-block; width: 6px; margin-left: 1px; color: var(--accent); animation: twblink 1s steps(1) infinite; }
    @keyframes twblink { 50% { opacity: 0; } }
    /* collapsible code */
    .code-fold { margin: 7px 0; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
    .code-fold > summary { cursor: pointer; font-size: 11.5px; font-weight: 700; color: var(--muted); padding: 6px 10px; background: var(--surface-2); list-style: none; user-select: none; }
    .code-fold > summary::-webkit-details-marker { display: none; }
    .code-fold > summary:hover { color: var(--accent); }
    .code-fold[open] > summary { border-bottom: 1px solid var(--line); }
    .code-fold > pre { margin: 0; border-radius: 0; }
    .code-fold:not([open]) > pre { display: none !important; }
    /* composer */
    .composer { border-top: 1px solid var(--line); padding: 14px 22px 18px; background: var(--softer); }
    .composer-in { max-width: 760px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; border: 1px solid var(--line); background: var(--surface); border-radius: 16px; padding: 8px 8px 8px 14px; }
    .composer-in textarea { flex: 1; min-height: 26px; max-height: 200px; border: 0; outline: none; resize: none; font-family: inherit; font-size: 14.5px; line-height: 1.45; background: transparent; color: var(--ink); padding: 4px 0; }
    .send-btn { flex: none; width: 38px; height: 38px; border: 0; border-radius: 11px; background: var(--accent); color: #fff; cursor: pointer; font-size: 16px; display: grid; place-items: center; }
    .send-btn:disabled { opacity: .5; cursor: default; }
    .center { display: grid; place-items: center; height: 100vh; text-align: center; color: var(--muted); }
    /* workflow (agentic) mode + session files */
    .files-strip { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 22px; border-bottom: 1px solid var(--line); background: var(--surface-2); }
    .fs-h { font-size: 11.5px; font-weight: 700; color: var(--muted); }
    .fs-chip { display: inline-flex; align-items: center; gap: 1px; border: 1px solid var(--line); background: var(--surface); border-radius: 999px; padding: 2px 4px 2px 10px; font-size: 12px; }
    .fs-chip:hover { border-color: var(--accent); }
    .fs-name { border: 0; background: transparent; color: var(--ink); font-family: inherit; font-size: 12px; cursor: pointer; max-width: 230px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fs-chip:hover .fs-name { color: var(--accent); }
    .fs-x { border: 0; background: transparent; color: var(--muted); font-size: 14px; line-height: 1; cursor: pointer; padding: 2px 5px; border-radius: 50%; }
    .fs-x:hover { background: var(--danger); color: #fff; }
    /* attach button + menu */
    .attach-wrap { position: relative; flex: none; }
    .attach-btn { width: 38px; height: 38px; border: 0; border-radius: 11px; background: transparent; color: var(--muted); cursor: pointer; font-size: 17px; display: grid; place-items: center; }
    .attach-btn:hover { background: var(--surface-2); color: var(--accent); }
    .attach-btn:disabled { opacity: .5; cursor: default; }
    .attach-menu { position: absolute; bottom: 46px; left: 0; min-width: 212px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 14px 40px rgba(20,24,40,.22); padding: 5px; z-index: 30; }
    .attach-menu button { display: block; width: 100%; text-align: left; border: 0; background: transparent; color: var(--ink); font-family: inherit; font-size: 13.5px; padding: 9px 11px; border-radius: 8px; cursor: pointer; }
    .attach-menu button:hover { background: var(--surface-2); color: var(--accent); }
    /* drag-and-drop overlay */
    .drop-ov { position: absolute; inset: 8px; z-index: 40; background: color-mix(in srgb, var(--accent) 12%, var(--surface) 88%); border: 2.5px dashed var(--accent); border-radius: 14px; display: grid; place-items: center; pointer-events: none; }
    .drop-card { font-size: 16px; font-weight: 700; color: var(--accent); background: var(--surface); padding: 16px 26px; border-radius: 14px; box-shadow: 0 12px 40px rgba(20,24,40,.2); }
    /* browse picker modal */
    .pick-modal { width: min(560px, 92vw); }
    .pick-body { padding: 6px; max-height: 60vh; overflow-y: auto; }
    .pick-item { display: block; width: 100%; text-align: left; border: 0; border-bottom: 1px solid var(--surface-2); background: transparent; color: var(--ink); font-family: inherit; padding: 11px 13px; cursor: pointer; }
    .pick-item:last-child { border-bottom: 0; }
    .pick-item:hover { background: var(--surface-2); }
    .pick-item b { display: block; font-size: 13.5px; }
    .pick-item small { display: block; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
    .pick-empty { padding: 26px; text-align: center; color: var(--muted); font-size: 13px; }
    .pick-filter { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 12.5px; color: var(--muted); }
    .pf-sel { flex: 1; height: 32px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--ink); font-family: inherit; font-size: 13px; padding: 0 8px; }
    .wf-row { max-width: 760px; margin: 0 auto 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .wf-toggle { flex: none; border: 1px solid var(--line); background: var(--surface); border-radius: 999px; padding: 6px 13px; font-size: 12.5px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: inherit; }
    .wf-toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .wf-hint { font-size: 11.5px; color: var(--faint); }
    .pv-scrim { position: fixed; inset: 0; background: rgba(20,24,40,.45); display: grid; place-items: center; z-index: 80; }
    .pv-modal { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; width: min(720px, 92vw); max-height: 84vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(20,24,40,.35); }
    .pv-head { display: flex; align-items: center; gap: 8px; padding: 13px 16px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); }
    .pv-head b { flex: 1; font-size: 13.5px; }
    .pv-x { border: 0; background: transparent; font-size: 18px; color: var(--muted); cursor: pointer; }
    .pv-body { padding: 16px; font-size: 13.5px; }
    @media (max-width: 820px) { .side { display: none; } }
  </style>

</head>
